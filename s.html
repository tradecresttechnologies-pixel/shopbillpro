<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>

<script>
// Pre-paint theme application (eliminates dark→light flash)
(function(){
  try {
    var t = localStorage.getItem('sbp_theme');
    if (t === 'light') document.documentElement.setAttribute('data-theme','light');
  } catch(e) {}
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Shop · ShopBill Pro</title>

<meta property="og:description" content="Visit this shop's profile">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans',sans-serif;-webkit-font-smoothing:antialiased}
:root{--acc:#F5A623;--acc2:#FF6B35;--ok:#10B981;--bg:#0A0A12;--surf:#13131C;--surf2:#1C1C28;--bord:#2A2A3A;--text:#F0EFF8;--t2:#8A8AA8;--font-h:'Outfit',sans-serif}
[data-theme="light"]{--bg:#FAFAFC;--surf:#FFFFFF;--surf2:#F2F2F8;--bord:#E5E5EE;--text:#0F0E18;--t2:#5E5A7A}
body{background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}

.psp{max-width:560px;margin:0 auto;padding:20px 16px 80px;min-height:100dvh}

/* ── BATCH 012: Responsive desktop layout (decision 1, 6 May 2026) ──
   Mobile (default): keep narrow Instagram-bio feel (560px max).
   Tablet 768px+:    widen to 720px, more breathing room.
   Desktop 1024px+:  widen to 820px, refined typography spacing,
                     gallery flows to 4 columns, actions row stretches.
   Goal: page feels appropriate on any device — not a tiny mobile column
   stranded in the middle of a wide laptop screen. */
@media (min-width: 768px) {
  .psp{max-width:720px;padding:32px 24px 96px}
  .psp-hero{padding:40px 32px}
  .psp-photo{width:108px;height:108px;font-size:54px;border-radius:28px}
  .psp-name{font-size:32px}
  .psp-tagline{font-size:16px}
  .psp-actions{grid-template-columns:repeat(4,1fr);gap:12px}
  .psp-card{padding:24px 28px}
  .psp-gallery{grid-template-columns:repeat(4,1fr)}
}
@media (min-width: 1024px) {
  .psp{max-width:820px}
  .psp-hero{padding:48px 36px}
  .psp-name{font-size:36px}
  .psp-actions{gap:14px}
  .psp-act{padding:20px 16px}
  .psp-act-ic{width:46px;height:46px;font-size:24px}
  .psp-card{padding:28px 32px}
  .psp-card-h{font-size:14px}
  .psp-row{font-size:15px}
}

/* Loading state */
.psp-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60dvh;gap:14px;color:var(--t2)}
.psp-spin{width:40px;height:40px;border:3px solid var(--bord);border-top-color:var(--acc);border-radius:50%;animation:psp-spin 1s linear infinite}
@keyframes psp-spin{to{transform:rotate(360deg)}}

/* 404 / error state */
.psp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60dvh;gap:16px;text-align:center;padding:0 16px}
.psp-empty-emoji{font-size:48px}
.psp-empty-title{font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--text)}
.psp-empty-msg{color:var(--t2);font-size:15px;line-height:1.5;max-width:320px}
.psp-cta{display:inline-block;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700;font-size:14px;padding:12px 22px;border-radius:12px;text-decoration:none;margin-top:8px}

/* Hero */
.psp-hero{background:var(--surf);border:1px solid var(--bord);border-radius:20px;padding:28px 22px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.psp-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.psp-photo{width:88px;height:88px;border-radius:24px;background:linear-gradient(135deg,var(--acc),var(--acc2));margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:44px;color:#fff;font-weight:800;font-family:var(--font-h);box-shadow:0 8px 24px rgba(245,166,35,.3);overflow:hidden}
.psp-photo img{width:100%;height:100%;object-fit:cover}
.psp-name{font-family:var(--font-h);font-size:24px;font-weight:800;line-height:1.2;color:var(--text);margin-bottom:6px;word-break:break-word}
.psp-tagline{font-size:14px;color:var(--t2);line-height:1.4;margin-bottom:0}
.psp-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(16,185,129,.12);color:var(--ok);font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;margin-top:10px;letter-spacing:.3px}

/* Action row */
.psp-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.psp-act{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 12px;background:var(--surf);border:1px solid var(--bord);border-radius:16px;color:var(--text);text-decoration:none;font-weight:600;font-size:13px;transition:transform .15s ease,border-color .15s ease;cursor:pointer}
.psp-act:hover{transform:translateY(-1px);border-color:var(--acc)}
.psp-act-ic{font-size:22px;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.psp-act.wa .psp-act-ic{background:#25D366;color:#fff}
.psp-act.call .psp-act-ic{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.psp-act.dirs .psp-act-ic{background:#4285F4;color:#fff}
.psp-act.share .psp-act-ic{background:var(--surf2);color:var(--text)}

/* Info card */
.psp-card{background:var(--surf);border:1px solid var(--bord);border-radius:16px;padding:18px 20px;margin-bottom:12px}
.psp-card-h{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.psp-row{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px dashed var(--bord);font-size:14px;line-height:1.5}
.psp-row:last-child{border-bottom:none;padding-bottom:0}
.psp-row:first-child{padding-top:0}
.psp-row-ic{width:24px;flex-shrink:0;color:var(--t2);font-size:16px;text-align:center}
.psp-row-val{flex:1;color:var(--text);word-break:break-word}
.psp-row-val a{color:var(--acc);text-decoration:none}

/* Services list */
.psp-services{display:flex;flex-wrap:wrap;gap:8px;padding-top:4px}
.psp-svc{background:var(--surf2);color:var(--text);font-size:13px;font-weight:500;padding:8px 14px;border-radius:10px;border:1px solid var(--bord)}

/* Enhanced services list (rendered from sbp_get_shop_services_public) */
.psp-services-rich{display:flex;flex-direction:column;gap:8px;padding-top:4px}
.psp-svc-row{display:flex;gap:12px;padding:10px 12px;background:var(--surf2);border:1px solid var(--bord);border-radius:12px;align-items:center}
.psp-svc-img{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--surf2),var(--bord));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;overflow:hidden}
.psp-svc-img img{width:100%;height:100%;object-fit:cover}
.psp-svc-info{flex:1;min-width:0}
.psp-svc-name{font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3}
.psp-svc-desc{font-size:11.5px;color:var(--t2);line-height:1.4;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.psp-svc-meta{display:flex;gap:6px;flex-wrap:wrap;font-size:10.5px;color:var(--t2)}
.psp-svc-meta-tag{padding:1px 7px;background:rgba(255,255,255,.04);border:1px solid var(--bord);border-radius:6px}
.psp-svc-price{font-family:var(--font-h);font-size:15px;font-weight:800;color:var(--ok);flex-shrink:0;text-align:right}

/* About section */
.psp-about-text{color:var(--t2);font-size:13.5px;line-height:1.6;white-space:pre-line}

/* Gallery */
.psp-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding-top:4px}
.psp-gal-tile{aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--surf2);border:1px solid var(--bord)}
.psp-gal-tile img{width:100%;height:100%;object-fit:cover;display:block}

/* Book Appointment CTA + Booking flow modal */
.psp-book-cta{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#8B5CF6,#3B82F6);color:#fff;border:none;border-radius:14px;font-family:var(--font-h);font-size:15px;font-weight:800;cursor:pointer;margin-bottom:14px;box-shadow:0 4px 16px rgba(139,92,246,.4)}
.psp-book-cta:active{transform:translateY(1px)}
.psp-book-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center}
.psp-book-overlay.open{display:flex}
.psp-book-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92dvh;overflow-y:auto;padding:8px 16px 24px;border-top:1px solid var(--bord)}
.psp-book-handle{width:44px;height:4px;background:var(--bord);border-radius:2px;margin:8px auto 14px}
.psp-step-bar{display:flex;gap:4px;margin-bottom:14px}
.psp-step-dot{flex:1;height:3px;background:var(--bord);border-radius:2px;transition:.2s}
.psp-step-dot.on{background:linear-gradient(90deg,#8B5CF6,#3B82F6)}
.psp-step-title{font-family:var(--font-h);font-size:18px;font-weight:800;margin-bottom:14px}
.psp-svc-pick{padding:14px;background:var(--surf);border:1.5px solid var(--bord);border-radius:12px;margin-bottom:8px;cursor:pointer;display:flex;gap:12px;align-items:center;transition:.15s}
.psp-svc-pick:hover{border-color:#8B5CF6}
.psp-svc-pick.on{border-color:#8B5CF6;background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(59,130,246,.06))}
.psp-svc-pick-img{width:40px;height:40px;border-radius:9px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.psp-svc-pick-img img{width:100%;height:100%;object-fit:cover}
.psp-svc-pick-body{flex:1;min-width:0}
.psp-svc-pick-name{font-family:var(--font-h);font-weight:700;font-size:14px;color:var(--text)}
.psp-svc-pick-meta{font-size:11.5px;color:var(--t2);margin-top:1px}
.psp-svc-pick-price{font-family:var(--font-h);font-weight:800;font-size:14px;color:#8B5CF6}
.psp-prv-pick{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surf);border:1.5px solid var(--bord);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.15s}
.psp-prv-pick:hover{border-color:#8B5CF6}
.psp-prv-pick.on{border-color:#8B5CF6;background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(59,130,246,.06))}
.psp-prv-avatar{width:38px;height:38px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:800;color:var(--t2);overflow:hidden;flex-shrink:0}
.psp-prv-avatar img{width:100%;height:100%;object-fit:cover}
.psp-prv-pick-name{font-family:var(--font-h);font-weight:700;font-size:13.5px}
.psp-prv-pick-role{font-size:11px;color:var(--t2)}
.psp-date-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.psp-date-tile{padding:10px 4px;background:var(--surf);border:1.5px solid var(--bord);border-radius:10px;text-align:center;cursor:pointer;font-family:var(--font-h);transition:.15s}
.psp-date-tile:hover{border-color:#8B5CF6}
.psp-date-tile.on{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(59,130,246,.08));border-color:#8B5CF6;color:#8B5CF6}
.psp-date-day{font-size:10px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.psp-date-num{font-size:17px;font-weight:800;margin-top:2px}
.psp-date-mon{font-size:10px;color:var(--t2);margin-top:1px}
.psp-slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
.psp-slot{padding:10px 4px;background:var(--surf);border:1.5px solid var(--bord);border-radius:10px;text-align:center;cursor:pointer;font-family:var(--font-h);font-weight:700;font-size:13px;transition:.15s}
.psp-slot:hover{border-color:#8B5CF6}
.psp-slot.on{background:linear-gradient(135deg,#8B5CF6,#3B82F6);color:#fff;border-color:#8B5CF6}
.psp-slot-empty{grid-column:1/-1;text-align:center;padding:20px;color:var(--t2);font-size:13px}
.psp-form-fld{margin-bottom:10px}
.psp-form-fld label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px}
.psp-form-fld input,.psp-form-fld textarea{width:100%;padding:11px 12px;background:var(--surf);border:1px solid var(--bord);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.psp-form-fld input:focus,.psp-form-fld textarea:focus{border-color:#8B5CF6}
.psp-summary-card{background:var(--surf);border:1.5px solid #8B5CF6;border-radius:12px;padding:14px;margin-bottom:14px}
.psp-summary-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.psp-summary-row span:first-child{color:var(--t2)}
.psp-summary-row span:last-child{font-weight:700;color:var(--text)}
.psp-step-btns{display:flex;gap:8px;margin-top:14px}
.psp-btn-back{flex:0 0 35%;padding:12px;background:var(--surf2);color:var(--text);border:1px solid var(--bord);border-radius:11px;font-family:var(--font-h);font-weight:700;font-size:13.5px;cursor:pointer}
.psp-btn-next{flex:1;padding:12px;background:linear-gradient(135deg,#8B5CF6,#3B82F6);color:#fff;border:none;border-radius:11px;font-family:var(--font-h);font-weight:800;font-size:13.5px;cursor:pointer}
.psp-btn-next:disabled{opacity:.5;cursor:not-allowed}
.psp-success{text-align:center;padding:30px 14px}
.psp-success-emoji{font-size:64px;margin-bottom:12px}
.psp-success-title{font-family:var(--font-h);font-size:22px;font-weight:800;margin-bottom:8px}
.psp-success-msg{color:var(--t2);font-size:13.5px;line-height:1.6;margin-bottom:18px}
.psp-success-id{font-family:monospace;font-size:11px;color:var(--t2);background:var(--surf);padding:6px 10px;border-radius:6px;border:1px dashed var(--bord);display:inline-block}

/* Footer */
.psp-foot{margin-top:20px;text-align:center;padding:18px 16px;background:var(--surf);border:1px solid var(--bord);border-radius:16px}
.psp-foot-line{font-size:12px;color:var(--t2);margin-bottom:8px;letter-spacing:.3px}
.psp-foot-cta{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:700;font-size:13px;padding:10px 18px;border-radius:12px;text-decoration:none}
.psp-foot-cta:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(245,166,35,.3)}
.psp-foot-sub{font-size:11px;color:var(--t2);margin-top:8px;letter-spacing:.3px}

@media(max-width:380px){
  .psp-actions{grid-template-columns:1fr 1fr}
  .psp-name{font-size:21px}
}
</style>

<script>
// ════ Public Shop Page renderer ══════════════════════════════════════
// Reads slug from URL pathname /s/[slug], resolves via Supabase RPC,
// renders single-page profile with WhatsApp/Call/Directions/Share actions.
// Logs page view (anon-callable RPC).
// ════════════════════════════════════════════════════════════════════

const SB_URL = 'https://jfqeirfrkjdkqqixivru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcWVpcmZya2pka3FxaXhpdnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzQ4MzgsImV4cCI6MjA4OTk1MDgzOH0.akd4E0nil8ypLR4WOykkeYIL8g4uuNU6XdSVh_Y1utk';
const sb = supabase.createClient(SB_URL, SB_KEY);

function escHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getSlugFromUrl() {
  // Vercel rewrites /s/:slug → /s.html?slug=:slug, but the visible URL stays /s/foo
  // Check both query string AND pathname.
  const qs = new URLSearchParams(window.location.search);
  if (qs.get('slug')) return qs.get('slug').toLowerCase().trim();
  const path = window.location.pathname;
  const match = path.match(/^\/s\/([a-z0-9-]+)\/?$/i);
  if (match) return match[1].toLowerCase().trim();
  return null;
}

function buildWhatsAppLink(phone, shopName) {
  if (!phone) return null;
  const clean = String(phone).replace(/[^0-9]/g, '');
  if (clean.length < 10) return null;
  const withCountry = clean.length === 10 ? '91' + clean : clean;
  const msg = encodeURIComponent(`Hi! I found your shop on ShopBill Pro. ${shopName ? '(' + shopName + ')' : ''}`);
  return `https://wa.me/${withCountry}?text=${msg}`;
}

function buildPhoneLink(phone) {
  if (!phone) return null;
  return `tel:${String(phone).replace(/[^0-9+]/g, '')}`;
}

function buildMapsLink(addr, city) {
  const q = encodeURIComponent([addr, city].filter(Boolean).join(', '));
  if (!q) return null;
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}

function setMeta(name, value) {
  let tag = document.querySelector(`meta[name="${name}"]`) || document.querySelector(`meta[property="${name}"]`);
  if (!tag) {
    tag = document.createElement('meta');
    if (name.startsWith('og:')) tag.setAttribute('property', name);
    else tag.setAttribute('name', name);
    document.head.appendChild(tag);
  }
  tag.setAttribute('content', value);
}

async function logView(slug) {
  try { await sb.rpc('sbp_log_shop_page_view', { p_slug: slug }); }
  catch(e) { /* silently ignore */ }
}

async function logWaClick(slug) {
  try { await sb.rpc('sbp_log_whatsapp_click', { p_slug: slug }); }
  catch(e) { /* silently ignore */ }
}

function renderEmpty(title, msg, ctaText) {
  document.getElementById('psp-root').innerHTML = `
    <div class="psp-empty">
      <div class="psp-empty-emoji">🏪</div>
      <div class="psp-empty-title">${escHtml(title)}</div>
      <div class="psp-empty-msg">${escHtml(msg)}</div>
      <a href="https://app.shopbillpro.in/signup.html" class="psp-cta">${escHtml(ctaText || 'Get your free shop page →')}</a>
    </div>`;
}

function renderShop(data) {
  const c = data.content || {};
  const slug = data.slug;
  const shopName = c.name || data.shop_name || 'Shop';
  const tagline = c.tagline || '';
  const phone = c.phone || '';
  const wa = c.whatsapp || phone || '';
  const email = c.email || '';
  const addr = c.address || '';
  const city = c.city || '';
  const fullAddr = [addr, city].filter(Boolean).join(', ');
  const gst = c.gst_number || '';
  const upi = c.upi || '';
  const hours = c.hours || '';
  const photoUrl = c.photo_url || '';
  const services = Array.isArray(c.services) ? c.services : [];
  const showPoweredBy = c.show_powered_by !== false;

  // SEO meta tags
  document.title = `${shopName} · ShopBill Pro`;
  setMeta('description', tagline || `Visit ${shopName}. Find contact, address, hours and services. A business on ShopBill Pro.`);
  setMeta('og:title', shopName);
  setMeta('og:description', tagline || `Contact ${shopName}`);

  const initial = (shopName.match(/[A-Za-z\u0900-\u097F]/) || ['S'])[0].toUpperCase();
  const photoHtml = photoUrl
    ? `<img src="${escHtml(photoUrl)}" alt="${escHtml(shopName)}" onerror="this.style.display='none';this.parentElement.textContent='${escHtml(initial)}'">`
    : escHtml(initial);

  const waLink = buildWhatsAppLink(wa, shopName);
  const phoneLink = buildPhoneLink(phone);
  const mapsLink = buildMapsLink(addr, city);

  let actionsHtml = '<div class="psp-actions">';
  if (waLink) {
    actionsHtml += `<a href="${escHtml(waLink)}" class="psp-act wa" target="_blank" rel="noopener" onclick="window.__pspLogWa()"><div class="psp-act-ic">💬</div><div>WhatsApp</div></a>`;
  }
  if (phoneLink) {
    actionsHtml += `<a href="${escHtml(phoneLink)}" class="psp-act call"><div class="psp-act-ic">📞</div><div>Call</div></a>`;
  }
  if (mapsLink) {
    actionsHtml += `<a href="${escHtml(mapsLink)}" class="psp-act dirs" target="_blank" rel="noopener"><div class="psp-act-ic">📍</div><div>Directions</div></a>`;
  }
  actionsHtml += `<a href="javascript:void(0)" class="psp-act share" onclick="window.__pspShare()"><div class="psp-act-ic">🔗</div><div>Share</div></a>`;
  actionsHtml += '</div>';

  // Info card with hours / address / contact
  let infoRows = '';
  if (hours) infoRows += `<div class="psp-row"><div class="psp-row-ic">🕒</div><div class="psp-row-val">${escHtml(hours)}</div></div>`;
  if (fullAddr) infoRows += `<div class="psp-row"><div class="psp-row-ic">📍</div><div class="psp-row-val">${escHtml(fullAddr)}</div></div>`;
  if (phone) infoRows += `<div class="psp-row"><div class="psp-row-ic">📞</div><div class="psp-row-val">${escHtml(phone)}</div></div>`;
  if (email) infoRows += `<div class="psp-row"><div class="psp-row-ic">✉️</div><div class="psp-row-val"><a href="mailto:${escHtml(email)}">${escHtml(email)}</a></div></div>`;
  if (gst) infoRows += `<div class="psp-row"><div class="psp-row-ic">🧾</div><div class="psp-row-val">GSTIN: ${escHtml(gst)}</div></div>`;

  const infoCard = infoRows ? `<div class="psp-card"><div class="psp-card-h">📋 Business info</div>${infoRows}</div>` : '';

  // Services (legacy fallback from content_json — replaced by async DB load below)
  let servicesCard = '';
  if (services.length > 0) {
    const items = services.map(s => `<div class="psp-svc">${escHtml(typeof s === 'string' ? s : s.name || '')}</div>`).join('');
    servicesCard = `<div class="psp-card" id="psp-services-card"><div class="psp-card-h">✨ What we offer</div><div class="psp-services">${items}</div></div>`;
  } else {
    // Empty placeholder — fills async via sbp_get_shop_services_public RPC
    servicesCard = `<div id="psp-services-card" style="display:none"></div>`;
  }

  // About section (Pro+ feature, from content_json.about)
  const aboutText = c.about || '';
  let aboutCard = '';
  if (aboutText) {
    aboutCard = `<div class="psp-card"><div class="psp-card-h">📖 About us</div><div class="psp-about-text">${escHtml(aboutText)}</div></div>`;
  }

  // Gallery (Pro+ feature, from content_json.gallery — array of image URLs)
  const gallery = Array.isArray(c.gallery) ? c.gallery.filter(u => u && typeof u === 'string') : [];
  let galleryCard = '';
  if (gallery.length > 0) {
    // BATCH 012 FIX (BUG-008): each tile reports load/error to parent card.
    // If all images fail (broken URLs / placeholder data), hide the entire
    // card after the dust settles, so customers don't see an empty box.
    const tiles = gallery.slice(0, 6).map((url, i) =>
      `<div class="psp-gal-tile" data-i="${i}"><img src="${escHtml(url)}" alt="" loading="lazy"
         onload="this.parentElement.dataset.ok='1';if(window._pspGalCheck)window._pspGalCheck()"
         onerror="this.parentElement.style.display='none';if(window._pspGalCheck)window._pspGalCheck()"></div>`
    ).join('');
    galleryCard = `<div class="psp-card" id="psp-gallery-card"><div class="psp-card-h">📸 Gallery</div><div class="psp-gallery" data-total="${gallery.length}">${tiles}</div></div>`;
  }

  // Footer (Powered by)
  const footerHtml = showPoweredBy ? `
    <div class="psp-foot">
      <div class="psp-foot-line">⚡ Powered by ShopBill Pro</div>
      <a href="https://app.shopbillpro.in/signup.html" class="psp-foot-cta" target="_blank" rel="noopener">
        Get your free shop page →
      </a>
      <div class="psp-foot-sub">Free GST billing · WhatsApp bills · Multi-staff · Reports</div>
    </div>` : '';

  document.getElementById('psp-root').innerHTML = `
    <div class="psp-hero">
      <div class="psp-photo">${photoHtml}</div>
      <h1 class="psp-name">${escHtml(shopName)}</h1>
      ${tagline ? `<p class="psp-tagline">${escHtml(tagline)}</p>` : ''}
      <div class="psp-badge">✓ Verified on ShopBill Pro</div>
    </div>
    ${actionsHtml}
    <div id="psp-book-cta-slot"></div>
    ${aboutCard}
    ${servicesCard}
    ${galleryCard}
    ${infoCard}
    ${footerHtml}
  `;

  // Wire up share + WhatsApp logger
  window.__pspShare = function() {
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({ title: shopName, url }).catch(() => {});
    } else {
      navigator.clipboard?.writeText(url).then(() => {
        alert('Link copied!');
      }).catch(() => {
        prompt('Copy this link:', url);
      });
    }
  };
  window.__pspLogWa = function() { logWaClick(slug); };

  // BATCH 012 FIX (BUG-008): if every gallery image fails to load
  // (broken URLs, placeholder data, expired CDN links), hide the
  // whole gallery card so customers don't see an empty box.
  // Each tile's onload/onerror calls this; we check after a short
  // settle delay (covers cached vs network image loads).
  window._pspGalCheck = function() {
    setTimeout(() => {
      const card = document.getElementById('psp-gallery-card');
      if (!card) return;
      const okTiles = card.querySelectorAll('.psp-gal-tile[data-ok="1"]');
      if (okTiles.length === 0) card.style.display = 'none';
    }, 100);
  };

  // Log view (fire and forget)
  logView(slug);
}

// Load services from public RPC (sbp_get_shop_services_public)
// First API-first storefront endpoint — anon-callable, no auth required.
async function loadServicesPublic(slug) {
  try {
    const { data, error } = await sb.rpc('sbp_get_shop_services_public', { p_slug: slug });
    if (error || !data || !data.ok || !Array.isArray(data.services) || data.services.length === 0) {
      return; // Silent fail: legacy content_json.services may already be rendered
    }

    const card = document.getElementById('psp-services-card');
    if (!card) return;

    const items = data.services.map(s => {
      const img = s.image_url
        ? `<img src="${escHtml(s.image_url)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'">`
        : '✨';
      const price = (typeof s.price === 'number' && s.price > 0) ? '₹' + Math.round(s.price).toLocaleString('en-IN') : '';
      const dur = s.duration_minutes ? `⏱ ${s.duration_minutes} min` : '';
      const cat = s.category ? escHtml(s.category) : '';
      const desc = s.description ? `<div class="psp-svc-desc">${escHtml(s.description)}</div>` : '';
      const meta = [dur, cat].filter(Boolean).map(x => `<span class="psp-svc-meta-tag">${x}</span>`).join('');

      return `<div class="psp-svc-row">
        <div class="psp-svc-img">${img}</div>
        <div class="psp-svc-info">
          <div class="psp-svc-name">${escHtml(s.name || '')}</div>
          ${desc}
          ${meta ? `<div class="psp-svc-meta">${meta}</div>` : ''}
        </div>
        ${price ? `<div class="psp-svc-price">${price}</div>` : ''}
      </div>`;
    }).join('');

    card.style.display = '';
    card.className = 'psp-card';
    card.innerHTML = `<div class="psp-card-h">✨ Services</div><div class="psp-services-rich">${items}</div>`;
  } catch (e) {
    console.warn('[PSP] services load failed:', e);
    // Silent fail — page still works without services
  }
}

async function init() {
  const slug = getSlugFromUrl();

  if (!slug) {
    renderEmpty(
      'Page not found',
      'This shop link looks incomplete. Check the URL and try again.',
      'Get your free shop page →'
    );
    return;
  }

  try {
    const { data, error } = await sb.rpc('sbp_resolve_shop_slug', { p_slug: slug });

    if (error) throw error;

    if (!data || !data.ok) {
      renderEmpty(
        'Shop not found',
        `We couldn't find a shop at /s/${slug}. The shop may have changed its URL or removed their page.`,
        'Get your free shop page →'
      );
      return;
    }

    // Handle redirect (slug changed but old URL still active for 12 months)
    if (data.redirect && data.new_slug) {
      window.location.replace('/s/' + data.new_slug);
      return;
    }

    renderShop(data);
    // Async: load services from sbp_services table via public RPC
    // (separate from resolve_shop_slug to keep the resolve cacheable + fast)
    loadServicesPublic(slug);
    // Async: load appointment config — shows Book CTA if shop has Business plan + active providers
    loadAppointmentConfig(slug);
  } catch (err) {
    console.error('[PSP] resolve error:', err);
    renderEmpty(
      'Could not load shop',
      'Something went wrong. Please refresh or try again later.',
      'Visit ShopBill Pro →'
    );
  }
}

// ════════════════════════════════════════════════════════════════════
// APPOINTMENT BOOKING FLOW (011_appointments)
// Public storefront feature — anon-callable, no auth.
// Loads via sbp_get_appointment_config_public; only shows CTA if enabled.
// ════════════════════════════════════════════════════════════════════

const _bookState = {
  slug: null,
  config: null,
  step: 1,
  service: null,
  provider: null,
  date: null,           // YYYY-MM-DD
  slot: null,           // {starts_at, ends_at, time_label}
  customer: { name: '', phone: '', wa: '', notes: '' }
};

async function loadAppointmentConfig(slug) {
  try {
    const { data, error } = await sb.rpc('sbp_get_appointment_config_public', { p_slug: slug });
    if (error || !data || !data.ok || !data.enabled) return;

    _bookState.slug = slug;
    _bookState.config = data;

    const slot = document.getElementById('psp-book-cta-slot');
    if (!slot) return;
    slot.innerHTML = `<button class="psp-book-cta" onclick="openBookingFlow()">📅 Book Appointment</button>`;
  } catch (e) {
    console.warn('[PSP] appointment config load failed:', e);
  }
}

function openBookingFlow() {
  if (!_bookState.config) return;
  // Reset
  _bookState.step = 1;
  _bookState.service = null;
  _bookState.provider = null;
  _bookState.date = null;
  _bookState.slot = null;
  _bookState.customer = { name: '', phone: '', wa: '', notes: '' };

  const overlay = document.getElementById('psp-book-overlay');
  overlay.classList.add('open');
  overlay.addEventListener('click', e => { if (e.target === overlay) closeBookingFlow(); }, { once: true });

  // Skip step 1 (service) if 0 services — go straight to provider
  // Skip step 2 (provider) if 1 provider — auto-select
  startBookingFlow();
}

function closeBookingFlow() {
  document.getElementById('psp-book-overlay').classList.remove('open');
}

function startBookingFlow() {
  const services = _bookState.config.services || [];
  const providers = _bookState.config.providers || [];

  // If no services configured, skip service step entirely
  if (services.length === 0) {
    _bookState.step = 2;
  }

  // If only 1 provider, auto-select and skip
  if (providers.length === 1) {
    _bookState.provider = providers[0];
    if (_bookState.step <= 2) _bookState.step = 3;
  }

  renderBookingStep();
}

function _updateStepBar() {
  document.querySelectorAll('.psp-step-dot').forEach(d => {
    const s = parseInt(d.dataset.step, 10);
    d.classList.toggle('on', s <= _bookState.step);
  });
}

function renderBookingStep() {
  _updateStepBar();
  const step = _bookState.step;
  const root = document.getElementById('psp-book-step');

  if (step === 1) renderStepService(root);
  else if (step === 2) renderStepProvider(root);
  else if (step === 3) renderStepDate(root);
  else if (step === 4) renderStepSlot(root);
  else if (step === 5) renderStepConfirm(root);
  else if (step === 6) renderStepSuccess(root);
}

// ── Step 1: Service ──
function renderStepService(root) {
  const services = _bookState.config.services || [];
  const selectedId = _bookState.service ? _bookState.service.id : null;

  root.innerHTML = `
    <div class="psp-step-title">Choose a service</div>
    <div>
      <div class="psp-svc-pick ${!selectedId ? 'on' : ''}" onclick="pickService(null)">
        <div class="psp-svc-pick-img">📌</div>
        <div class="psp-svc-pick-body">
          <div class="psp-svc-pick-name">General appointment</div>
          <div class="psp-svc-pick-meta">No specific service</div>
        </div>
      </div>
      ${services.map(s => {
        const dur = s.duration_minutes ? s.duration_minutes + ' min' : '';
        const meta = [s.category, dur].filter(Boolean).join(' · ');
        const img = s.image_url ? `<img src="${escHtml(s.image_url)}" alt="" onerror="this.parentElement.textContent='✨'">` : '✨';
        return `<div class="psp-svc-pick ${selectedId===s.id?'on':''}" onclick="pickService('${s.id}')">
          <div class="psp-svc-pick-img">${img}</div>
          <div class="psp-svc-pick-body">
            <div class="psp-svc-pick-name">${escHtml(s.name)}</div>
            <div class="psp-svc-pick-meta">${escHtml(meta)}</div>
          </div>
          ${parseFloat(s.price)>0 ? `<div class="psp-svc-pick-price">₹${parseFloat(s.price).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>` : ''}
        </div>`;
      }).join('')}
    </div>
    <div class="psp-step-btns">
      <button class="psp-btn-back" onclick="closeBookingFlow()">Cancel</button>
      <button class="psp-btn-next" onclick="bookingNext()">Continue →</button>
    </div>`;
}

function pickService(id) {
  const services = _bookState.config.services || [];
  _bookState.service = id ? services.find(s => s.id === id) : null;
  // Update visual selection
  document.querySelectorAll('.psp-svc-pick').forEach(el => el.classList.remove('on'));
  event.currentTarget.classList.add('on');
}

// ── Step 2: Provider ──
function renderStepProvider(root) {
  const providers = _bookState.config.providers || [];
  const selectedId = _bookState.provider ? _bookState.provider.id : null;

  if (providers.length === 0) {
    root.innerHTML = `
      <div class="psp-step-title">No staff available</div>
      <p style="color:var(--t2);font-size:13px">This shop hasn't configured booking yet. Try contacting them directly.</p>
      <div class="psp-step-btns">
        <button class="psp-btn-next" onclick="closeBookingFlow()">Close</button>
      </div>`;
    return;
  }

  const dowNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  root.innerHTML = `
    <div class="psp-step-title">Choose someone</div>
    <div>
      ${providers.map(p => {
        const days = (p.working_days || []).map(d => dowNames[d]).join(', ');
        const initial = (p.name.match(/[A-Za-z\u0900-\u097F]/) || ['?'])[0].toUpperCase();
        const av = p.photo_url ? `<img src="${escHtml(p.photo_url)}" alt="" onerror="this.parentElement.textContent='${escHtml(initial)}'">` : escHtml(initial);
        return `<div class="psp-prv-pick ${selectedId===p.id?'on':''}" onclick="pickProvider('${p.id}')">
          <div class="psp-prv-avatar">${av}</div>
          <div style="flex:1;min-width:0">
            <div class="psp-prv-pick-name">${escHtml(p.name)}</div>
            <div class="psp-prv-pick-role">${p.role?escHtml(p.role)+' · ':''}${escHtml(days)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="psp-step-btns">
      <button class="psp-btn-back" onclick="bookingBack()">← Back</button>
      <button class="psp-btn-next" onclick="bookingNext()" id="step-next-btn" ${selectedId?'':'disabled'}>Continue →</button>
    </div>`;
}

function pickProvider(id) {
  const providers = _bookState.config.providers || [];
  _bookState.provider = providers.find(p => p.id === id) || null;
  document.querySelectorAll('.psp-prv-pick').forEach(el => el.classList.remove('on'));
  event.currentTarget.classList.add('on');
  const nextBtn = document.getElementById('step-next-btn');
  if (nextBtn) nextBtn.disabled = false;
}

// ── Step 3: Date ──
function renderStepDate(root) {
  const provider = _bookState.provider;
  const workingDays = provider ? (provider.working_days || []) : [0,1,2,3,4,5,6];

  // Build next 21 days
  const tiles = [];
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < 21; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const dow = d.getDay();
    if (workingDays.indexOf(dow) < 0) continue;  // skip closed days
    const iso = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const dayLbl = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dow];
    const monLbl = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    const isOn = _bookState.date === iso;
    tiles.push(`<div class="psp-date-tile ${isOn?'on':''}" onclick="pickDate('${iso}')">
      <div class="psp-date-day">${dayLbl}${i===0?' (Today)':''}</div>
      <div class="psp-date-num">${d.getDate()}</div>
      <div class="psp-date-mon">${monLbl}</div>
    </div>`);
  }

  root.innerHTML = `
    <div class="psp-step-title">Pick a date</div>
    ${tiles.length === 0 ? '<p style="color:var(--t2);font-size:13px;padding:20px 0">No working days available in next 3 weeks.</p>' : `<div class="psp-date-grid">${tiles.join('')}</div>`}
    <div class="psp-step-btns">
      <button class="psp-btn-back" onclick="bookingBack()">← Back</button>
      <button class="psp-btn-next" onclick="bookingNext()" id="step-next-btn" ${_bookState.date?'':'disabled'}>Continue →</button>
    </div>`;
}

function pickDate(iso) {
  _bookState.date = iso;
  _bookState.slot = null;  // clear any previous slot pick
  document.querySelectorAll('.psp-date-tile').forEach(el => el.classList.remove('on'));
  event.currentTarget.classList.add('on');
  const nextBtn = document.getElementById('step-next-btn');
  if (nextBtn) nextBtn.disabled = false;
}

// ── Step 4: Time slot ──
async function renderStepSlot(root) {
  const provider = _bookState.provider;
  const date = _bookState.date;
  const service = _bookState.service;
  const duration = service && service.duration_minutes ? service.duration_minutes : (provider.slot_interval_minutes || 30);

  root.innerHTML = `
    <div class="psp-step-title">Pick a time</div>
    <div style="font-size:12.5px;color:var(--t2);margin-bottom:10px">
      ${escHtml(provider.name)} · ${new Date(date).toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'})} · ${duration} min
    </div>
    <div id="psp-slots-container" style="display:flex;justify-content:center;padding:30px">
      <div class="psp-spin" style="border-top-color:#8B5CF6"></div>
    </div>
    <div class="psp-step-btns">
      <button class="psp-btn-back" onclick="bookingBack()">← Back</button>
      <button class="psp-btn-next" onclick="bookingNext()" id="step-next-btn" disabled>Continue →</button>
    </div>`;

  try {
    const { data, error } = await sb.rpc('sbp_get_available_slots_public', {
      p_slug: _bookState.slug,
      p_provider_id: provider.id,
      p_date: date,
      p_duration_minutes: duration
    });

    const cont = document.getElementById('psp-slots-container');
    if (!cont) return;  // user navigated away

    if (error || !data || !data.ok) {
      cont.innerHTML = `<div class="psp-slot-empty">⚠️ Could not load slots${data&&data.error?': '+escHtml(data.error):''}</div>`;
      return;
    }

    const slots = data.slots || [];
    if (slots.length === 0) {
      const reason = data.reason === 'closed' ? 'Closed on this day' : (data.reason === 'blocked' ? 'Blocked off' : 'All slots taken or already passed');
      cont.innerHTML = `<div class="psp-slot-empty">😔 ${escHtml(reason)}<br><span style="font-size:11px">Try another date</span></div>`;
      return;
    }

    _bookState._slotsCache = slots;  // remember for picker
    cont.outerHTML = `<div class="psp-slot-grid" id="psp-slots-container">${slots.map((s, i) => {
      const isOn = _bookState.slot && _bookState.slot.starts_at === s.starts_at;
      return `<div class="psp-slot ${isOn?'on':''}" onclick="pickSlot(${i})">${escHtml(s.time_label)}</div>`;
    }).join('')}</div>`;
  } catch (e) {
    const cont = document.getElementById('psp-slots-container');
    if (cont) cont.innerHTML = `<div class="psp-slot-empty">⚠️ Network error. Please retry.</div>`;
  }
}

function pickSlot(idx) {
  const slots = _bookState._slotsCache || [];
  _bookState.slot = slots[idx] || null;
  document.querySelectorAll('.psp-slot').forEach(el => el.classList.remove('on'));
  event.currentTarget.classList.add('on');
  const nextBtn = document.getElementById('step-next-btn');
  if (nextBtn) nextBtn.disabled = false;
}

// ── Step 5: Customer info + Confirm ──
function renderStepConfirm(root) {
  const provider = _bookState.provider;
  const service = _bookState.service;
  const date = _bookState.date;
  const slot = _bookState.slot;
  const c = _bookState.customer;
  const dateLabel = new Date(date).toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long'});

  root.innerHTML = `
    <div class="psp-step-title">Your details</div>
    <div class="psp-summary-card">
      ${service ? `<div class="psp-summary-row"><span>Service</span><span>${escHtml(service.name)}</span></div>` : ''}
      <div class="psp-summary-row"><span>With</span><span>${escHtml(provider.name)}</span></div>
      <div class="psp-summary-row"><span>Date</span><span>${escHtml(dateLabel)}</span></div>
      <div class="psp-summary-row"><span>Time</span><span>${escHtml(slot.time_label)}</span></div>
      ${service && parseFloat(service.price)>0 ? `<div class="psp-summary-row" style="border-top:1px dashed var(--bord);padding-top:8px;margin-top:4px"><span>Price</span><span style="color:#8B5CF6">₹${parseFloat(service.price).toLocaleString('en-IN',{maximumFractionDigits:0})}</span></div>` : ''}
    </div>
    <div class="psp-form-fld">
      <label>Your name *</label>
      <input type="text" id="bk-name" value="${escHtml(c.name)}" maxlength="80">
    </div>
    <div class="psp-form-fld">
      <label>Phone number *</label>
      <input type="tel" id="bk-phone" value="${escHtml(c.phone)}" maxlength="15" placeholder="10-digit number">
    </div>
    <div class="psp-form-fld">
      <label>WhatsApp (if different)</label>
      <input type="tel" id="bk-wa" value="${escHtml(c.wa)}" maxlength="15" placeholder="Optional">
    </div>
    <div class="psp-form-fld">
      <label>Notes (optional)</label>
      <textarea id="bk-notes" rows="2" maxlength="300" placeholder="Anything the shop should know?">${escHtml(c.notes)}</textarea>
    </div>
    <div class="psp-step-btns">
      <button class="psp-btn-back" onclick="bookingBack()">← Back</button>
      <button class="psp-btn-next" onclick="submitBooking()" id="step-next-btn">📅 Confirm Booking</button>
    </div>`;
}

async function submitBooking() {
  const name = (document.getElementById('bk-name').value || '').trim();
  const phone = (document.getElementById('bk-phone').value || '').trim();
  const wa = (document.getElementById('bk-wa').value || '').trim();
  const notes = (document.getElementById('bk-notes').value || '').trim();

  if (!name) { alert('Please enter your name'); return; }
  const cleanPhone = phone.replace(/[^0-9]/g, '');
  if (cleanPhone.length < 7) { alert('Please enter a valid phone number'); return; }

  _bookState.customer = { name, phone, wa, notes };

  const provider = _bookState.provider;
  const service = _bookState.service;
  const slot = _bookState.slot;
  const duration = service && service.duration_minutes ? service.duration_minutes : (provider.slot_interval_minutes || 30);

  const btn = document.getElementById('step-next-btn');
  btn.disabled = true; btn.textContent = '⏳ Booking…';

  try {
    const { data, error } = await sb.rpc('sbp_book_appointment_public', {
      p_slug: _bookState.slug,
      p_data: {
        provider_id: provider.id,
        service_id: service ? service.id : null,
        starts_at: slot.starts_at,
        duration_minutes: duration,
        customer_name: name,
        customer_phone: phone,
        customer_wa: wa || null,
        notes: notes || null
      }
    });

    if (error || !data || !data.ok) {
      const errMsg = data && data.error
        ? (data.error === 'slot_taken' ? 'That slot was just booked. Please pick another time.'
          : data.error === 'past_starts_at' ? 'That time has passed. Please pick a future slot.'
          : data.error === 'feature_disabled' ? 'Online booking is not available right now.'
          : data.error)
        : (error ? error.message : 'Booking failed');
      alert('Could not book: ' + errMsg);
      btn.disabled = false; btn.textContent = '📅 Confirm Booking';
      // If slot conflict, jump back to slot step to refresh
      if (data && data.error === 'slot_taken') {
        _bookState.slot = null;
        _bookState.step = 4;
        renderBookingStep();
      }
      return;
    }

    // Success
    _bookState.bookingResult = data;
    _bookState.step = 6;
    renderBookingStep();
  } catch (e) {
    alert('Network error. Please try again.');
    btn.disabled = false; btn.textContent = '📅 Confirm Booking';
  }
}

// ── Step 6: Success ──
function renderStepSuccess(root) {
  const r = _bookState.bookingResult || {};
  const provider = _bookState.provider;
  const slot = _bookState.slot;
  const date = _bookState.date;
  const dateLabel = new Date(date).toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long'});

  // Mark all step dots as on
  document.querySelectorAll('.psp-step-dot').forEach(d => d.classList.add('on'));

  root.innerHTML = `
    <div class="psp-success">
      <div class="psp-success-emoji">✅</div>
      <div class="psp-success-title">Booking received!</div>
      <div class="psp-success-msg">
        Your appointment is <strong>pending confirmation</strong> from the shop.<br>
        ${provider ? `<strong>${escHtml(provider.name)}</strong> · ` : ''}${escHtml(dateLabel)} · ${escHtml(slot.time_label)}
        <br><br>
        We'll send a WhatsApp confirmation shortly. Save your booking ID below in case you need to contact the shop.
      </div>
      <div class="psp-success-id">ID: ${escHtml((r.appointment_id || '').slice(0, 8))}</div>
    </div>
    <div class="psp-step-btns">
      <button class="psp-btn-next" onclick="closeBookingFlow()">Done</button>
    </div>`;
}

// ── Navigation ──
function bookingNext() {
  // Validation per step
  const step = _bookState.step;
  if (step === 2 && !_bookState.provider) { alert('Please pick someone'); return; }
  if (step === 3 && !_bookState.date) { alert('Please pick a date'); return; }
  if (step === 4 && !_bookState.slot) { alert('Please pick a time'); return; }

  // Skip provider step if only 1 provider (already auto-selected)
  let next = step + 1;
  if (next === 2 && (_bookState.config.providers || []).length === 1) {
    _bookState.provider = _bookState.config.providers[0];
    next = 3;
  }

  _bookState.step = next;
  renderBookingStep();
}

function bookingBack() {
  let prev = _bookState.step - 1;
  // Skip back over auto-selected provider step
  if (prev === 2 && (_bookState.config.providers || []).length === 1) {
    prev = 1;
  }
  // Skip back over service step if no services exist
  if (prev === 1 && (_bookState.config.services || []).length === 0) {
    closeBookingFlow();
    return;
  }
  if (prev < 1) {
    closeBookingFlow();
    return;
  }
  _bookState.step = prev;
  renderBookingStep();
}

init();
</script>

</body>
