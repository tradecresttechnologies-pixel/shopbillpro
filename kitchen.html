<!-- BATCH 067-hotfix (15-May-26): render the sidebar synchronously at parse
     time so this page doesn't appear sidebar-less for ~300ms while async
     data loads. Mirrors the canonical pattern used by dashboard / bills /
     customers / settings. The page's own SBPSidebar.render() calls inside
     render() still fire later — they're idempotent re-renders. -->
<script>
(function(){
  if (!window.SBPSidebar || typeof window.SBPSidebar.render !== 'function') {
    console.warn('[067-hf] SBPSidebar lib not loaded — sidebar will not render');
    return;
  }
  function renderForViewport(){
    if (window.innerWidth >= 1024) {
      window.SBPSidebar.render({ layout: 'desktop', currentPage: 'kitchen' });
    } else {
      window.SBPSidebar.render({ layout: 'mobile-bottom', currentPage: 'kitchen', container: '.bnav' });
      window.SBPSidebar.render({ layout: 'mobile-drawer', currentPage: 'kitchen', container: '.bnav-drawer' });
    }
  }
  renderForViewport();
  var lastIsDesktop = window.innerWidth >= 1024;
  var resizeTimer = null;
  window.addEventListener('resize', function(){
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      var isDesktop = window.innerWidth >= 1024;
      if (isDesktop !== lastIsDesktop) { lastIsDesktop = isDesktop; renderForViewport(); }
    }, 100);
  });
})();
</script>

let _miCount  = 1;

function toast(msg,type='i'){const h=document.getElementById('toast-host');const e=document.createElement('div');e.className='toast '+type;e.textContent=msg;h.appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),200)},2500);}
function escHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ── Load ──────────────────────────────────────────────────────────
async function loadOrders(){
  if(!_shopId) return;
  const { data, error } = await _sb.rpc('sbp_orders_list',{p_shop_id:_shopId, p_status:_filter});
  if(error || !data?.ok){ console.warn('[KDS] load error:', error?.message); return; }
  _orders = data.orders || [];
  render();
  updateRefreshLabel();
  // Update pending badge
  const active = _orders.filter(o=>o.status==='pending'||o.status==='in_progress').length;
  const badge = document.getElementById('pending-badge');
  if(badge){
    badge.textContent = active > 0 ? active + ' active' : 'All clear';
    badge.className = 'kds-badge' + (active===0?' none':'');
  }
}

function updateRefreshLabel(){
  const t = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Kolkata'});
  const el = document.getElementById('refresh-label');
  if(el) el.textContent = 'Updated ' + t + ' · Auto-refresh every 20s';
}

// ── Filter ────────────────────────────────────────────────────────
function setFilter(f, el){
  _filter = f;
  document.querySelectorAll('.kf').forEach(k=>k.classList.toggle('on',k.dataset.f===f));
  loadOrders();
}

// ── Elapsed time ──────────────────────────────────────────────────
function elapsed(isoStr){
  const ms = Date.now() - new Date(isoStr).getTime();
  const m  = Math.floor(ms/60000);
  if(m < 1)  return 'Just now';
  if(m < 60) return m + 'm ago';
  return Math.floor(m/60) + 'h ' + (m%60) + 'm ago';
}
function elapsedColor(isoStr){
  const m = Math.floor((Date.now()-new Date(isoStr).getTime())/60000);
  if(m >= 20) return '#EF4444';   // red — very late
  if(m >= 10) return '#F5A623';   // orange — late
  return '#10B981';               // green — fresh
}

// ── Render ────────────────────────────────────────────────────────
function render(){
  const grid = document.getElementById('kds-grid');
  if(!_orders.length){
    const msgs = {active:'No active orders 🎉',pending:'No pending orders',in_progress:'Nothing in progress',done:'No completed orders in last 4h'};
    grid.innerHTML=`<div class="kds-empty" style="grid-column:1/-1"><div class="kds-empty-icon">✅</div><div class="kds-empty-title">${msgs[_filter]||'No orders'}</div><div class="kds-empty-msg">Orders from tables will appear here automatically.</div></div>`;
    SBPSidebar.render('kitchen');
    return;
  }

  grid.innerHTML = _orders.map(o => {
    const items = Array.isArray(o.items) ? o.items : [];
    const itemsHtml = items.map(it=>`
      <div class="oc-item">
        <div class="oc-qty">${it.qty||1}</div>
        <div><div class="oc-name">${escHtml(it.name||'')}</div>${it.notes?`<div class="oc-note">Note: ${escHtml(it.notes)}</div>`:''}</div>
      </div>`).join('');

    const t = elapsed(o.created_at);
    const tColor = elapsedColor(o.created_at);
    const kotNum = o.kot_number ? `KOT-${String(o.kot_number).padStart(3,'0')}` : '';
    const srcIcon = o.source==='qr'?'📱':o.source==='manual'?'✍️':'🖥️';

    let actions = '';
    if(o.status==='pending'){
      actions = `
        <button class="oc-btn start" onclick="setStatus('${o.id}','in_progress')">🔥 Start</button>
        <button class="oc-btn done"  onclick="setStatus('${o.id}','done')">✅ Done</button>
        <button class="oc-btn cancel" onclick="setStatus('${o.id}','cancelled')">✕</button>`;
    } else if(o.status==='in_progress'){
      actions = `
        <button class="oc-btn done" onclick="setStatus('${o.id}','done')">✅ Mark Done</button>
        <button class="oc-btn cancel" onclick="setStatus('${o.id}','cancelled')">✕ Cancel</button>`;
    } else if(o.status==='done'){
      actions = `<button class="oc-btn" onclick="setStatus('${o.id}','pending')">↩ Re-open</button>`;
    }

    return `
    <div class="order-card ${escHtml(o.status)}" id="oc-${o.id}">
      <div class="oc-hdr">
        <div>
          <div class="oc-table">T${escHtml(o.table_number)}</div>
          <div class="oc-kot">${kotNum} ${srcIcon}</div>
        </div>
        <div class="oc-status ${escHtml(o.status)}">${o.status==='pending'?'⏳ Pending':o.status==='in_progress'?'🔥 Cooking':'✅ Done'}</div>
        <div class="oc-time">
          <div style="color:${tColor}">${t}</div>
          <div class="oc-elapsed">${new Date(o.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'})}</div>
        </div>
      </div>
      <div class="oc-items">${itemsHtml}</div>
      ${o.notes?`<div class="oc-note-bar">📝 ${escHtml(o.notes)}</div>`:''}
      <div class="oc-actions">${actions}</div>
    </div>`;
  }).join('');

  SBPSidebar.render('kitchen');
}

// ── Set status ────────────────────────────────────────────────────
async function setStatus(orderId, newStatus){
  const { data, error } = await _sb.rpc('sbp_orders_set_status',{
    p_shop_id:_shopId, p_order_id:orderId, p_status:newStatus
  });
  if(error || !data?.ok){ toast('Update failed','e'); return; }

  const msgs = {in_progress:'🔥 Order started',done:'✅ Order complete',cancelled:'Order cancelled',pending:'Order re-opened'};
  toast(msgs[newStatus]||'Updated','s');

  // Optimistic UI update
  const idx = _orders.findIndex(o=>o.id===orderId);
  if(idx>=0){ _orders[idx].status=newStatus; render(); }
}

// ── Manual order modal ────────────────────────────────────────────
function openAddModal(){
  document.getElementById('m-table').value='';
  document.getElementById('m-notes').value='';
  document.getElementById('m-source').value='manual';
  document.getElementById('m-items-wrap').innerHTML=`
    <div class="manual-item-row">
      <input type="text" class="inp" placeholder="Item name..." id="mi-0-name">
      <input type="number" class="inp manual-item-qty" placeholder="Qty" id="mi-0-qty" min="1" value="1">
    </div>`;
  _miCount=1;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('m-table').focus(),100);
}

function closeModal(){document.getElementById('add-modal').classList.remove('open');}

function addItemRow(){
  const wrap = document.getElementById('m-items-wrap');
  const n = _miCount++;
  const row = document.createElement('div');
  row.className='manual-item-row';
  row.innerHTML=`<input type="text" class="inp" placeholder="Item name..." id="mi-${n}-name"><input type="number" class="inp manual-item-qty" placeholder="Qty" id="mi-${n}-qty" min="1" value="1">`;
  wrap.appendChild(row);
  row.querySelector('input').focus();
}

async function submitManualOrder(){
  const tableNum = document.getElementById('m-table').value.trim();
  if(!tableNum){toast('Enter table number','e');return;}

  const items = [];
  for(let i=0; i<_miCount; i++){
    const nameEl = document.getElementById('mi-'+i+'-name');
    const qtyEl  = document.getElementById('mi-'+i+'-qty');
    if(!nameEl) continue;
    const name = nameEl.value.trim();
    const qty  = parseInt(qtyEl?.value||1)||1;
    if(name) items.push({name, qty});
  }
  if(!items.length){toast('Add at least one item','e');return;}

  const source = document.getElementById('m-source').value;
  const notes  = document.getElementById('m-notes').value.trim();

  const { data, error } = await _sb.rpc('sbp_orders_add_manual',{
    p_shop_id: _shopId,
    p_data: { table_number: tableNum, items, source, notes: notes||null }
  });
  if(error || !data?.ok){toast('Failed: '+(data?.error||error?.message||'?'),'e');return;}

  closeModal();
  toast('🍳 KOT-'+String(data.kot_number||'').padStart(3,'0')+' sent to kitchen','s');
  await loadOrders();
}

// ── Auto refresh ──────────────────────────────────────────────────
function startTimer(){
  if(_timer) clearInterval(_timer);
  _timer = setInterval(loadOrders, 20_000);
}

// ── Init ──────────────────────────────────────────────────────────
(async function init(){
  if(!isBiz()){
    document.getElementById('kds-grid').innerHTML=`<div class="kds-empty" style="grid-column:1/-1"><div class="kds-empty-icon">👨‍🍳</div><div class="kds-empty-title">Kitchen Display — Business</div><div class="kds-empty-msg">The Kitchen Display System is part of the Business plan (₹499/mo). Restaurants get a 60-day free trial.</div></div>`;
    SBPSidebar.render('kitchen');
    return;
  }
  if(!_shopId){toast('No shop found — log in again','e');return;}
  await loadOrders();
  startTimer();
})();
</script>
