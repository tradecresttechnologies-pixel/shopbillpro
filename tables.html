/* ── Design tokens ── */
:root{--acc:#F5A623;--acc2:#EF4444;--acc3:#10B981;--acc4:#6366F1;--bg:#0A0E1A;--surf:#131826;--surf2:#1A2035;--bord:#252D3D;--text:#F0EFF8;--t2:#8A8AA8;--t3:#4A4A60;--font-h:'Outfit',system-ui,sans-serif;--r:12px;--tr:.15s ease;}
html[data-theme='light']{--bg:#F4F5F7;--surf:#FFFFFF;--surf2:#F0F2F5;--bord:#E2E5EA;--text:#0A0E1A;--t2:#6B7280;--t3:#9CA3AF;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-h),sans-serif;-webkit-font-smoothing:antialiased}
/* Layout */
#app-layout{display:flex;min-height:100vh}
#main-col{margin-left:220px}
/* ============================================================
   SIDEBAR REDESIGN v2 — rolled out (approved on dashboard).
   Modern app aesthetic: no native scrollbar, accent-bar active
   state, smooth hover, polished header/footer. Pure CSS; engine,
   DOM, mobile drawer, and any per-page #dsb position override are
   intentionally preserved (see POSITION_KEEP note per page).
   ============================================================ */
#dsb{
  position:fixed;left:0;top:0;bottom:0;width:236px;
  background: var(--surf);
  border-right:1px solid color-mix(in srgb, var(--bord) 60%, transparent);
  display:flex;flex-direction:column;z-index:200;
  overflow:hidden;
  box-shadow:1px 0 0 color-mix(in srgb, var(--bord) 40%, transparent);
}
.dsb-logo{
  display:flex;align-items:center;gap:11px;
  padding:20px 18px 16px;
  border-bottom:1px solid color-mix(in srgb, var(--bord) 55%, transparent);
  flex-shrink:0;
}
.dsb-logo img,.dsb-logo svg{width:26px;height:26px;border-radius:7px;flex-shrink:0}
.dsb-brand{
  font-family:var(--font-h);font-size:15.5px;font-weight:800;
  color:var(--text);letter-spacing:-.2px;line-height:1;
}
.dsb-brand .accent,.dsb-brand b{color:var(--acc)}
.dsb-nav{
  flex:1;min-height:0;padding:12px 10px;
  display:flex;flex-direction:column;gap:3px;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;
  scrollbar-color: color-mix(in srgb, var(--t3) 55%, transparent) transparent;
  -webkit-overflow-scrolling:touch;scroll-behavior:smooth;
}
.dsb-nav::-webkit-scrollbar{width:6px}
.dsb-nav::-webkit-scrollbar-track{background:transparent}
.dsb-nav::-webkit-scrollbar-thumb{
  background: color-mix(in srgb, var(--t3) 45%, transparent);border-radius:99px;
}
.dsb-nav:hover::-webkit-scrollbar-thumb{
  background: color-mix(in srgb, var(--t3) 70%, transparent);
}
.dsb-item{
  position:relative;display:flex;align-items:center;gap:12px;
  padding:10px 13px;border-radius:11px;cursor:pointer;
  text-decoration:none;color:var(--t2);
  font-size:13.5px;font-weight:600;letter-spacing:-.1px;
  transition:background .18s cubic-bezier(.4,0,.2,1),
             color .18s cubic-bezier(.4,0,.2,1),
             transform .15s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;border:none;background:none;width:100%;
  will-change:transform;
}
.dsb-item:hover{background: color-mix(in srgb, var(--surf2) 85%, transparent);color:var(--text)}
.dsb-item:active{transform:scale(.97)}
.dsb-item:focus-visible{outline:2px solid color-mix(in srgb, var(--acc) 60%, transparent);outline-offset:-2px}
.dsb-item.active{
  background: color-mix(in srgb, var(--acc) 14%, transparent);
  color:var(--acc);
}
.dsb-item::before{
  content:"";position:absolute;left:-10px;top:50%;
  width:3px;height:62%;
  transform:translateY(-50%) scaleY(0);
  transform-origin:center;
  background:var(--acc);border-radius:0 3px 3px 0;
  box-shadow:0 0 10px color-mix(in srgb, var(--acc) 60%, transparent);
  opacity:0;
  transition:transform .2s cubic-bezier(.4,0,.2,1),opacity .2s ease;
}
.dsb-item.active::before{
  transform:translateY(-50%) scaleY(1);
  opacity:1;
}
.dsb-item .lang-en,.dsb-item .lang-hi{display:inline}
.dsb-item.fab-sb{
  background:linear-gradient(135deg,var(--acc),#FF8A00);
  color:#0A0E1A;margin:2px 0 10px;font-weight:800;
  box-shadow:0 6px 16px color-mix(in srgb, var(--acc) 38%, transparent);
}
.dsb-item.fab-sb:hover{filter:brightness(1.05);color:#0A0E1A}
.dsb-item.fab-sb::before{display:none}
.dsb-item.coming-soon{opacity:.5;cursor:default}
.dsb-item.coming-soon:hover{background:none;color:var(--t2)}
.dsb-ic{
  font-size:18px;width:24px;text-align:center;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.dsb-badge{
  margin-left:auto;font-size:9px;font-weight:800;letter-spacing:.4px;
  border-radius:5px;padding:2px 6px;line-height:1;
}
.dsb-sep{height:1px;background:color-mix(in srgb, var(--bord) 55%, transparent);margin:9px 14px}
.dsb-more-label,.dsb-more-toggle{
  font-size:10.5px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;color:var(--t3);
}
.dsb-more-toggle{
  display:flex;align-items:center;gap:8px;padding:9px 13px;
  cursor:pointer;border-radius:10px;transition:background .15s ease;
}
.dsb-more-toggle:hover{background:color-mix(in srgb, var(--surf2) 70%, transparent)}
.dsb-more-arr{margin-left:auto;transition:transform .2s ease;font-size:11px}
.dsb-more-group.open .dsb-more-arr{transform:rotate(180deg)}
.dsb-footer{
  padding:10px 10px 12px;flex-shrink:0;
  border-top:1px solid color-mix(in srgb, var(--bord) 55%, transparent);
}
.dsb-logout{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:10px 13px;border-radius:11px;cursor:pointer;
  background:none;border:none;text-decoration:none;
  color:var(--t2);font-size:13.5px;font-weight:600;
  transition:background .15s ease,color .15s ease;
}
.dsb-logout:hover{background: color-mix(in srgb, #EF4444 14%, transparent);color:#EF4444}
.dsb-ver{
  font-size:10px;color:var(--t3);text-align:center;
  padding:9px 0 2px;letter-spacing:.4px;opacity:.75;
}
@media(max-width:1023px){#dsb{display:none!important}#main-col{margin-left:0!important;width:100%!important}}
#main-col{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;padding:0 16px;height:56px;background:var(--surf);border-bottom:1px solid var(--bord);gap:10px;position:sticky;top:0;z-index:30}
.topbar-title{font-size:17px;font-weight:800;flex:1}
.content{padding:14px;max-width:1000px;margin:0 auto;width:100%;padding-bottom:80px}
/* Tabs */
.tabs{display:flex;gap:6px;padding:12px 0 10px;border-bottom:1px solid var(--bord);margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 16px;border-radius:10px;border:1px solid transparent;background:transparent;font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;font-family:var(--font-h);transition:var(--tr);display:flex;align-items:center;gap:6px}
.tab.on{background:rgba(245,166,35,.12);color:var(--acc);border-color:rgba(245,166,35,.3)}
/* Summary strip */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.sum-box{background:var(--surf2);border:1px solid var(--bord);border-radius:12px;padding:12px;text-align:center}
.sum-v{font-size:24px;font-weight:900;line-height:1}
.sum-l{font-size:10px;color:var(--t2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
/* Section header */
.section-hd{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;padding:10px 0 6px;border-bottom:1px solid var(--bord);margin-bottom:10px}
/* Table grid */
.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.tcard{
  border-radius:14px;border:2px solid var(--bord);
  background:var(--surf2);padding:14px 12px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:all .15s;position:relative;
  min-height:120px;justify-content:center;
}
.tcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.tcard.free{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.tcard.free:hover{border-color:#10B981}
.tcard.occupied{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.06)}
.tcard.reserved{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.05)}
.tcard.cleaning{border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.04)}
.tcard-num{font-size:26px;font-weight:900;color:var(--text);line-height:1}
.tcard-cap{font-size:11px;color:var(--t2);margin-top:1px}
.tcard-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;
}
.tcard-badge.free      {background:rgba(16,185,129,.15);color:#10B981}
.tcard-badge.occupied  {background:rgba(239,68,68,.15);color:#EF4444}
.tcard-badge.reserved  {background:rgba(245,166,35,.15);color:#F5A623}
.tcard-badge.cleaning  {background:rgba(99,102,241,.15);color:#6366F1}
.tcard-edit{
  position:absolute;top:6px;right:6px;
  width:22px;height:22px;border-radius:6px;
  background:var(--surf);border:1px solid var(--bord);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;cursor:pointer;opacity:.6;transition:var(--tr);
}
.tcard-edit:hover{opacity:1;border-color:var(--acc)}
.tcard-time{font-size:10px;color:var(--t2);margin-top:2px}
.tcard-reservation-badge{position:absolute;top:8px;left:8px;background:#F5A623;color:#1A1A1A;font-size:10.5px;font-weight:700;padding:4px 8px;border-radius:8px;line-height:1.2;letter-spacing:.2px;box-shadow:0 2px 6px rgba(245,166,35,.4);z-index:2;max-width:calc(100% - 50px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tcard-reservation-badge.notified::before{content:"✓ ";opacity:.85}
.tcard.reserved-window{border:2px solid #F5A623;box-shadow:0 0 0 1px rgba(245,166,35,.25)}
.tcard.reserved-window .tcard-num{color:#B45309}
.reserve-warn-modal{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:99999;display:none;align-items:center;justify-content:center;padding:20px}
.reserve-warn-modal.on{display:flex}
.reserve-warn-card{background:#fff;border-radius:14px;max-width:420px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.reserve-warn-icon{font-size:42px;text-align:center;margin-bottom:8px}
.reserve-warn-title{font-size:18px;font-weight:700;color:#1A1A1A;margin-bottom:8px;text-align:center}
.reserve-warn-body{font-size:14px;color:#374151;line-height:1.5;margin-bottom:18px;text-align:center;background:#FEF3C7;padding:12px;border-radius:10px}
.reserve-warn-body strong{color:#B45309}
.reserve-warn-actions{display:flex;gap:10px}
.reserve-warn-actions button{flex:1;padding:12px;border:0;border-radius:10px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit}
.reserve-warn-cancel{background:#E5E7EB;color:#374151}
.reserve-warn-confirm{background:#F5A623;color:#fff}
.reserve-warn-actions button:hover{filter:brightness(.95)}
.tcard-hint{font-size:10px;color:var(--t2);margin-top:7px;font-weight:600;opacity:.75;display:flex;align-items:center;justify-content:center;gap:4px}
.tcard-hint::before{content:'👆';font-size:10px}
.tcard:hover .tcard-hint{opacity:1;color:var(--acc)}
#guest-alert-bar{
  display:flex;align-items:center;gap:11px;cursor:pointer;
  background:linear-gradient(135deg,#F5A623,#EA580C);color:#fff;
  font-weight:800;font-size:13.5px;padding:13px 18px;border-radius:12px;
  margin:0 0 16px;box-shadow:0 8px 22px rgba(234,88,12,.32);
  animation:gabIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes gabIn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
.gab-pulse{font-size:18px;animation:gabPulse 1.1s ease-in-out infinite}
@keyframes gabPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.tcard.guest-pending{
  border-color:#EA580C !important;
  box-shadow:0 0 0 3px rgba(234,88,12,.18), 0 6px 20px rgba(234,88,12,.2);
  animation:cardPulse 1.6s ease-in-out infinite;
}
@keyframes cardPulse{0%,100%{box-shadow:0 0 0 3px rgba(234,88,12,.18),0 6px 20px rgba(234,88,12,.2)}50%{box-shadow:0 0 0 6px rgba(234,88,12,.28),0 6px 22px rgba(234,88,12,.3)}}
.tcard-guest-alert{
  margin-top:9px;background:linear-gradient(135deg,#F5A623,#EA580C);
  color:#fff;font-size:10.5px;font-weight:800;line-height:1.35;
  padding:7px 9px;border-radius:9px;text-align:center;
}
.tcard.has-order{border-color:rgba(239,68,68,.55)}
.tcard-order{margin-top:9px;padding-top:9px;border-top:1px dashed rgba(239,68,68,.3)}
.to-amt{font-size:19px;font-weight:900;color:#EF4444;line-height:1}
.to-meta{font-size:9.5px;color:var(--t2);font-weight:600;margin-top:4px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px}
.to-guest{font-size:10px;color:var(--text);font-weight:700;margin-top:4px}
/* Button */
.btn-pri{padding:11px 20px;border-radius:10px;background:var(--acc);color:#0A0E1A;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font-h);transition:var(--tr);display:inline-flex;align-items:center;gap:6px}
.btn-pri:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-sec{padding:9px 16px;border-radius:10px;background:var(--surf2);color:var(--text);border:1px solid var(--bord);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-h);transition:var(--tr)}
.btn-sec:hover{border-color:var(--acc);color:var(--acc)}
.btn-danger{padding:9px 16px;border-radius:10px;background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.3);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-h);transition:var(--tr)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
/* FAB */
.fab{position:fixed;bottom:80px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#FF6B35);color:#0A0E1A;border:none;font-size:24px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(245,166,35,.5);transition:var(--tr);z-index:40}
.fab:hover{transform:scale(1.08)}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:80;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--surf);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto;border-top:1px solid var(--bord)}
.sheet-title{font-size:16px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.ff{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.ff label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.3px}
.inp{padding:11px 13px;border-radius:10px;border:1px solid var(--bord);background:var(--surf2);color:var(--text);font-size:14px;font-family:var(--font-h);width:100%;transition:var(--tr)}
.inp:focus{outline:none;border-color:var(--acc)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1}
/* Status modal */
.st-opts{display:flex;flex-direction:column;margin:14px 0}
.cv-wrap{padding:6px 2px 2px}
.cv-q{font-family:var(--font-h);font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px}
.cv-sub{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:16px}
.cv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.cv-pick{padding:16px 0;border-radius:12px;border:1.5px solid var(--bord);background:var(--surf2);color:var(--text);font-family:var(--font-h);font-size:18px;font-weight:800;cursor:pointer;transition:var(--tr)}
.cv-pick:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-1px)}
.cv-pick:active{transform:scale(.95)}
.cv-pick.cv-more{font-size:14px;background:var(--surf);color:var(--t2)}
.cv-input{width:100%;padding:13px 14px;border:1.5px solid var(--bord);border-radius:11px;background:var(--surf2);color:var(--text);font-family:var(--font-h);font-size:16px;font-weight:700}
.cv-input:focus{outline:none;border-color:var(--acc)}
.cv-skip{width:100%;margin-top:16px;padding:11px;background:none;border:none;color:var(--t2);font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--font-h);text-decoration:underline}
.cv-skip:hover{color:var(--text)}
.st-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px}
@media(max-width:420px){.st-grid{grid-template-columns:1fr 1fr}}
.st-opt{padding:14px;border-radius:12px;border:1.5px solid var(--bord);background:var(--surf2);cursor:pointer;transition:var(--tr);text-align:center;font-size:13px;font-weight:700}
.st-opt:hover{border-color:var(--acc)}
.st-opt.sel{border-color:var(--acc);background:rgba(245,166,35,.1)}
.st-opt.sel-green{border-color:#10B981;background:rgba(16,185,129,.1);color:#10B981}
.st-opt.sel-red{border-color:#EF4444;background:rgba(239,68,68,.1);color:#EF4444}
.st-opt.sel-yellow{border-color:#F5A623;background:rgba(245,166,35,.1);color:#F5A623}

</head>
<body>
<div id="app-layout">
  <div id="dsb"></div>
  <div id="main-col">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-title">
        🍽️ <span class="lang-en">Tables</span><span class="lang-hi">टेबल</span>
      </div>
      <button class="btn-sec" onclick="reloadAll()" style="padding:7px 12px;font-size:12px">↻</button>
    </div>

    <!-- Content -->
    <div class="content" id="content">
      <div class="tabs" id="tab-bar">
        <button class="tab on" data-tab="tables" onclick="switchTab('tables',this)">🍽️ <span class="lang-en">Tables</span></button>
        <button class="tab"    data-tab="qr"     onclick="switchTab('qr',this)">📱 <span class="lang-en">Table QR Codes</span></button>
      </div>
      <div id="guest-alert-bar" style="display:none" onclick="document.getElementById('pane-tables').scrollIntoView({behavior:'smooth'})">
        <span class="gab-pulse">🔔</span>
        <span id="guest-alert-text">New guest order</span>
      </div>
      <div id="pane-tables"></div>
      <div id="pane-qr" style="display:none"></div>
    </div>

  </div><!-- /main-col -->
</div><!-- /app-layout -->

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddModal()" title="Add Table">+</button>

<!-- Add/Edit Table Modal -->
<div class="overlay" id="edit-modal">
  <div class="sheet">
    <div class="sheet-title">
      <span id="modal-title">New Table</span>
      <button onclick="closeModal('edit-modal')" style="background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;padding:0">×</button>
    </div>
    <div class="row2">
      <div class="ff"><label>Table Number *</label><input type="text" class="inp" id="t-num" placeholder="1, T1, Bar-1..."></div>
      <div class="ff"><label>Seats</label><input type="number" class="inp" id="t-cap" min="1" max="50" value="4"></div>
    </div>
    <div class="ff"><label>Section (optional)</label>
      <input type="text" class="inp" id="t-section" placeholder="Indoor, Outdoor, Bar, Terrace...">
    </div>
    <div class="ff"><label>Notes (optional)</label>
      <input type="text" class="inp" id="t-notes" placeholder="Window seat, corner table...">
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="del-btn" onclick="deleteTable()" style="display:none">🗑 Delete</button>
      <button class="btn-sec" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn-pri" onclick="saveTable()">Save Table</button>
    </div>
  </div>
</div>

<!-- Status change modal -->
<!-- v6: reservation-block warning modal -->

  <div class="reserve-warn-card">
    <div class="reserve-warn-icon">⏰</div>

    <div class="reserve-warn-actions">
      <button type="button" class="reserve-warn-cancel" onclick="closeReserveWarn()">Cancel</button>
      <button type="button" class="reserve-warn-confirm" id="reserve-warn-confirm-btn">Use Anyway</button>
    </div>

</div>

  <div class="sheet">
    <div class="sheet-title">
      <span id="st-modal-title">Change Status</span>
      <button onclick="closeModal('status-modal')" style="background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;padding:0">×</button>
    </div>

      <button class="btn-sec" onclick="closeModal('status-modal')">Cancel</button>
    </div>

<!-- Bottom nav placeholder -->
<div class="bnav" id="bnav"></div>
<div class="bnav-overlay" id="bnav-overlay" onclick="SBPSidebar.closeDrawer()"></div>
<div class="bnav-drawer" id="bnav-drawer"></div>
<div class="toast-host" id="toast-host"></div>

<script>
'use strict';
const _shopId = localStorage.getItem('sbp_shop_id') || '';
let _tables = [];
let _editId  = null;

function $(id){ return document.getElementById(id); }
function escHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fINR(n){ return '₹'+(Number(n)||0).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function elapsed(iso){
  if(!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  if(isNaN(ms) || ms < 0) return '';
  const m = Math.floor(ms/60000), h = Math.floor(m/60), d = Math.floor(h/24);
  if(d >= 1) return d+'d '+(h%24)+'h';
  if(h >= 1) return h+'h '+(m%60)+'m';
  return Math.max(m,1)+'m';
}
function toast(msg,type='i'){const h=$('toast-host');const e=document.createElement('div');e.className='toast '+type;e.textContent=msg;h.appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),200)},2500);}
function openModal(id){$(id).classList.add('open');}
function closeModal(id){$(id).classList.remove('open');}

// ── Load ──────────────────────────────────────────────────────────
async function reloadAll(){
  if(!_shopId){ document.getElementById('pane-tables').innerHTML='<div class="empty"><div class="empty-emoji">⚠️</div><div class="empty-title">No shop found</div><div class="empty-msg">Please log in again.</div></div>'; return; }
  await refreshPendingGuests();   // populate guest-order map before render
  const { data, error } = await _sb.rpc('sbp_tables_list', { p_shop_id: _shopId });
  if(error || !data?.ok){ document.getElementById('pane-tables').innerHTML='<div class="empty"><div class="empty-emoji">⚠️</div><div class="empty-title">Could not load tables</div><div class="empty-msg">'+(error?.message||data?.error||'Unknown error')+'</div></div>'; return; }
  _tables = data.tables || [];

  // v6: also load reservation-block state (parallel-safe, fail-soft)
  if (window.SBPReservationState && window._sb){
    try { await window.SBPReservationState.loadBlockedTables(_shopId); }
    catch(e){ console.warn('[tables] block-state load failed:', e); }
  }

  render();
}

// ── Pending guest orders (QR menu → awaiting Accept) ──────────────
// Surfaces guest orders on the FLOOR screen, not just inside the
// running-order page. Map: { "11": {count, ids:[...]} } keyed by
// table_number so render() can badge the right card.
let _pendingGuestByTable = {};
let _guestCh = null;

async function refreshPendingGuests(){
  try {
    const { data, error } = await _sb.rpc('sbp_guest_order_pending_list', { p_shop_id: _shopId });
    if(error || !data?.ok){ return; }
    const map = {};
    (data.pending || []).forEach(g => {
      const k = String(g.table_number);
      if(!map[k]) map[k] = { count:0, ids:[] };
      map[k].count++;
      map[k].ids.push(g.id);
    });
    _pendingGuestByTable = map;
    updateGuestAlertBar();
  } catch(e){ /* non-fatal */ }
}

function updateGuestAlertBar(){
  const bar = document.getElementById('guest-alert-bar');
  if(!bar) return;
  const tables = Object.keys(_pendingGuestByTable);
  const total  = tables.reduce((s,k)=>s+_pendingGuestByTable[k].count,0);
  if(total === 0){ bar.style.display='none'; return; }
  bar.style.display='';
  const label = total === 1
    ? `🔔 New guest order on Table T${tables[0]} — tap a highlighted table to review & accept`
    : `🔔 ${total} new guest orders on ${tables.length} table${tables.length>1?'s':''} — tap a highlighted table to review & accept`;
  document.getElementById('guest-alert-text').textContent = label;
}

function subscribeGuestOrders(){
  if(!_shopId) return;
  if(_guestCh){ try{ _sb.removeChannel(_guestCh); }catch(e){} }
  _guestCh = _sb.channel('tables-guest-'+_shopId)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'sbp_guest_orders', filter:'shop_id=eq.'+_shopId },
      (p) => {
        const r = p.new;
        if(!r || r.status !== 'pending') return;
        // Audible + haptic + visible — staff must notice from the floor.
        try { if(navigator.vibrate) navigator.vibrate([200,90,200]); } catch(e){}
        try { _guestBeep(); } catch(e){}
        toast('🔔 New guest order — Table T'+r.table_number, 'i');
        refreshPendingGuests();
        reloadAll();
      })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'sbp_guest_orders', filter:'shop_id=eq.'+_shopId },
      (p) => {
        const r = p.new;
        if(!r) return;
        if(r.status !== 'pending'){ refreshPendingGuests(); reloadAll(); }
      })
    .subscribe();
}

// Short, polite attention chime via WebAudio (no asset needed).
let _ac = null;
function _guestBeep(){
  try {
    _ac = _ac || new (window.AudioContext||window.webkitAudioContext)();
    const o = _ac.createOscillator(), g = _ac.createGain();
    o.type='sine'; o.frequency.value=880;
    o.connect(g); g.connect(_ac.destination);
    g.gain.setValueAtTime(0.0001, _ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18, _ac.currentTime+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, _ac.currentTime+0.5);
    o.start(); o.stop(_ac.currentTime+0.5);
  } catch(e){}
}

// ── Render ────────────────────────────────────────────────────────
const ST_INFO = {
  free:      { label:'✅ Free',      cls:'free',      color:'#10B981' },
  occupied:  { label:'🔴 Occupied',  cls:'occupied',  color:'#EF4444' },
  reserved:  { label:'🕐 Reserved',  cls:'reserved',  color:'#F5A623' },
  cleaning:  { label:'🧹 Cleaning',  cls:'cleaning',  color:'#6366F1' },
};

let _activeTab = 'tables';
function switchTab(tab, el){
  _activeTab = tab;
  document.querySelectorAll('#tab-bar .tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===tab));
  document.getElementById('pane-tables').style.display = tab==='tables' ? '' : 'none';
  document.getElementById('pane-qr').style.display     = tab==='qr'     ? '' : 'none';
  const fab = $('fab'); if(fab) fab.style.display = tab==='tables' ? '' : 'none';
  if(tab==='qr') renderQR();
}

function render(){
  const el = document.getElementById('pane-tables');
  if(!_tables.length){
    el.innerHTML = `
      <div class="empty">
        <div class="empty-emoji">🍽️</div>
        <div class="empty-title"><span class="lang-en">No tables yet</span><span class="lang-hi">अभी तक कोई टेबल नहीं</span></div>
        <div class="empty-msg"><span class="lang-en">Add your first table — give it a number and the system will track its status in real time.</span></div>
        <button class="btn-pri" onclick="openAddModal()">+ Add First Table</button>
      </div>`;
    SBPSidebar.render('tables');
    return;
  }

  // Summary
  const counts = { free:0, occupied:0, reserved:0, cleaning:0 };
  _tables.forEach(t => { if(counts[t.status]!==undefined) counts[t.status]++; });

  // Group by section
  const sections = {};
  _tables.forEach(t => {
    const s = t.section || 'Main Area';
    if(!sections[s]) sections[s] = [];
    sections[s].push(t);
  });

  let html = `
    <div class="summary">
      <div class="sum-box"><div class="sum-v" style="color:#10B981">${counts.free}</div><div class="sum-l">Free</div></div>
      <div class="sum-box"><div class="sum-v" style="color:#EF4444">${counts.occupied}</div><div class="sum-l">Occupied</div></div>
      <div class="sum-box"><div class="sum-v" style="color:#F5A623">${counts.reserved}</div><div class="sum-l">Reserved</div></div>
      <div class="sum-box"><div class="sum-v" style="color:#6366F1">${counts.cleaning}</div><div class="sum-l">Cleaning</div></div>
    </div>`;

  Object.entries(sections).forEach(([section, tables]) => {
    html += `<div class="section-hd">📍 ${escHtml(section)} (${tables.length} tables)</div>`;
    html += '<div class="table-grid">';
    tables.forEach(t => {
      const st = ST_INFO[t.status] || ST_INFO.free;
      const o  = t.order;   // present only when an open running order exists
      const hasOrder = o && o.order_id;

      const orderBlock = hasOrder ? `
          <div class="tcard-order">
            <div class="to-amt">${fINR(o.total)}</div>
            <div class="to-meta">
              <span>🧾 ${o.items_count||0} item${(o.items_count===1)?'':'s'}</span>
              <span>·</span>
              <span>KOT ${o.kot_count||0}</span>
              <span>·</span>
              <span>⏱ ${elapsed(o.opened_at)}</span>
            </div>
            ${o.guest_name ? `<div class="to-guest">👤 ${escHtml(o.guest_name)}</div>` : ''}
          </div>` : '';

      const hint = hasOrder ? 'Tap to resume order'
        : t.status==='free'     ? 'Tap to seat guests'
        : t.status==='reserved' ? 'Tap to seat or free'
        : t.status==='cleaning' ? 'Tap to mark free'
        :                         'Tap for options';

      // Pending guest order (sent from the QR menu, awaiting Accept)
      const gp = _pendingGuestByTable[String(t.table_number)];
      const guestAlert = gp ? `
          <div class="tcard-guest-alert">
            🔔 ${gp.count>1?gp.count+' new guest orders':'New guest order'} — tap to review
          </div>` : '';

      // v6: check if this table is in a reservation block window
      const _block = (window.SBPReservationState && window.SBPReservationState.getBlockForTable)
                       ? window.SBPReservationState.getBlockForTable(t.id) : null;
      const _resWindowCls = _block ? ' reserved-window' : '';
      const _resBadge = _block ? `
          <div class="tcard-reservation-badge${_block.notified ? ' notified' : ''}"
               title="${escHtml(window.SBPReservationState.formatBlockTooltip(_block))}">
            ${escHtml(window.SBPReservationState.formatBlockBadge(_block))}
          </div>` : '';

      html += `
        <div class="tcard ${st.cls}${_resWindowCls}${hasOrder?' has-order':''}${gp?' guest-pending':''}" onclick="handleTableTap('${t.id}','${t.status}','${escHtml(t.table_number)}')">
          ${_resBadge}
          <button class="tcard-edit" onclick="event.stopPropagation();openEditModal('${t.id}')">✎</button>
          <div class="tcard-num">T${escHtml(t.table_number)}</div>
          <div class="tcard-cap">👥 ${t.capacity} seats</div>
          <div class="tcard-badge ${st.cls}">${st.label}</div>
          ${guestAlert}
          ${orderBlock}
          <div class="tcard-hint">${gp ? 'Tap to review &amp; accept' : hint}</div>
        </div>`;
    });
    html += '</div>';
  });

  el.innerHTML = html;
  SBPSidebar.render('tables');
}

// ── QR Codes ─────────────────────────────────────────────────────
// The QR system resolves a shop by its WEBSITE slug (sbp_shop_websites.slug),
// NOT the shop UUID. The `shops` table has no slug column, so the old
// `shop.slug || shop.id` fallback always emitted the UUID → every QR
// resolved to shop_not_found. We fetch + cache the real slug here.
let _qrSlug = null;          // resolved website slug ('' = none set yet)
async function getShopSlug(){
  if(_qrSlug !== null) return _qrSlug;
  try{
    const { data, error } = await _sb
      .from('sbp_shop_websites')
      .select('slug')
      .eq('shop_id', _shopId)
      .maybeSingle();
    if(error) throw error;
    _qrSlug = (data && data.slug) ? String(data.slug).trim() : '';
  }catch(e){
    console.warn('[qr] slug lookup failed:', e);
    _qrSlug = '';
  }
  return _qrSlug;
}

async function renderQR(){
  const pane = document.getElementById('pane-qr');
  if(!_tables.length){
    pane.innerHTML='<div class="empty"><div class="empty-emoji">📱</div><div class="empty-title">No tables yet</div><div class="empty-msg">Add tables first, then print QR codes for each one.</div></div>';
    return;
  }

  pane.innerHTML='<div class="empty"><div class="empty-emoji">⏳</div><div class="empty-title">Loading QR codes…</div></div>';
  const shop = JSON.parse(localStorage.getItem('sbp_shop')||'{}');
  const slug = await getShopSlug();

  // No website slug yet → QR ordering can't resolve the shop. Tell the
  // owner exactly what to do instead of printing broken UUID codes.
  if(!slug){
    pane.innerHTML =
      '<div class="empty">'+
        '<div class="empty-emoji">🌐</div>'+
        '<div class="empty-title">Set up your shop web address first</div>'+
        '<div class="empty-msg">Table QR ordering needs a public web address (slug) for your shop. '+
        'Open <strong>Settings → Customer-Facing → Shop Website</strong> and publish your site / pick a web address, '+
        'then come back here to print QR codes.</div>'+
        '<a href="/settings#website" class="btn-pri" style="margin-top:14px;display:inline-block;text-decoration:none">Go to Website Settings</a>'+
      '</div>';
    return;
  }

  const base = window.location.origin;

  let html = `<div style="margin-bottom:14px">
    <div style="font-size:13px;color:var(--t2);margin-bottom:10px">Print these QR codes and place them on each table. Customers scan to see your menu and place orders — staff confirms each order before it reaches the kitchen.</div>
    <button class="btn-pri" onclick="printAllQR()">🖨️ Print All QR Codes (A4 Sheet)</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">`;

  _tables.forEach(t => {
    // BATCH 068: QR encodes /qr/{slug}/{table_number} — routed to qr-menu.html via vercel.json
    const tableUrl = `${base}/qr/${slug}/${encodeURIComponent(t.table_number)}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=8&data=${encodeURIComponent(tableUrl)}`;
    html += `
    <div style="background:var(--surf2);border:1px solid var(--bord);border-radius:14px;padding:16px;text-align:center">
      <div style="font-size:20px;font-weight:900;margin-bottom:4px">T${escHtml(t.table_number)}</div>
      <div style="font-size:11px;color:var(--t2);margin-bottom:10px">👥 ${t.capacity} seats${t.section?' · '+escHtml(t.section):''}</div>
      <img src="${qrUrl}" style="width:160px;height:160px;border-radius:8px;border:1px solid var(--bord)" alt="QR T${escHtml(t.table_number)}">
      <div style="margin-top:10px;display:flex;gap:6px;justify-content:center">
        <button class="btn-sec" style="font-size:11px;padding:6px 10px" onclick="printOneQR('${escHtml(t.table_number)}','${encodeURIComponent(tableUrl)}')">🖨️ Print</button>
        <a href="${tableUrl}" target="_blank" class="btn-sec" style="font-size:11px;padding:6px 10px;text-decoration:none">🔗 Test</a>
      </div>
    </div>`;
  });

  html += '</div>';
  pane.innerHTML = html;
}

  const tableUrl = decodeURIComponent(encodedUrl);
  const shop = JSON.parse(localStorage.getItem('sbp_shop')||'{}');
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=12&data=${encodedUrl}`;

  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Table ${tableNum} QR</title>
<style>
  @page{size:A5;margin:10mm}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}

  h1{font-size:28px;font-weight:900;margin-bottom:4px}
  .sub{font-size:13px;color:#666;margin-bottom:16px}
  img{width:220px;height:220px;border-radius:8px}
  .inst{font-size:12px;color:#888;margin-top:12px;line-height:1.5}
  .shop{font-size:11px;font-weight:700;margin-top:10px;color:#333}
</style></head><body>
  <div class="card">
    <h1>Table T${tableNum}</h1>

    <img src="${qrUrl}" alt="QR Code">
    <div class="inst">📱 Open camera → Point at QR → Tap link</div>

  </div>

async function printAllQR(){
  const shop = JSON.parse(localStorage.getItem('sbp_shop')||'{}');
  const slug = await getShopSlug();
  if(!slug){ toast('Set up your shop web address in Settings first','e'); return; }
  const base = window.location.origin;
  const cards = _tables.map(t => {
    // BATCH 068: /qr/{slug}/{table_number} → routed to qr-menu.html via vercel.json
    const tableUrl = `${base}/qr/${slug}/${encodeURIComponent(t.table_number)}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=10&data=${encodeURIComponent(tableUrl)}`;

  }).join('');
  const w = window.open('','_blank');
  if(!w){toast('Allow pop-ups to print','e');return;}

<style>@page{margin:8mm}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,Arial,sans-serif;background:#fff}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10mm;padding:5mm}.card{text-align:center;padding:10mm;border:1.5px dashed #bbb;border-radius:10px;page-break-inside:avoid}h1{font-size:22px;font-weight:900;margin-bottom:3px}.sub{font-size:11px;color:#666;margin-bottom:10px}img{width:180px;height:180px;border-radius:6px}.shop{font-size:10px;font-weight:700;margin-top:8px;color:#333}</style></head><body>
<div class="grid">${cards}</div>
<script>window.addEventListener('load',function(){setTimeout(function(){window.print();},800);});<\/script>
</body></html>`);
  w.document.close();
}

// ── Table tap ─────────────────────────────────────────────────────
// ── Unified table action sheet ────────────────────────────────────
// Every table tap opens ONE consistent sheet. No surprise navigation.
// The primary (big) button is the obvious next step for that status;
// for a Free table that is "Seat Guests", which is also exactly what
// unblocks QR self-ordering — the whole point of the system.
// v6: original handleTableTap renamed; new one wraps with block-state check
// Public handleTableTap — checks reservation block, warns if applicable
function handleTableTap(tableId, status, tableNum){
  // Only warn when seating a free table that has a block window
  if (status === 'free' && window.SBPReservationState){
    const block = window.SBPReservationState.getBlockForTable(tableId);
    if (block){
      const body = document.getElementById('reserve-warn-body');
      if (body){
        const badge = window.SBPReservationState.formatBlockBadge(block);
        body.innerHTML = 'This table is reserved.<br><strong>' +
          (badge ? badge.replace(/&/g,'&amp;').replace(/</g,'&lt;') : 'Reservation pending') +
          '</strong><br><br>You can still use this table — staff judgment overrides.';
      }
      const confirmBtn = document.getElementById('reserve-warn-confirm-btn');
      if (confirmBtn){
        confirmBtn.onclick = function(){
          closeReserveWarn();
          _handleTableTapRaw(tableId, status, tableNum);
        };
      }
      document.getElementById('reserve-warn-modal').classList.add('on');
      return;
    }
  }
  _handleTableTapRaw(tableId, status, tableNum);
}

function closeReserveWarn(){
  const m = document.getElementById('reserve-warn-modal');
  if (m) m.classList.remove('on');
}

function _handleTableTapRaw(tableId, status, tableNum){
  openTableSheet(tableId);
}

const _ST_META = {
  free:     { dot:'#10B981', word:'Free' },
  occupied: { dot:'#EF4444', word:'Occupied' },
  reserved: { dot:'#F5A623', word:'Reserved' },
  cleaning: { dot:'#6366F1', word:'Cleaning' },
};

function openTableSheet(tableId){
  const t = _tables.find(x => x.id === tableId);
  if(!t) return;
  const num    = escHtml(t.table_number);
  const status = t.status || 'free';
  const meta   = _ST_META[status] || _ST_META.free;
  const id     = tableId;
  const o      = t.order;                 // open running order, if any
  const hasOrder = !!(o && o.order_id);

  $('st-modal-title').textContent = `Table T${num}`;

  // Header strip — capacity + live status
  const head =
    `<div class="st-head">` +
      `<span class="st-dot" style="background:${hasOrder?'#EF4444':meta.dot}"></span>` +
      `<span class="st-head-txt">👥 ${t.capacity} seats` +
        (t.section ? ` · ${escHtml(t.section)}` : '') +
        ` &nbsp;·&nbsp; Currently <b>${hasOrder?'Occupied':meta.word}</b></span>` +
    `</div>`;

  // Live order summary card (shown only when a running order is open)
  const orderCard = hasOrder ? `
    <div class="st-ordercard">
      <div class="soc-row">
        <span class="soc-amt">${fINR(o.total)}</span>
        <span class="soc-time">⏱ ${elapsed(o.opened_at)} on table</span>
      </div>
      <div class="soc-sub">🧾 ${o.items_count||0} item${o.items_count===1?'':'s'} · KOT ${o.kot_count||0}${o.guest_name?' · 👤 '+escHtml(o.guest_name):''}</div>
    </div>` : '';

  // Building blocks
  const seatBtn =
    `<button class="st-primary seat" onclick="seatGuests('${id}','${num}')">` +
      `<span class="ic">🪑</span>` +
      `<span class="tx"><div class="t1">Seat Guests</div>` +
      `<div class="t2">Opens this table — QR ordering goes live instantly</div></span>` +
      `<span class="ar">→</span>` +
    `</button>`;

  const resumeBtn =
    `<button class="st-primary order" onclick="newBillForTable('${id}','${num}')">` +
      `<span class="ic">🧾</span>` +
      `<span class="tx"><div class="t1">${hasOrder?'Resume Order':'View / Add Order'}</div>` +
      `<div class="t2">${hasOrder?'Open the running order — '+fINR(o.total)+' so far':'Open the running order for this table'}</div></span>` +
      `<span class="ar">→</span>` +
    `</button>`;

  const orderTile =
    `<div class="st-opt" onclick="newBillForTable('${id}','${num}')">` +
      `<div class="so-ic">🧾</div><div>${hasOrder?'Resume':'Take Order'}</div>` +
      `<div class="so-sub">${hasOrder?'Open order':'Staff bill now'}</div></div>`;

  // Status-change tiles. These are ONLY built for tables with no
  // punched items. Once even one item is on the order the table is
  // genuinely occupied and these are never shown — see hasOrder branch.
  const freeOpt =
    `<div class="st-opt sel-green" onclick="freeTable('${id}')">` +
      `<div class="so-ic">✅</div><div>Mark Free</div>` +
      `<div class="so-sub">Available</div></div>`;
  const reserveOpt =
    `<div class="st-opt sel-yellow" onclick="setStatus('${id}','reserved',this)">` +
      `<div class="so-ic">🕐</div><div>Reserve</div>` +
      `<div class="so-sub">Pre-booked</div></div>`;
  const cleanOpt =
    `<div class="st-opt sel-purple" onclick="setStatus('${id}','cleaning',this)">` +
      `<div class="so-ic">🧹</div><div>Cleaning</div>` +
      `<div class="so-sub">Not available</div></div>`;
  const seatOpt =
    `<div class="st-opt sel-green" onclick="seatGuests('${id}','${num}')">` +
      `<div class="so-ic">🪑</div><div>Seat Guests</div>` +
      `<div class="so-sub">Opens QR</div></div>`;

  // Locked notice shown instead of status tiles when items are punched.
  const lockedNote =
    `<div class="st-locknote">` +
      `<div class="sl-ic">🔒</div>` +
      `<div><b>Status can't be changed — items are punched.</b><br>` +
      `This table is occupied with a live order. To free it, settle the ` +
      `bill or void the order — tap <b>Resume Order</b> above.</div>` +
    `</div>`;

  let primary = '', body = '';
  if(hasOrder){
    // >= 1 active item → genuinely occupied. The ONLY way out is to
    // settle (Generate Bill) or void the order, both via Resume Order.
    // No Free/Reserve/Cleaning here, by design.
    primary = resumeBtn;
    body = lockedNote;
  } else if(status === 'free'){
    primary = seatBtn;
    body = `<div class="st-sub-label">More options</div>` +
           `<div class="st-grid">${orderTile + reserveOpt + cleanOpt}</div>`;
  } else if(status === 'occupied'){
    // Seated but nothing punched yet (seatGuests set the flag, no RO
    // items). Per the rule, status is still freely changeable.
    primary = resumeBtn;
    body = `<div class="st-sub-label">More options</div>` +
           `<div class="st-grid">${freeOpt + reserveOpt + cleanOpt}</div>`;
  } else if(status === 'reserved'){
    primary = seatBtn;
    body = `<div class="st-sub-label">More options</div>` +
           `<div class="st-grid">${orderTile + freeOpt + cleanOpt}</div>`;
  } else { // cleaning
    primary =
      `<button class="st-primary freeb" onclick="freeTable('${id}')">` +
        `<span class="ic">✅</span>` +
        `<span class="tx"><div class="t1">Mark Free</div>` +
        `<div class="t2">Cleaning done — ready for guests</div></span>` +
        `<span class="ar">→</span>` +
      `</button>`;
    body = `<div class="st-sub-label">More options</div>` +
           `<div class="st-grid">${seatOpt + reserveOpt + orderTile}</div>`;
  }

  $('st-opts').innerHTML = head + orderCard + primary + body;
  openModal('status-modal');
}

// Seat guests = mark occupied, stay on the tables screen, and tell
// the user QR is now live. No forced navigation into the order screen.
// Seat Guests → native in-sheet covers step (no browser prompt).
// Swaps the action sheet to a styled guest-count picker, then seats.
function seatGuests(tableId, tableNum){
  const body = $('st-opts');
  $('st-modal-title').textContent = `Seat Guests · Table T${tableNum}`;
  const quick = [1,2,3,4,5,6,8].map(n =>
    `<button class="cv-pick" onclick="_seatStep2('${tableId}','${tableNum}',${n})">${n}</button>`
  ).join('');
  body.innerHTML =
    `<div class="cv-wrap">` +
      `<div class="cv-q">How many guests?</div>` +
      `<div class="cv-sub">Used for per-cover sales reports. You can change it later from the 👥 chip.</div>` +
      `<div class="cv-grid">${quick}` +
        `<button class="cv-pick cv-more" onclick="_seatCustom('${tableId}','${tableNum}')">9+</button>` +
      `</div>` +
      `<div id="cv-custom" style="display:none;margin-top:12px">` +
        `<input id="cv-input" type="number" min="1" max="99" inputmode="numeric" ` +
          `placeholder="Enter guest count" class="cv-input">` +
        `<button class="btn-pri" style="width:100%;margin-top:10px" ` +
          `onclick="_seatStep2('${tableId}','${tableNum}',parseInt(document.getElementById('cv-input').value,10))">Next</button>` +
      `</div>` +
      `<button class="cv-skip" onclick="_seatStep2('${tableId}','${tableNum}',null)">Skip guest count</button>` +
    `</div>`;
}
function _seatCustom(tableId, tableNum){
  const c = document.getElementById('cv-custom');
  if(c){ c.style.display = 'block'; const i = document.getElementById('cv-input'); if(i) i.focus(); }
}
// Step 2: optional customer name + mobile. Most diners are anonymous,
// so "Skip — walk-in" is prominent. A saved customer is created only
// when a valid mobile is given (server-side guardrail in 076).
function _seatStep2(tableId, tableNum, covers){
  if(covers !== null && (isNaN(covers) || covers < 1 || covers > 99)) covers = null;
  const body = $('st-opts');
  body.innerHTML =
    `<div class="cv-wrap">` +
      `<div class="cv-q">Customer details <span style="font-size:12px;color:var(--t2);font-weight:600">(optional)</span></div>` +
      `<div class="cv-sub">Add a mobile to save this customer for history, loyalty &amp; WhatsApp bill. Leave blank for a walk-in.</div>` +
      `<input id="seat-cust-name" type="text" class="cv-input" style="margin-bottom:10px" ` +
        `placeholder="Customer name" autocomplete="off">` +
      `<input id="seat-cust-phone" type="tel" inputmode="numeric" class="cv-input" ` +
        `placeholder="Mobile number" autocomplete="off">` +
      `<button class="btn-pri" style="width:100%;margin-top:14px" ` +
        `onclick="_doSeat('${tableId}','${tableNum}',${covers===null?'null':covers},true)">Seat &amp; Save</button>` +
      `<button class="cv-skip" onclick="_doSeat('${tableId}','${tableNum}',${covers===null?'null':covers},false)">Skip — walk-in</button>` +
    `</div>`;
  setTimeout(()=>{ const n=document.getElementById('seat-cust-name'); if(n) n.focus(); }, 50);
}
async function _doSeat(tableId, tableNum, covers, withCust){
  if(covers !== null && (isNaN(covers) || covers < 1 || covers > 99)) covers = null;
  let cName = '', cPhone = '';
  if(withCust){
    cName  = (document.getElementById('seat-cust-name')?.value || '').trim();
    cPhone = (document.getElementById('seat-cust-phone')?.value || '').trim();
  }
  closeModal('status-modal');
  const { data, error } = await _sb.rpc('sbp_tables_set_status', {
    p_shop_id: _shopId, p_table_id: tableId, p_status: 'occupied'
  });
  if(error || !data?.ok){ toast('Failed: '+(data?.error||error?.message||'?'), 'e'); return; }
  const idx = _tables.findIndex(t => t.id === tableId);
  if(idx >= 0) _tables[idx].status = 'occupied';
  if(covers !== null){
    try { sessionStorage.setItem('sbp_seat_covers_'+tableId, String(covers)); } catch(e){}
  }
  if(cName || cPhone){
    try {
      sessionStorage.setItem('sbp_seat_cust_'+tableId, JSON.stringify({n:cName, p:cPhone}));
    } catch(e){}
  }
  const tag = (cName||cPhone) ? ` · ${cName||'customer'}` : '';
  toast(`🪑 Table T${tableNum} seated${covers?` · ${covers} guests`:''}${tag} — QR ordering is now open`, 's');
  render();
}

function newBillForTable(tableId, tableNum){
  closeModal('status-modal');
  window.location.href = `running-order.html?table_id=${encodeURIComponent(tableId)}&table_num=${encodeURIComponent(tableNum)}`;
}

async function setStatus(tableId, newStatus, el){
  closeModal('status-modal');
  const { data, error } = await _sb.rpc('sbp_tables_set_status', {
    p_shop_id: _shopId, p_table_id: tableId, p_status: newStatus
  });
  if(error || !data?.ok){ toast('Update failed: '+(data?.error||error?.message||'?'), 'e'); return; }
  const idx = _tables.findIndex(t => t.id === tableId);
  if(idx >= 0) _tables[idx].status = newStatus;
  toast(
    newStatus==='free'    ? '✅ Table is now free' :
    newStatus==='occupied'? '🔴 Marked occupied' :
    newStatus==='reserved'? '🕐 Table reserved' :
    '🧹 Cleaning mode', 's'
  );
  render();
}

async function freeTable(tableId){
  closeModal('status-modal');
  const { data, error } = await _sb.rpc('sbp_tables_free', {
    p_shop_id: _shopId, p_table_id: tableId
  });
  if(error || !data?.ok){ toast('Failed: '+(data?.error||error?.message||'?'), 'e'); return; }
  const idx = _tables.findIndex(t => t.id === tableId);
  if(idx >= 0){ _tables[idx].status = 'free'; _tables[idx].current_bill_id = null; }
  toast('✅ Table is now free', 's');
  render();
}

// ── Add / Edit Modal ──────────────────────────────────────────────
function openAddModal(){
  _editId = null;
  $('modal-title').textContent = 'New Table';
  $('t-num').value = '';
  $('t-cap').value = '4';
  $('t-section').value = '';
  $('t-notes').value = '';
  $('del-btn').style.display = 'none';
  openModal('edit-modal');
  setTimeout(()=>$('t-num').focus(), 100);
}

function openEditModal(id){
  const t = _tables.find(x => x.id === id);
  if(!t) return;
  _editId = id;
  $('modal-title').textContent = `Edit Table ${t.table_number}`;
  $('t-num').value = t.table_number || '';
  $('t-cap').value = t.capacity || 4;
  $('t-section').value = t.section || '';
  $('t-notes').value = t.notes || '';
  $('del-btn').style.display = '';
  openModal('edit-modal');
}

async function saveTable(){
  const num = $('t-num').value.trim();
  if(!num){ toast('Enter a table number', 'e'); return; }
  const payload = {
    id:           _editId || undefined,
    table_number: num,
    capacity:     parseInt($('t-cap').value)||4,
    section:      $('t-section').value.trim() || null,
    notes:        $('t-notes').value.trim() || null,
  };
  const { data, error } = await _sb.rpc('sbp_tables_upsert', {
    p_shop_id: _shopId, p_data: payload
  });
  if(error || !data?.ok){
    toast(data?.error === 'duplicate_table_number'
      ? 'Table number already exists'
      : 'Save failed: '+(data?.error||error?.message||'?'), 'e');
    return;
  }
  closeModal('edit-modal');
  toast(_editId ? 'Table updated ✓' : 'Table added ✓', 's');
  await reloadAll();
}

async function deleteTable(){
  if(!_editId) return;
  const t = _tables.find(x => x.id === _editId);
  if(t?.status === 'occupied'){
    toast('Cannot delete an occupied table', 'e');
    return;
  }
  if(!confirm(`Delete Table ${t?.table_number}? This cannot be undone.`)) return;
  const { data, error } = await _sb.rpc('sbp_tables_delete', {
    p_shop_id: _shopId, p_table_id: _editId
  });
  if(error || !data?.ok){ toast('Delete failed: '+(data?.error||error?.message||'?'), 'e'); return; }
  closeModal('edit-modal');
  toast('Table deleted', 's');
  await reloadAll();
}

// ── Init ──────────────────────────────────────────────────────────
(async function init(){
  if(!isBiz()){
    document.getElementById('pane-tables').innerHTML=`<div class="plan-lock"><div class="plan-lock-icon">🍽️</div><div class="plan-lock-title">Table Management — Business</div><div class="plan-lock-msg">Restaurant table management is part of the Business plan (₹499/mo). Restaurants get a 60-day free trial.</div><button class="btn-pri" onclick="window.location.href='subscription.html'">Upgrade to Business</button></div>`;
    SBPSidebar.render('tables');
    return;
  }
  if(!_shopId){ toast('No shop found — please log in again', 'e'); return; }
  // Paint the sidebar BEFORE any await — otherwise the page shows a
  // blank 220px gap until the post-network render, which is the blink.
  try { SBPSidebar.render('tables'); } catch(e){}
  await reloadAll();
  subscribeGuestOrders();
})();
</script>
