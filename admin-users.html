<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png?v=2">
  <title>Users — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Outfit',sans-serif;background:#0A0A12;color:#F0EFF8}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:280px;background:rgba(19,19,28,.8);backdrop-filter:blur(10px);border-right:1px solid rgba(124,58,237,.2);padding:24px;position:fixed;height:100vh;overflow-y:auto;left:0;top:0}
    .main{flex:1;margin-left:280px;padding:32px}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#F5A623,#FF8A00);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-text{font-size:18px;font-weight:700}
    .nav-section{margin-bottom:24px}
    .nav-label{font-size:11px;font-weight:600;color:#5A5A78;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#8A8AA8;font-size:14px;font-weight:500;transition:all .2s}
    .nav-item:hover{background:rgba(124,58,237,.1);color:#F0EFF8}
    .nav-item.active{background:rgba(245,166,35,.15);color:#F5A623}
    .header{margin-bottom:24px}
    .header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#F5A623,#FF8A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
    .header p{font-size:14px;color:#8A8AA8}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
    .search{flex:1;min-width:240px;padding:11px 16px;background:rgba(20,18,32,.6);border:1px solid rgba(124,58,237,.3);border-radius:8px;color:#F0EFF8;font-family:inherit;font-size:14px}
    .search:focus{outline:none;border-color:#F5A623}
    select.filter{padding:11px 16px;background:rgba(20,18,32,.6);border:1px solid rgba(124,58,237,.3);border-radius:8px;color:#F0EFF8;font-family:inherit;font-size:14px}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .stat{background:rgba(20,18,32,.6);border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:14px}
    .stat-l{font-size:11px;color:#8A8AA8;text-transform:uppercase;font-weight:600;margin-bottom:4px}
    .stat-v{font-size:22px;font-weight:800}
    .table{width:100%;border-collapse:collapse;background:rgba(20,18,32,.4);border-radius:10px;overflow:hidden}
    .table th{background:rgba(124,58,237,.1);padding:12px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8A8AA8;font-weight:700}
    .table td{padding:14px;border-top:1px solid rgba(124,58,237,.1);font-size:13px}
    .table tr:hover{background:rgba(124,58,237,.04)}
    .pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .pill.free{background:rgba(107,114,128,.2);color:#9CA3AF}
    .pill.pro{background:rgba(245,166,35,.2);color:#F5A623}
    .pill.business{background:rgba(124,58,237,.2);color:#A78BFA}
    .pill.suspended{background:rgba(239,68,68,.2);color:#EF4444}
    .btn{padding:7px 12px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;margin-right:4px}
    .btn-act{background:rgba(245,166,35,.15);color:#F5A623;border:1px solid rgba(245,166,35,.3)}
    .btn-danger{background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.3)}
    .btn-success{background:rgba(16,185,129,.1);color:#10B981;border:1px solid rgba(16,185,129,.3)}
    .empty{text-align:center;padding:48px;color:#8A8AA8}
    .toast{position:fixed;bottom:24px;right:24px;background:rgba(20,18,32,.95);border:1px solid #10B981;color:#fff;padding:14px 20px;border-radius:10px;font-weight:600;z-index:9999}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;display:none;align-items:center;justify-content:center;padding:20px}
    .modal.show{display:flex}
    .modal-card{background:#13131C;border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:28px;max-width:500px;width:100%}
    .modal-card h3{margin-bottom:16px;font-size:20px}
    .modal-card .field{margin-bottom:14px}
    .modal-card label{display:block;font-size:13px;color:#8A8AA8;margin-bottom:6px}
    .modal-card input,.modal-card select,.modal-card textarea{width:100%;padding:10px 12px;background:rgba(10,14,20,.6);border:1px solid rgba(124,58,237,.3);border-radius:8px;color:#F0EFF8;font-family:inherit}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
    @media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:18px}.table{display:block;overflow-x:auto}}
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="logo">
        <div class="logo-icon">🛡️</div>
        <div class="logo-text">Admin</div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <div class="nav-item" onclick="goTo('admin-dashboard.html')"><span>📊</span><span>Dashboard</span></div>
        <div class="nav-item" onclick="goTo('admin-subscriptions.html')"><span>💳</span><span>Subscriptions</span></div>
        <div class="nav-item active"><span>👥</span><span>Users</span></div>
        <div class="nav-item" onclick="goTo('admin-revenue.html')"><span>💰</span><span>Revenue</span></div>
        <div class="nav-item" onclick="goTo('admin-analytics.html')"><span>📈</span><span>Analytics</span></div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Configuration</div>
        <div class="nav-item" onclick="goTo('admin-settings.html')"><span>⚙️</span><span>Settings</span></div>
        <div class="nav-item" onclick="goTo('admin-features.html')"><span>🚀</span><span>Features</span></div>
        <div class="nav-item" onclick="goTo('admin-technical.html')"><span>🛠️</span><span>Tech Health</span></div>
      </div>
      <div class="nav-section">
        <div class="nav-label">System</div>
        <div class="nav-item" onclick="goTo('admin-notifications.html')"><span>🔔</span><span>Notifications</span></div>
        <div class="nav-item" onclick="goTo('admin-audit.html')"><span>📋</span><span>Audit Logs</span></div>
      </div>
      <div class="nav-item" id="logoutBtn"><span>🚪</span><span>Logout</span></div>
    </div>

    <div class="main">
      <div class="header">
        <h1>Users & Shops</h1>
        <p>Search, view details, change plans, suspend accounts</p>
      </div>

      <div class="stats-row" id="statsRow"></div>

      <div class="toolbar">
        <input class="search" id="searchInput" placeholder="🔍 Search by name, owner, email, phone…">
        <select class="filter" id="planFilter">
          <option value="all">All plans</option>
          <option value="free">Free</option>
          <option value="pro">Pro</option>
          <option value="business">Business</option>
        </select>
        <button class="btn btn-act" style="padding:11px 16px" onclick="loadShops()">🔄 Refresh</button>
      </div>

      <div id="tableWrap"></div>
    </div>
  </div>

  <!-- Plan change modal -->
  <div class="modal" id="planModal">
    <div class="modal-card">
      <h3>Change Plan</h3>
      <div class="field">
        <label>Shop</label>
        <input id="planShopName" disabled>
      </div>
      <div class="field">
        <label>New Plan</label>
        <select id="planNew">
          <option value="free">Free</option>
          <option value="pro">Pro</option>
          <option value="business">Business</option>
        </select>
      </div>
      <div class="field">
        <label>Expires at (leave blank for free / no expiry)</label>
        <input type="date" id="planExpires">
      </div>
      <div class="field">
        <label>Notes (audit log)</label>
        <textarea id="planNotes" rows="2" placeholder="Why are you changing this plan?"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-act" onclick="closeModal('planModal')">Cancel</button>
        <button class="btn btn-success" onclick="confirmChangePlan()">✅ Apply Change</button>
      </div>
    </div>
  </div>

  <!-- Suspend modal -->
  <div class="modal" id="suspendModal">
    <div class="modal-card">
      <h3 id="suspendTitle">Suspend Shop</h3>
      <div class="field">
        <label>Shop</label>
        <input id="suspendShopName" disabled>
      </div>
      <div class="field" id="suspendReasonField">
        <label>Reason (required, shown to user on next login)</label>
        <textarea id="suspendReason" rows="3" placeholder="Why is this shop being suspended?"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-act" onclick="closeModal('suspendModal')">Cancel</button>
        <button class="btn btn-danger" id="suspendConfirm" onclick="confirmSuspend()">🛑 Confirm</button>
      </div>
    </div>
  </div>

  <script src="admin-auth.js"></script>
  <script src="admin-db.js"></script>
  <script>
    const auth = AdminAuth.getInstance();
    if (!auth.isAuthenticated) { window.location.href = 'admin-login.html'; }
    const db = AdminDB.getInstance();

    let _shops = [];
    let _planTargetId = null;
    let _suspendTargetId = null;
    let _suspendAction = true; // true = suspend, false = unsuspend

    function goTo(url){ window.location.href = url; }
    document.getElementById('logoutBtn').addEventListener('click', () => {
      if(confirm('Logout?')){ auth.logout(); window.location.href='admin-login.html'; }
    });

    function fmt(n){return '₹'+(parseFloat(n||0)).toLocaleString('en-IN',{maximumFractionDigits:0});}
    function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
    function toast(msg, isErr=false){
      const t = document.createElement('div');
      t.className = 'toast';
      t.style.borderColor = isErr ? '#EF4444' : '#10B981';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }
    function openModal(id){ document.getElementById(id).classList.add('show'); }
    function closeModal(id){ document.getElementById(id).classList.remove('show'); }

    let _searchTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(_searchTimer);
      _searchTimer = setTimeout(loadShops, 300);
    });
    document.getElementById('planFilter').addEventListener('change', loadShops);

    async function loadShops(){
      const search = document.getElementById('searchInput').value.trim();
      const plan = document.getElementById('planFilter').value;
      _shops = await db.listShops({ search, plan, limit: 200 });

      // Stats
      const m = await db.getMetrics();
      document.getElementById('statsRow').innerHTML = `
        <div class="stat"><div class="stat-l">🏪 Total Shops</div><div class="stat-v">${m.total_shops||0}</div></div>
        <div class="stat"><div class="stat-l">⭐ Active Paid</div><div class="stat-v" style="color:#10B981">${m.active_paid||0}</div></div>
        <div class="stat"><div class="stat-l">⚡ Free</div><div class="stat-v">${m.free_shops||0}</div></div>
        <div class="stat"><div class="stat-l">📈 Today Signups</div><div class="stat-v" style="color:#F5A623">${m.today_signups||0}</div></div>
        <div class="stat"><div class="stat-l">📊 Conversion</div><div class="stat-v">${m.conversion_rate||0}%</div></div>
      `;

      const wrap = document.getElementById('tableWrap');
      if(!_shops.length){
        wrap.innerHTML = '<div class="empty">No shops match these filters.</div>';
        return;
      }
      wrap.innerHTML = `<table class="table">
        <thead><tr>
          <th>Shop</th><th>Owner</th><th>Plan</th><th>Bills</th><th>Revenue</th><th>Joined</th><th>Last Activity</th><th>Actions</th>
        </tr></thead>
        <tbody>${_shops.map(s => {
          const planNorm = s.plan === 'enterprise' ? 'business' : (s.plan || 'free');
          const expired = s.plan_expires_at && new Date(s.plan_expires_at) < new Date();
          const planLbl = expired ? 'free' : planNorm;
          return `<tr>
            <td><strong>${s.name||'—'}</strong>${s.suspended?' <span class="pill suspended">SUSPENDED</span>':''}<br><span style="font-size:11px;color:#8A8AA8">${s.email||''}</span></td>
            <td>${s.owner_name||'—'}<br><span style="font-size:11px;color:#8A8AA8">${s.phone||''}</span></td>
            <td><span class="pill ${planLbl}">${planLbl.toUpperCase()}</span>${s.plan_expires_at ? '<br><span style="font-size:10px;color:#8A8AA8">'+(expired?'expired ':'expires ')+fmtDate(s.plan_expires_at)+'</span>' : ''}</td>
            <td>${s.bill_count||0}</td>
            <td>${fmt(s.total_revenue||0)}</td>
            <td>${fmtDate(s.created_at)}</td>
            <td>${fmtDate(s.last_activity)}</td>
            <td>
              <button class="btn btn-act" onclick="openPlanModal('${s.id}','${(s.name||'').replace(/'/g,"\\'")}','${planNorm}')">Plan</button>
              ${s.suspended
                ? `<button class="btn btn-success" onclick="openSuspendModal('${s.id}','${(s.name||'').replace(/'/g,"\\'")}',false)">Unsuspend</button>`
                : `<button class="btn btn-danger" onclick="openSuspendModal('${s.id}','${(s.name||'').replace(/'/g,"\\'")}',true)">Suspend</button>`}
            </td>
          </tr>`;
        }).join('')}</tbody></table>`;
    }

    function openPlanModal(id, name, currentPlan){
      _planTargetId = id;
      document.getElementById('planShopName').value = name;
      document.getElementById('planNew').value = currentPlan;
      document.getElementById('planExpires').value = '';
      document.getElementById('planNotes').value = '';
      // Default expiry: 1 month from today
      const exp = new Date(); exp.setMonth(exp.getMonth() + 1);
      document.getElementById('planExpires').value = exp.toISOString().slice(0,10);
      openModal('planModal');
    }

    async function confirmChangePlan(){
      const newPlan = document.getElementById('planNew').value;
      const expVal = document.getElementById('planExpires').value;
      const notes = document.getElementById('planNotes').value || 'Manual plan change by admin';
      const expiresAt = (newPlan === 'free' || !expVal) ? null : new Date(expVal + 'T23:59:59').toISOString();
      try {
        await db.changePlan(_planTargetId, newPlan, expiresAt, notes);
        closeModal('planModal');
        toast('✅ Plan changed to '+newPlan.toUpperCase());
        loadShops();
      } catch(e){ toast('❌ '+e.message, true); }
    }

    function openSuspendModal(id, name, suspend){
      _suspendTargetId = id;
      _suspendAction = suspend;
      document.getElementById('suspendShopName').value = name;
      document.getElementById('suspendReason').value = '';
      document.getElementById('suspendTitle').textContent = suspend ? 'Suspend Shop' : 'Unsuspend Shop';
      document.getElementById('suspendConfirm').textContent = suspend ? '🛑 Suspend' : '✅ Unsuspend';
      document.getElementById('suspendConfirm').className = 'btn ' + (suspend ? 'btn-danger' : 'btn-success');
      document.getElementById('suspendReasonField').style.display = suspend ? 'block' : 'none';
      openModal('suspendModal');
    }

    async function confirmSuspend(){
      const reason = document.getElementById('suspendReason').value.trim();
      if(_suspendAction && !reason){ toast('Reason required', true); return; }
      try {
        await db.suspendShop(_suspendTargetId, _suspendAction, reason);
        closeModal('suspendModal');
        toast(_suspendAction ? '🛑 Suspended' : '✅ Unsuspended');
        loadShops();
      } catch(e){ toast('❌ '+e.message, true); }
    }

    loadShops();
  </script>
</body>
</html>
