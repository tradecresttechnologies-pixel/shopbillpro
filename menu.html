<style>
.lang-hi{display:none!important}

:root{--acc:#F5A623;--acc2:#EF4444;--acc3:#10B981;--bg:#0A0E1A;--surf:#131826;--surf2:#1A2035;--bord:#252D3D;--text:#F0EFF8;--t2:#8A8AA8;--t3:#4A4A60;--font-h:'Outfit',system-ui,sans-serif;--r:12px;--tr:.15s ease}
html[data-theme='light']{--bg:#F4F5F7;--surf:#FFFFFF;--surf2:#F0F2F5;--bord:#E2E5EA;--text:#0A0E1A;--t2:#6B7280;--t3:#9CA3AF}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-h),sans-serif;-webkit-font-smoothing:antialiased}

/* ── Sidebar ── */
#app-layout{display:flex;min-height:100vh}
/* ============================================================
   SIDEBAR REDESIGN v2 — rolled out (approved on dashboard).
   Modern app aesthetic: no native scrollbar, accent-bar active
   state, smooth hover, polished header/footer. Pure CSS; engine,
   DOM, mobile drawer, and any per-page #dsb position override are
   intentionally preserved (see POSITION_KEEP note per page).
   ============================================================ */
#dsb{
  position:fixed;left:0;top:0;bottom:0;width:236px;
  background: var(--surf);
  border-right:1px solid color-mix(in srgb, var(--bord) 60%, transparent);
  display:flex;flex-direction:column;z-index:200;
  overflow:hidden;
  box-shadow:1px 0 0 color-mix(in srgb, var(--bord) 40%, transparent);
}
.dsb-logo{
  display:flex;align-items:center;gap:11px;
  padding:20px 18px 16px;
  border-bottom:1px solid color-mix(in srgb, var(--bord) 55%, transparent);
  flex-shrink:0;
}
.dsb-logo img,.dsb-logo svg{width:26px;height:26px;border-radius:7px;flex-shrink:0}
.dsb-brand{
  font-family:var(--font-h);font-size:15.5px;font-weight:800;
  color:var(--text);letter-spacing:-.2px;line-height:1;
}
.dsb-brand .accent,.dsb-brand b{color:var(--acc)}
.dsb-nav{
  flex:1;min-height:0;padding:12px 10px;
  display:flex;flex-direction:column;gap:3px;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;
  scrollbar-color: color-mix(in srgb, var(--t3) 55%, transparent) transparent;
  -webkit-overflow-scrolling:touch;scroll-behavior:smooth;
}
.dsb-nav::-webkit-scrollbar{width:6px}
.dsb-nav::-webkit-scrollbar-track{background:transparent}
.dsb-nav::-webkit-scrollbar-thumb{
  background: color-mix(in srgb, var(--t3) 45%, transparent);border-radius:99px;
}
.dsb-nav:hover::-webkit-scrollbar-thumb{
  background: color-mix(in srgb, var(--t3) 70%, transparent);
}
.dsb-item{
  position:relative;display:flex;align-items:center;gap:12px;
  padding:10px 13px;border-radius:11px;cursor:pointer;
  text-decoration:none;color:var(--t2);
  font-size:13.5px;font-weight:600;letter-spacing:-.1px;
  transition:background .18s cubic-bezier(.4,0,.2,1),
             color .18s cubic-bezier(.4,0,.2,1),
             transform .15s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;border:none;background:none;width:100%;
  will-change:transform;
}
.dsb-item:hover{background: color-mix(in srgb, var(--surf2) 85%, transparent);color:var(--text)}
.dsb-item:active{transform:scale(.97)}
.dsb-item:focus-visible{outline:2px solid color-mix(in srgb, var(--acc) 60%, transparent);outline-offset:-2px}
.dsb-item.active{
  background: color-mix(in srgb, var(--acc) 14%, transparent);
  color:var(--acc);
}
.dsb-item::before{
  content:"";position:absolute;left:-10px;top:50%;
  width:3px;height:62%;
  transform:translateY(-50%) scaleY(0);
  transform-origin:center;
  background:var(--acc);border-radius:0 3px 3px 0;
  box-shadow:0 0 10px color-mix(in srgb, var(--acc) 60%, transparent);
  opacity:0;
  transition:transform .2s cubic-bezier(.4,0,.2,1),opacity .2s ease;
}
.dsb-item.active::before{
  transform:translateY(-50%) scaleY(1);
  opacity:1;
}
.dsb-item .lang-en,.dsb-item .lang-hi{display:inline}
.dsb-item.fab-sb{
  background:linear-gradient(135deg,var(--acc),#FF8A00);
  color:#0A0E1A;margin:2px 0 10px;font-weight:800;
  box-shadow:0 6px 16px color-mix(in srgb, var(--acc) 38%, transparent);
}
.dsb-item.fab-sb:hover{filter:brightness(1.05);color:#0A0E1A}
.dsb-item.fab-sb::before{display:none}
.dsb-item.coming-soon{opacity:.5;cursor:default}
.dsb-item.coming-soon:hover{background:none;color:var(--t2)}
.dsb-ic{
  font-size:18px;width:24px;text-align:center;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.dsb-badge{
  margin-left:auto;font-size:9px;font-weight:800;letter-spacing:.4px;
  border-radius:5px;padding:2px 6px;line-height:1;
}
.dsb-sep{height:1px;background:color-mix(in srgb, var(--bord) 55%, transparent);margin:9px 14px}
.dsb-more-label,.dsb-more-toggle{
  font-size:10.5px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;color:var(--t3);
}
.dsb-more-toggle{
  display:flex;align-items:center;gap:8px;padding:9px 13px;
  cursor:pointer;border-radius:10px;transition:background .15s ease;
}
.dsb-more-toggle:hover{background:color-mix(in srgb, var(--surf2) 70%, transparent)}
.dsb-more-arr{margin-left:auto;transition:transform .2s ease;font-size:11px}
.dsb-more-group.open .dsb-more-arr{transform:rotate(180deg)}
.dsb-footer{
  padding:10px 10px 12px;flex-shrink:0;
  border-top:1px solid color-mix(in srgb, var(--bord) 55%, transparent);
}
.dsb-logout{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:10px 13px;border-radius:11px;cursor:pointer;
  background:none;border:none;text-decoration:none;
  color:var(--t2);font-size:13.5px;font-weight:600;
  transition:background .15s ease,color .15s ease;
}
.dsb-logout:hover{background: color-mix(in srgb, #EF4444 14%, transparent);color:#EF4444}
.dsb-ver{
  font-size:10px;color:var(--t3);text-align:center;
  padding:9px 0 2px;letter-spacing:.4px;opacity:.75;
}
#main-col{margin-left:220px;width:calc(100% - 220px);display:flex;flex-direction:column;min-height:100vh}
@media(max-width:1023px){#dsb{display:none!important}#main-col{margin-left:0;width:100%}}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;padding:0 20px;height:58px;background:var(--surf);border-bottom:1px solid var(--bord);gap:12px;position:sticky;top:0;z-index:30;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:800;flex:1}
.topbar-actions{display:flex;gap:8px;align-items:center}
.view-toggle{display:flex;gap:4px;background:var(--surf2);border-radius:10px;padding:3px}
.vt-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.vt-btn.on{background:var(--surf);color:var(--acc)}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:8px;padding:14px 20px 10px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bord);flex-shrink:0}
.filter-bar::-webkit-scrollbar{display:none}
.fc{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--bord);background:transparent;color:var(--t2);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-h);transition:var(--tr)}
.fc.on{background:rgba(245,166,35,.12);border-color:var(--acc);color:var(--acc)}
.item-count{margin-left:4px;font-size:10px;background:var(--surf2);padding:1px 6px;border-radius:8px}

/* ── Grid / List views ── */
.content{padding:16px 20px;flex:1}

/* GRID VIEW */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.menu-card{
  background:var(--surf);border:1.5px solid var(--bord);border-radius:16px;
  overflow:hidden;cursor:pointer;transition:all .15s;
}
.menu-card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.menu-card.unavailable{opacity:.5}
.mc-img{
  height:130px;background:var(--surf2);position:relative;
  display:flex;align-items:center;justify-content:center;font-size:40px;
  border-bottom:1px solid var(--bord);
}
.mc-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.mc-avail-dot{
  position:absolute;top:8px;right:8px;
  width:10px;height:10px;border-radius:50%;
  border:2px solid var(--surf);
}
.mc-avail-dot.on{background:#10B981}
.mc-avail-dot.off{background:#EF4444}
.mc-body{padding:12px}
.mc-cat{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.mc-name{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;line-height:1.3}
.mc-desc{font-size:11px;color:var(--t2);line-height:1.4;margin-bottom:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.mc-footer{display:flex;align-items:center;justify-content:space-between}
.mc-price{font-size:16px;font-weight:900;color:var(--acc);font-family:var(--font-h)}
.mc-gst{font-size:10px;color:var(--t2);margin-top:1px}

/* LIST VIEW */
.menu-list-view{display:flex;flex-direction:column;gap:2px}
.ml-row{
  display:grid;grid-template-columns:1fr auto auto auto;
  gap:12px;align-items:center;
  padding:12px 16px;background:var(--surf);border-radius:12px;
  border:1px solid var(--bord);cursor:pointer;transition:var(--tr);
}
.ml-row:hover{border-color:var(--acc)}
.ml-row.unavailable{opacity:.5}
.ml-info{}
.ml-name{font-size:14px;font-weight:700;color:var(--text)}
.ml-cat{font-size:11px;color:var(--t2);margin-top:2px}
.ml-price{font-size:15px;font-weight:800;color:var(--acc);white-space:nowrap}
.ml-gst{font-size:10px;color:var(--t2)}
.ml-avail{width:40px;text-align:center}

/* Category section header */
.cat-hd{
  font-size:12px;font-weight:700;color:var(--t2);
  text-transform:uppercase;letter-spacing:.7px;
  padding:18px 0 8px;border-bottom:1px solid var(--bord);
  margin-bottom:10px;grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
}
.cat-count{font-size:11px;background:var(--surf2);padding:2px 8px;border-radius:8px;font-weight:700}

/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:6px}
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tog{position:absolute;inset:0;background:var(--bord);border-radius:10px;transition:.2s}
.tog::after{content:'';position:absolute;left:3px;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.2s}
.toggle input:checked + .tog{background:var(--acc3)}
.toggle input:checked + .tog::after{transform:translateX(16px)}

/* Buttons */
.btn-pri{padding:10px 18px;border-radius:10px;background:var(--acc);color:#0A0E1A;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font-h);transition:var(--tr);display:inline-flex;align-items:center;gap:6px}
.btn-pri:hover{filter:brightness(1.08)}
.btn-sec{padding:9px 14px;border-radius:10px;background:var(--surf2);color:var(--text);border:1px solid var(--bord);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-h)}
.btn-danger{padding:9px 14px;border-radius:10px;background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.25);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-h)}

/* Empty */
.empty{text-align:center;padding:64px 20px}
.empty-em{font-size:52px;margin-bottom:12px}
.empty-title{font-size:18px;font-weight:800;margin-bottom:6px}
.empty-msg{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.6}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:80;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
@media(min-width:640px){.overlay{align-items:center}}
.sheet{background:var(--surf);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:22px;max-height:90vh;overflow-y:auto;border-top:1px solid var(--bord)}
@media(min-width:640px){.sheet{border-radius:20px}}
.sheet-title{font-size:16px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.ff{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.ff label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.3px}
.inp{padding:11px 13px;border-radius:10px;border:1px solid var(--bord);background:var(--surf2);color:var(--text);font-size:14px;font-family:var(--font-h);width:100%;transition:var(--tr)}
.inp:focus{outline:none;border-color:var(--acc)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.modal-actions button{flex:1}

/* Toast */
.toast-host{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{padding:10px 18px;border-radius:12px;background:var(--surf);color:var(--text);font-size:13px;font-weight:600;border:1px solid var(--bord);opacity:1;transition:opacity .2s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.s{border-color:#10B981;color:#10B981}
.toast.e{border-color:#EF4444;color:#EF4444}
.toast.i{border-color:var(--acc);color:var(--acc)}

/* Bottom nav */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--surf);border-top:1px solid var(--bord);z-index:50;align-items:stretch}
.bnav-overlay{display:none}
.bnav-drawer{display:none}
@media(max-width:767px){.bnav{display:flex}.content{padding-bottom:72px}}
</style>
</head>

<!-- FAB -->
<button style="position:fixed;bottom:72px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#FF6B35);color:#0A0E1A;border:none;font-size:24px;font-weight:800;cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(245,166,35,.5)" onclick="openAddModal()">+</button>

<!-- Add/Edit Modal -->
<div class="overlay" id="item-modal">
  <div class="sheet">
    <div class="sheet-title">
      <span id="modal-title">Add Menu Item</span>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer">×</button>

        <input type="number" class="inp" id="f-price" placeholder="0" min="0" step="0.5">

    </div>
    <div class="ff">
      <label>Description (optional)</label>
      <input type="text" class="inp" id="f-desc" placeholder="Short description for menu...">
    </div>
    <div class="row2">
      <div class="ff">
        <label>GST %</label>
        <select class="inp" id="f-gst">

      <label class="toggle">

        <div class="tog"></div>

    <div class="modal-actions">
      <button class="btn-danger" id="del-btn" style="display:none" onclick="deleteItem()">🗑 Delete</button>
      <button class="btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn-pri" onclick="saveItem()">Save</button>

<div class="bnav" id="bnav"></div>

<!-- BATCH 067-hotfix (15-May-26): render the sidebar synchronously at parse
     time so this page doesn't appear sidebar-less for ~300ms while async
     data loads. Mirrors the canonical pattern used by dashboard / bills /
     customers / settings. The page's own SBPSidebar.render() calls inside
     render() still fire later — they're idempotent re-renders. -->
<script>
(function(){
  if (!window.SBPSidebar || typeof window.SBPSidebar.render !== 'function') {
    console.warn('[067-hf] SBPSidebar lib not loaded — sidebar will not render');
    return;
  }
  function renderForViewport(){
    if (window.innerWidth >= 1024) {
      window.SBPSidebar.render({ layout: 'desktop', currentPage: 'menu' });
    } else {
      window.SBPSidebar.render({ layout: 'mobile-bottom', currentPage: 'menu', container: '.bnav' });
      window.SBPSidebar.render({ layout: 'mobile-drawer', currentPage: 'menu', container: '.bnav-drawer' });
    }
  }
  renderForViewport();
  var lastIsDesktop = window.innerWidth >= 1024;
  var resizeTimer = null;
  window.addEventListener('resize', function(){
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      var isDesktop = window.innerWidth >= 1024;
      if (isDesktop !== lastIsDesktop) { lastIsDesktop = isDesktop; renderForViewport(); }
    }, 100);
  });
})();
</script>

<script>
'use strict';
const _shopId = localStorage.getItem('sbp_shop_id') || '';
let _items   = [];
let _editId  = null;
let _filter  = 'all';
let _view    = localStorage.getItem('sbp_menu_view') || 'grid';

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fINR(n){ return n>0?'₹'+parseFloat(n).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2}):'₹0'; }
function toast(msg,type='i'){const h=$('toast-host');const e=document.createElement('div');e.className='toast '+type;e.textContent=msg;h.appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),200)},2500);}
function openModal(id){ if(id)$(id).classList.add('open'); }
function closeModal(){ $('item-modal').classList.remove('open'); }

// ── Load ──────────────────────────────────────────────────────────
async function loadItems(){
  const { data, error } = await _sb.rpc('sbp_services_list_admin', { p_shop_id: _shopId });
  if(error || !data?.ok){ console.warn('menu load:', error?.message); return; }
  _items = (data.services || []).filter(s => s.active !== false);
  renderFilters();
  render();
}

// ── Filters ───────────────────────────────────────────────────────
function renderFilters(){
  const bar = $('filter-bar');
  const cats = [...new Set(_items.map(i => i.category || 'Uncategorised').filter(Boolean))].sort();
  const total = _items.length;
  $('fc-count').textContent = total;

  // Remove existing category chips (keep 'All')
  bar.querySelectorAll('.fc:not([data-cat="all"])').forEach(e=>e.remove());

  cats.forEach(cat => {
    const n = _items.filter(i => (i.category||'Uncategorised') === cat).length;
    const btn = document.createElement('button');
    btn.className = 'fc' + (_filter===cat?' on':'');
    btn.dataset.cat = cat;
    btn.innerHTML = `${esc(cat)} <span class="item-count">${n}</span>`;
    btn.onclick = function(){ setFilter(cat, this); };
    bar.appendChild(btn);
  });

  // Update cat datalist
  const dl = $('cat-list');
  dl.innerHTML = cats.map(c=>`<option value="${esc(c)}">`).join('');
}

function setFilter(cat, el){
  _filter = cat;
  document.querySelectorAll('.fc').forEach(f=>f.classList.toggle('on', f.dataset.cat===cat));
  render();
}

function setView(v){
  _view = v;
  localStorage.setItem('sbp_menu_view', v);
  $('vt-grid').classList.toggle('on', v==='grid');
  $('vt-list').classList.toggle('on', v==='list');
  render();
}

// ── Render ────────────────────────────────────────────────────────
function render(){
  const el = $('content');
  let items = _filter==='all' ? _items : _items.filter(i=>(i.category||'Uncategorised')===_filter);

  if(!_items.length){
    el.innerHTML=`<div class="empty"><div class="empty-em">🍽️</div><div class="empty-title">No menu items yet</div><div class="empty-msg">Add your first item — it will appear here, in the running order screen for waiters, and on your public website for customers.</div><button class="btn-pri" onclick="openAddModal()">+ Add First Item</button></div>`;
    SBPSidebar.render('menu');
    return;
  }
  if(!items.length){
    el.innerHTML=`<div class="empty"><div class="empty-em">🔍</div><div class="empty-title">No items in this category</div><button class="btn-pri" onclick="openAddModal()">+ Add Item</button></div>`;
    SBPSidebar.render('menu');
    return;
  }

  if(_view==='list') renderList(items, el);
  else renderGrid(items, el);
  SBPSidebar.render('menu');
}

function renderGrid(items, el){
  // Group by category
  const cats = {};
  items.forEach(i=>{const c=i.category||'Uncategorised';if(!cats[c])cats[c]=[];cats[c].push(i);});

  el.innerHTML = Object.entries(cats).map(([cat,citems])=>`
    <div class="menu-grid" style="margin-bottom:24px">
      <div class="cat-hd">
        <span>📂 ${esc(cat)}</span>
        <span class="cat-count">${citems.length} items</span>
      </div>
      ${citems.map(item=>{
        const avail = item.is_available !== false;
        const imgHtml = item.image_url ? `<img src="${esc(item.image_url)}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
        const emoji = emojiForCat(item.category);
        return `<div class="menu-card ${avail?'':'unavailable'}" onclick="openEditModal('${item.id}')">
          <div class="mc-img">${imgHtml || emoji}<div class="mc-avail-dot ${avail?'on':'off'}"></div></div>
          <div class="mc-body">
            <div class="mc-cat">${esc(item.category||'')}</div>
            <div class="mc-name">${esc(item.name)}</div>
            ${item.description?`<div class="mc-desc">${esc(item.description)}</div>`:''}
            <div class="mc-footer">
              <div><div class="mc-price">${fINR(item.price)}</div>${item.gst_rate>0?`<div class="mc-gst">+${item.gst_rate}% GST</div>`:''}</div>
              <div style="font-size:11px;color:${avail?'#10B981':'#EF4444'};font-weight:700">${avail?'✅ Available':'❌ 86\'d'}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function renderList(items, el){
  const cats = {};
  items.forEach(i=>{const c=i.category||'Uncategorised';if(!cats[c])cats[c]=[];cats[c].push(i);});

  el.innerHTML = Object.entries(cats).map(([cat,citems])=>`
    <div style="margin-bottom:20px">
      <div class="cat-hd" style="grid-column:unset;display:flex">
        <span>📂 ${esc(cat)}</span><span class="cat-count" style="margin-left:8px">${citems.length}</span>
      </div>
      <div class="menu-list-view">
        ${citems.map(item=>{
          const avail = item.is_available !== false;
          return `<div class="ml-row ${avail?'':'unavailable'}" onclick="openEditModal('${item.id}')">
            <div class="ml-info">
              <div class="ml-name">${esc(item.name)}</div>
              ${item.description?`<div class="ml-cat">${esc(item.description.substring(0,60))}</div>`:''}
            </div>
            <div>
              <div class="ml-price">${fINR(item.price)}</div>
              ${item.gst_rate>0?`<div class="ml-gst">+${item.gst_rate}% GST</div>`:''}
            </div>
            <div class="ml-avail" style="color:${avail?'#10B981':'#EF4444'};font-size:16px">${avail?'✅':'❌'}</div>
            <div style="font-size:18px;color:var(--t3)">›</div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function emojiForCat(cat){
  cat = (cat||'').toLowerCase();
  if(cat.includes('starter')||cat.includes('snack')) return '🥗';
  if(cat.includes('main')||cat.includes('mains')) return '🍛';
  if(cat.includes('bread')||cat.includes('roti')) return '🫓';
  if(cat.includes('drink')||cat.includes('beverage')) return '🥤';
  if(cat.includes('dessert')||cat.includes('sweet')) return '🍮';
  if(cat.includes('rice')) return '🍚';
  if(cat.includes('soup')) return '🍲';
  if(cat.includes('salad')) return '🥙';
  if(cat.includes('pizza')) return '🍕';
  if(cat.includes('burger')) return '🍔';
  return '🍽️';
}

// ── Add/Edit Modal ────────────────────────────────────────────────
function openAddModal(){
  _editId=null;
  $('modal-title').textContent='Add Menu Item';
  $('f-name').value='';$('f-cat').value='';$('f-price').value='';
  $('f-desc').value='';$('f-gst').value='5';$('f-hsn').value='9963';
  $('f-img').value='';$('f-avail').checked=true;
  $('del-btn').style.display='none';
  $('item-modal').classList.add('open');
  setTimeout(()=>$('f-name').focus(),100);
}

function openEditModal(id){
  const item = _items.find(i=>i.id===id);
  if(!item) return;
  _editId=id;
  $('modal-title').textContent='Edit Item';
  $('f-name').value=item.name||'';
  $('f-cat').value=item.category||'';
  $('f-price').value=item.price||0;
  $('f-desc').value=item.description||'';
  $('f-gst').value=item.gst_rate||0;
  $('f-hsn').value=item.hsn_sac_code||'';
  $('f-img').value=item.image_url||'';
  $('f-avail').checked=item.is_available!==false;
  $('del-btn').style.display='';
  $('item-modal').classList.add('open');
}

async function saveItem(){
  const name = $('f-name').value.trim();
  const cat  = $('f-cat').value.trim();
  if(!name){toast('Enter item name','e');return;}
  if(!cat){toast('Enter category','e');return;}

  const payload = {
    id:           _editId || undefined,
    name,
    category:     cat,
    price:        parseFloat($('f-price').value)||0,
    description:  $('f-desc').value.trim()||null,
    gst_rate:     parseFloat($('f-gst').value)||0,
    hsn_sac_code: $('f-hsn').value.trim()||null,
    image_url:    $('f-img').value.trim()||null,
    is_available: $('f-avail').checked,
    active:       true,
  };

  const { data, error } = await _sb.rpc('sbp_services_upsert',{p_shop_id:_shopId, p_data:payload});
  if(error||!data?.ok){toast('Save failed: '+(data?.error||error?.message||'?'),'e');return;}

  closeModal();
  toast(_editId?'Item updated ✓':'Item added ✓','s');
  await loadItems();
}

async function deleteItem(){
  if(!_editId) return;
  const item=_items.find(i=>i.id===_editId);
  if(!confirm(`Remove "${item?.name}" from menu?`)) return;
  // Soft delete via upsert with active=false
  const { data, error } = await _sb.rpc('sbp_services_upsert',{
    p_shop_id:_shopId,
    p_data:{id:_editId, name:item?.name||'x', active:false, price:item?.price||0}
  });
  if(error||!data?.ok){toast('Delete failed: '+(data?.error||error?.message||'?'),'e');return;}
  closeModal();
  toast('Item removed','s');
  await loadItems();
}

// ── Quick toggle availability from list (without opening modal) ───
async function toggleAvailability(id, val){
  const item=_items.find(i=>i.id===id);
  if(!item) return;
  const { data, error } = await _sb.rpc('sbp_services_upsert',{
    p_shop_id:_shopId,
    p_data:{id, name:item.name, price:item.price, is_available:val, active:true}
  });
  if(!error&&data?.ok){
    item.is_available=val;
    render();
    toast(val?'✅ '+item.name+' available':'❌ '+item.name+' 86\'d','s');
  }
}

// ── Init ──────────────────────────────────────────────────────────
(async function init(){
  if(!_shopId){toast('No shop found','e');return;}
  // Menu management is part of the restaurant/Business suite.
  if(!isBiz()){
    document.body.innerHTML='<div style="max-width:460px;margin:80px auto;text-align:center;font-family:system-ui;color:#F1F5F9;background:#121826;padding:40px 28px;border-radius:16px;border:1px solid #252F44"><div style="font-size:42px">📋</div><div style="font-family:Outfit,sans-serif;font-size:19px;font-weight:800;margin:12px 0 8px">Menu — Business</div><div style="font-size:13px;color:#94A3B8;line-height:1.6;margin-bottom:22px">Restaurant menu management is part of the Business plan (₹499/mo). Restaurants get a 60-day free trial.</div><button onclick="window.location.href=\'subscription.html\'" style="background:#F5A623;color:#0A0E1A;border:none;border-radius:10px;padding:11px 20px;font-weight:800;cursor:pointer">Upgrade to Business</button></div>';
    return;
  }
  setView(_view);
  await loadItems();
})();
</script>
</body>
