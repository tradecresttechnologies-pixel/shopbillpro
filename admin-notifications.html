<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png?v=2">
<title>Notifications — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0A0A12;
      color: #F0EFF8;
    }

    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: rgba(19, 19, 28, 0.8);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(124, 58, 237, 0.2);
      padding: 24px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      left: 0;
      top: 0;
    }

    .main-content {
      flex: 1;
      margin-left: 280px;
      padding: 32px;
    }

    .nav-item {
      padding: 12px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-item:hover {
      background: rgba(124, 58, 237, 0.1);
      color: #F5A623;
    }

    .nav-item.active {
      background: rgba(124, 58, 237, 0.2);
      color: #F5A623;
      border-left: 3px solid #F5A623;
      padding-left: 11px;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #F5A623, #FF8A00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      color: #8A8AA8;
      font-size: 14px;
    }

    .send-notification {
      background: rgba(20, 18, 32, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(124, 58, 237, 0.2);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #B8B4D8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: #F0EFF8;
      transition: all 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: #F5A623;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, #F5A623, #FF8A00);
      color: #0A0E1A;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .notification-item {
      background: rgba(20, 18, 32, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(124, 58, 237, 0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .notification-icon {
      font-size: 24px;
      min-width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .notification-content {
      flex: 1;
    }

    .notification-title {
      font-size: 14px;
      font-weight: 700;
      color: #F0EFF8;
      margin-bottom: 4px;
    }

    .notification-message {
      font-size: 13px;
      color: #8A8AA8;
      margin-bottom: 8px;
    }

    .notification-meta {
      font-size: 11px;
      color: #5E5A7A;
    }

    .notification-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }

    .status-pending {
      background: rgba(250, 204, 21, 0.2);
      color: #FCD34D;
    }

    .status-sent {
      background: rgba(16, 185, 129, 0.2);
      color: #86EFAC;
    }

    .status-error {
      background: rgba(239, 68, 68, 0.2);
      color: #FCA5A5;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8A8AA8;
    }

    @media (max-width: 768px) {
      .sidebar { position: static; width: 100%; height: auto; }
      .main-content { margin-left: 0; }
      .notification-item { flex-direction: column; }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #F5A623, #FF8A00);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
    }

    .nav-section {
      margin-bottom: 32px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 700;
      color: #5E5A7A;
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .nav-divider {
      height: 1px;
      background: rgba(124, 58, 237, 0.1);
      margin: 12px 0;
    }

    .nav-icon {
      font-size: 16px;
      min-width: 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <div class="logo-icon">🛡️</div>
        <div class="logo-text">Admin</div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Main</div>
        <div class="nav-item" data-page="dashboard">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="analytics">
          <span class="nav-icon">📈</span>
          <span>Analytics</span>
        </div>
        <div class="nav-item" data-page="users">
          <span class="nav-icon">👥</span>
          <span>Users</span>
        </div>
        <div class="nav-item" data-page="revenue">
          <span class="nav-icon">💰</span>
          <span>Revenue</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Management</div>
        <div class="nav-item" data-page="features">
          <span class="nav-icon">🚀</span>
          <span>Feature Flags</span>
        </div>
        <div class="nav-item" data-page="technical">
          <span class="nav-icon">⚙️</span>
          <span>Technical Health</span>
        </div>
      </div>

      <div class="nav-divider"></div>

      <div class="nav-section">
        <div class="nav-label">System</div>
        <div class="nav-item active" data-page="notifications">
          <span class="nav-icon">🔔</span>
          <span>Notifications</span>
        </div>
        <div class="nav-item" data-page="audit">
          <span class="nav-icon">📋</span>
          <span>Audit Logs</span>
        </div>
      </div>

      <div class="nav-divider" style="margin-top: auto; margin-bottom: 16px;"></div>

      <div class="nav-item" id="logoutBtn">
        <span class="nav-icon">🚪</span>
        <span>Logout</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="header">
        <h1>Notifications</h1>
        <p>Send system alerts and upgr upgrades notices to users</p>
      </div>

      <!-- Send Notification -->
      <div class="send-notification">
        <h2 style="margin-bottom: 16px; font-size: 18px;">📨 Send Notification</h2>
        <form id="notificationForm">
          <div class="form-row">
            <div class="form-group">
              <label for="notifTitle">Title</label>
              <input 
                type="text" 
                id="notifTitle" 
                placeholder="e.g., Feature Update Available" 
                required
              >
            </div>
            <div class="form-group">
              <label for="notifType">Type</label>
              <select id="notifType" required>
                <option value="info">ℹ️ Information</option>
                <option value="success">✓ Success</option>
                <option value="warning">⚠️ Warning</option>
                <option value="error">✗ Error</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="notifMessage">Message</label>
            <textarea 
              id="notifMessage" 
              placeholder="Detailed message for users..." 
              required
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="notifTarget">Target Users</label>
              <select id="notifTarget" required>
                <option value="all">🌍 All Users</option>
                <option value="free">📱 Free Users Only</option>
                <option value="pro">⭐ Pro Users Only</option>
                <option value="active">👥 Active Users (30d)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="notifPriority">Priority</label>
              <select id="notifPriority">
                <option value="low">Low</option>
                <option value="normal" selected>Normal</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn" style="width: 100%; margin-top: 8px;">
            Send Notification
          </button>
        </form>
      </div>

      <!-- Recent Notifications -->
      <h2 style="margin-top: 32px; margin-bottom: 16px; font-size: 18px;">📋 Recent Notifications</h2>
      <div id="notificationsList"></div>
      <div class="empty-state" id="emptyState" style="display: none;">
        No notifications sent yet.
      </div>
    </div>
  </div>

  <script src="admin-auth.js"></script>
  <script src="admin-db.js"></script>
  <script>
    if (!requireAdminAuth()) throw new Error('Not authenticated');

    const auth = AdminAuth.getInstance();
    const db = AdminDB.getInstance();

    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        const page = item.getAttribute('data-page');
        if (page && page !== 'notifications') {
          window.location.href = `admin-${page}.html`;
        }
      });
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      if (confirm('Logout?')) {
        auth.logout();
        window.location.href = 'admin-login.html';
      }
    });

    // Form submission
    document.getElementById('notificationForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('notifTitle').value;
      const message = document.getElementById('notifMessage').value;
      const type = document.getElementById('notifType').value;
      const target = document.getElementById('notifTarget').value;
      const priority = document.getElementById('notifPriority').value;

      await db.sendNotification(title, message, type);

      alert(`✓ Notification sent to ${target} users!`);
      document.getElementById('notificationForm').reset();
      loadNotifications();

      auth.logAction('notification_sent', { title, type, target, priority });
    });

    // Load notifications
    function loadNotifications() {
      const notifications = db.getNotifications(20);
      const list = document.getElementById('notificationsList');
      const empty = document.getElementById('emptyState');

      if (notifications.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      
      const typeIcons = {
        'info': 'ℹ️',
        'success': '✓',
        'warning': '⚠️',
        'error': '✗',
      };

      list.innerHTML = notifications.map(notif => {
        const icon = typeIcons[notif.type] || 'ℹ️';
        const time = new Date(notif.sentAt).toLocaleString();
        const statusClass = notif.status === 'pending' ? 'status-pending' : notif.status === 'sent' ? 'status-sent' : 'status-error';
        
        return `
          <div class="notification-item">
            <div class="notification-icon">${icon}</div>
            <div class="notification-content">
              <div class="notification-title">${notif.title}</div>
              <div class="notification-message">${notif.message}</div>
              <div class="notification-meta">
                Sent ${time} by ${notif.sentBy || 'Admin'}
              </div>
              <span class="notification-status ${statusClass}">
                ${notif.status.toUpperCase()}
              </span>
            </div>
          </div>
        `;
      }).join('');
    }

    loadNotifications();
  </script>
</body>
</html>
