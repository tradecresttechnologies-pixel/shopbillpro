<style>
.lang-hi{display:none!important}
.lang-en{display:inline!important}
html[lang="hi"] .lang-hi{display:inline!important}
html[lang="hi"] .lang-en{display:none!important}

:root{
  --bg:#0A0E1A;--surf:#121826;--surf2:#1A2233;--bord:#252F44;
  --text:#F1F5F9;--t2:#94A3B8;--t3:#64748B;--acc:#F5A623;
  --grn:#10B981;--red:#EF4444;--blu:#3B82F6;--prp:#8B5CF6;
  --font-h:'Outfit',sans-serif;--font-b:'Noto Sans',sans-serif;--tr:.18s ease;
}
html[data-theme='light']{--bg:#F4F5F7;--surf:#FFFFFF;--surf2:#F0F2F5;--bord:#E2E5EA;--text:#0A0E1A;--t2:#6B7280;--t3:#9CA3AF;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);-webkit-font-smoothing:antialiased}
#app-layout{display:flex;min-height:100vh}
#dsb{flex-shrink:0}
#main-col{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--bord);background:var(--surf);position:sticky;top:0;z-index:20}
.topbar-title{font-family:var(--font-h);font-size:18px;font-weight:800}
.btn-sec{padding:9px 16px;border-radius:10px;background:var(--surf2);color:var(--text);border:1px solid var(--bord);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-h);transition:var(--tr)}
.btn-sec:hover{border-color:var(--acc);color:var(--acc)}
.btn-pri{padding:10px 18px;border-radius:10px;background:var(--acc);color:#0A0E1A;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font-h);transition:var(--tr)}
.btn-pri:hover{filter:brightness(1.08)}
.content{padding:20px 22px;max-width:1100px;width:100%;margin:0 auto}
.period-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.pchip{padding:8px 14px;border-radius:9px;border:1.5px solid var(--bord);background:var(--surf2);color:var(--t2);font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--font-h);transition:var(--tr)}
.pchip.on{background:var(--acc);color:#0A0E1A;border-color:var(--acc)}
.pchip:hover{border-color:var(--acc)}
.dt-in{padding:8px 10px;border:1.5px solid var(--bord);border-radius:9px;background:var(--surf2);color:var(--text);font-family:var(--font-h);font-size:12.5px}
.sec{background:var(--surf);border:1px solid var(--bord);border-radius:14px;padding:18px 18px 16px;margin-bottom:16px}
.sec-h{display:flex;align-items:center;gap:9px;font-family:var(--font-h);font-size:14px;font-weight:800;margin-bottom:14px;color:var(--text)}
.sec-h .ic{font-size:18px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px}
.kpi{background:var(--surf2);border:1px solid var(--bord);border-radius:11px;padding:13px 14px}
.kpi-l{font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.kpi-v{font-family:var(--font-h);font-size:20px;font-weight:800;margin-top:5px}
.kpi-v.grn{color:var(--grn)}.kpi-v.red{color:var(--red)}.kpi-v.acc{color:var(--acc)}
table.rt{width:100%;border-collapse:collapse;font-size:12.5px}
table.rt th{text-align:left;padding:9px 10px;color:var(--t2);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--bord)}
table.rt td{padding:9px 10px;border-bottom:1px solid var(--bord)}
table.rt tr:last-child td{border-bottom:none}
table.rt td.num,table.rt th.num{text-align:right;font-variant-numeric:tabular-nums}
.bar-row{display:flex;align-items:center;gap:10px;margin:7px 0}
.bar-lbl{width:120px;font-size:12px;color:var(--t2);font-weight:600;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:9px;background:var(--surf2);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),#FF8A00);border-radius:5px}
.bar-val{width:90px;text-align:right;font-size:12px;font-weight:700;flex-shrink:0;font-variant-numeric:tabular-nums}
.empty-s{color:var(--t3);font-size:12.5px;text-align:center;padding:18px}
.plan-lock{text-align:center;padding:54px 22px;background:var(--surf2);border-radius:16px;border:1px solid var(--bord);max-width:520px;margin:40px auto}
.plan-lock-icon{font-size:42px;margin-bottom:14px}
.plan-lock-title{font-family:var(--font-h);font-size:19px;font-weight:800;margin-bottom:8px}
.plan-lock-msg{font-size:13px;color:var(--t2);margin-bottom:22px;line-height:1.6}
.skel{background:var(--surf2);border-radius:10px;height:80px;animation:pulse 1.3s ease-in-out infinite;margin-bottom:14px}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:.85}}
.bnav-overlay{display:none}
@media(max-width:760px){.content{padding:16px 14px}.bar-lbl{width:90px}.bar-val{width:74px}}
@media print{
  #dsb,.topbar,.period-bar,.no-print{display:none!important}
  .sec{break-inside:avoid;border:1px solid #ccc}
  body{background:#fff;color:#000}
}

<div id="app-layout">
  <div id="dsb"></div>
  <div id="main-col">

    <div class="topbar">
      <div class="topbar-title">📈 <span class="lang-en">Restaurant Reports</span><span class="lang-hi">रेस्तरां रिपोर्ट</span></div>
      <div style="display:flex;gap:8px">
        <button class="btn-sec no-print" onclick="window.print()" title="Print">🖨️</button>
        <button class="btn-sec no-print" onclick="loadReport()" title="Refresh">↻</button>
      </div>
    </div>

    <div class="content" id="content">
      <!-- gate / body injected here -->
      <div id="report-root"></div>
    </div>
  </div>
</div>
<div class="bnav-overlay" id="bnav-overlay" onclick="SBPSidebar.closeDrawer&&SBPSidebar.closeDrawer()"></div>

<script>
'use strict';
const _shopId = localStorage.getItem('sbp_shop_id') || '';
let _from=null,_to=null,_preset='30d';
function $(id){return document.getElementById(id);}
function fINR(n){const x=Number(n)||0;return '₹'+x.toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2});}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function num(n){return (Number(n)||0).toLocaleString('en-IN');}

function _isoOffset(days){const d=new Date();d.setDate(d.getDate()-days);return d.toISOString().slice(0,10);}
function _today(){return new Date().toISOString().slice(0,10);}

function setPreset(p){
  _preset=p;
  if(p==='today'){_from=_today();_to=_today();}
  else if(p==='7d'){_from=_isoOffset(6);_to=_today();}
  else if(p==='30d'){_from=_isoOffset(29);_to=_today();}
  else if(p==='90d'){_from=_isoOffset(89);_to=_today();}
  else if(p==='custom'){
    _from=$('dt-from')?.value||_isoOffset(29);
    _to=$('dt-to')?.value||_today();
  }
  document.querySelectorAll('.pchip').forEach(c=>c.classList.toggle('on',c.dataset.p===p));
  const cw=$('custom-wrap'); if(cw) cw.style.display=(p==='custom')?'flex':'none';
  loadReport();
}

function periodBar(){
  return `<div class="period-bar no-print">
    <span class="pchip" data-p="today" onclick="setPreset('today')">Today</span>
    <span class="pchip" data-p="7d" onclick="setPreset('7d')">7 days</span>
    <span class="pchip on" data-p="30d" onclick="setPreset('30d')">30 days</span>
    <span class="pchip" data-p="90d" onclick="setPreset('90d')">90 days</span>
    <span class="pchip" data-p="custom" onclick="setPreset('custom')">Custom</span>
    <span id="custom-wrap" style="display:none;gap:6px;align-items:center">
      <input type="date" id="dt-from" class="dt-in" value="${_isoOffset(29)}">
      <span style="color:var(--t2)">→</span>
      <input type="date" id="dt-to" class="dt-in" value="${_today()}">
      <button class="btn-pri" onclick="setPreset('custom')">Apply</button>
    </span>
  </div>`;
}

function kpi(label,val,cls){return `<div class="kpi"><div class="kpi-l">${esc(label)}</div><div class="kpi-v ${cls||''}">${val}</div></div>`;}
function sec(icon,title,inner){return `<div class="sec"><div class="sec-h"><span class="ic">${icon}</span><span>${esc(title)}</span></div>${inner}</div>`;}
function tableEl(cols,rows){
  if(!rows||!rows.length) return `<div class="empty-s">No data for this period</div>`;
  const th=cols.map(c=>`<th class="${c.num?'num':''}">${esc(c.h)}</th>`).join('');
  const tr=rows.map(r=>'<tr>'+cols.map(c=>`<td class="${c.num?'num':''}">${c.fmt?c.fmt(r):esc(r[c.k])}</td>`).join('')+'</tr>').join('');
  return `<table class="rt"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
}
function barList(rows,labelKey,valKey,fmt){
  if(!rows||!rows.length) return `<div class="empty-s">No data for this period</div>`;
  const max=Math.max(...rows.map(r=>Number(r[valKey])||0),1);
  return rows.map(r=>{
    const v=Number(r[valKey])||0,pct=Math.max(2,Math.round(v/max*100));
    return `<div class="bar-row"><div class="bar-lbl">${esc(r[labelKey])}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-val">${fmt?fmt(v):num(v)}</div></div>`;
  }).join('');
}

function showGate(){
  $('report-root').innerHTML=`<div class="plan-lock">
    <div class="plan-lock-icon">📈</div>
    <div class="plan-lock-title"><span class="lang-en">Restaurant Reports — Business</span><span class="lang-hi">रेस्तरां रिपोर्ट — बिज़नेस</span></div>
    <div class="plan-lock-msg"><span class="lang-en">Full restaurant analytics — sales, tables, servers, menu, QR funnel and day-close — are part of the Business plan.</span><span class="lang-hi">पूर्ण रेस्तरां एनालिटिक्स बिज़नेस प्लान में शामिल है।</span></div>
    <button class="btn-pri" onclick="window.location.href='subscription.html'">Upgrade to Business</button>
  </div>`;
}

function showSkeleton(){
  $('report-root').innerHTML=periodBar()+
    '<div class="skel"></div>'.repeat(6);
  document.querySelectorAll('.pchip').forEach(c=>c.classList.toggle('on',c.dataset.p===_preset));
  const cw=$('custom-wrap'); if(cw&&_preset==='custom') cw.style.display='flex';
}

async function loadReport(){
  if(!_shopId){ $('report-root').innerHTML='<div class="empty-s">No shop found — please log in again.</div>'; return; }
  showSkeleton();
  let data,error;
  try {
    ({data,error}=await _sb.rpc('sbp_restaurant_report',{
      p_shop_id:_shopId, p_from:_from, p_to:_to
    }));
  } catch(e){ error={message:e.message}; }
  if(error || !data || !data.ok){
    const msg=(data&&data.error)||error?.message||'Could not load report';
    const det=data&&data.detail?(' — '+(data.detail.message||JSON.stringify(data.detail))):'';
    $('report-root').innerHTML=periodBar()+`<div class="sec"><div class="empty-s">⚠️ ${esc(msg)}${esc(det)}</div></div>`;
    bindPeriod();
    return;
  }
  render(data);
}

function render(d){
  const s=d.sales_summary||{};
  let H=periodBar();

  // A1 Sales summary
  H+=sec('💰','Sales Summary',
    `<div class="kpi-grid">
      ${kpi('Bills',num(s.bills))}
      ${kpi('Gross Sales',fINR(s.gross),'grn')}
      ${kpi('Net (excl GST)',fINR(s.net))}
      ${kpi('GST',fINR(s.gst))}
      ${kpi('Discount',fINR(s.discount),'red')}
      ${kpi('Covers',num(s.covers))}
      ${kpi('Avg Bill (AOV)',fINR(s.aov),'acc')}
      ${kpi('Rev / Cover',s.rev_per_cover!=null?fINR(s.rev_per_cover):'—')}
      ${kpi('Collected',fINR(s.paid))}
      ${kpi('Balance Due',fINR(s.balance_due),'red')}
    </div>`);

  // A2 Daily trend
  H+=sec('📅','Daily Sales Trend',
    tableEl([
      {h:'Date',k:'date'},
      {h:'Bills',k:'bills',num:true,fmt:r=>num(r.bills)},
      {h:'Gross',k:'gross',num:true,fmt:r=>fINR(r.gross)},
      {h:'AOV',k:'aov',num:true,fmt:r=>fINR(r.aov)}
    ], d.daily_trend));

  // A3 Day-part
  H+=sec('🕐','Day-Part Sales',
    barList((d.day_part||[]).map(p=>({l:p.part.replace(/^\d\s/,''),v:p.gross,b:p.bills})),'l','v',fINR));

  // A5 Payment split
  H+=sec('💳','Payment Mode Split',
    tableEl([
      {h:'Mode',k:'mode'},
      {h:'Bills',k:'bills',num:true,fmt:r=>num(r.bills)},
      {h:'Amount',k:'amount',num:true,fmt:r=>fINR(r.amount)}
    ], d.payment_split));

  // A6 Discounts + A7 Tax (combined KPI strip)
  const dc=d.discounts||{}, tx=d.tax_summary||{};
  H+=sec('🏷️','Discounts & Tax',
    `<div class="kpi-grid">
      ${kpi('Total Discount',fINR(dc.total_discount),'red')}
      ${kpi('Bills w/ Discount',num(dc.bills_with_disc))}
      ${kpi('Avg Discount',fINR(dc.avg_disc))}
      ${kpi('Total GST',fINR(tx.total_gst))}
      ${kpi('CGST',fINR(tx.cgst))}
      ${kpi('SGST',fINR(tx.sgst))}
      ${kpi('Taxable Value',fINR(tx.taxable))}
    </div>`);

  // B8 Per-table
  H+=sec('🍽️','Revenue by Table',
    tableEl([
      {h:'Table',k:'table'},
      {h:'Bills',k:'bills',num:true,fmt:r=>num(r.bills)},
      {h:'Covers',k:'covers',num:true,fmt:r=>num(r.covers)},
      {h:'Gross',k:'gross',num:true,fmt:r=>fINR(r.gross)},
      {h:'AOV',k:'aov',num:true,fmt:r=>fINR(r.aov)}
    ], d.per_table));

  // B9 Per-section
  H+=sec('📍','Revenue by Section',
    barList((d.per_section||[]).map(x=>({l:x.section,v:x.gross})),'l','v',fINR));

  // B10/11 Turnaround + utilisation
  const tt=d.table_turnaround||{};
  H+=sec('⏱️','Table Turnaround',
    `<div class="kpi-grid">
      ${kpi('Sessions',num(tt.sessions))}
      ${kpi('Avg Time / Table',(tt.avg_minutes||0)+' min','acc')}
      ${kpi('Total Turns',num(tt.turns))}
    </div>
    <div style="margin-top:14px">`+
    tableEl([
      {h:'Table',k:'table'},
      {h:'Turns',k:'turns',num:true,fmt:r=>num(r.turns)},
      {h:'Avg Min',k:'avg_minutes',num:true,fmt:r=>num(r.avg_minutes)}
    ], d.table_utilisation)+`</div>`);

  // B12 Server performance
  H+=sec('🧑‍🍳','Server Performance',
    tableEl([
      {h:'Server',k:'server'},
      {h:'Bills',k:'bills',num:true,fmt:r=>num(r.bills)},
      {h:'Covers',k:'covers',num:true,fmt:r=>num(r.covers)},
      {h:'Gross',k:'gross',num:true,fmt:r=>fINR(r.gross)},
      {h:'AOV',k:'aov',num:true,fmt:r=>fINR(r.aov)}
    ], d.server_performance));

  // C13 Top / bottom items
  H+=sec('🔝','Top Selling Items',
    tableEl([
      {h:'Item',k:'name'},
      {h:'Qty',k:'qty',num:true,fmt:r=>num(r.qty)},
      {h:'Revenue',k:'revenue',num:true,fmt:r=>fINR(r.revenue)}
    ], d.top_items));
  H+=sec('🔻','Slowest Items',
    tableEl([
      {h:'Item',k:'name'},
      {h:'Qty',k:'qty',num:true,fmt:r=>num(r.qty)},
      {h:'Revenue',k:'revenue',num:true,fmt:r=>fINR(r.revenue)}
    ], d.bottom_items));

  // C14 Category mix
  H+=sec('📦','Category Mix',
    barList((d.category_mix||[]).map(c=>({l:c.category,v:c.revenue})),'l','v',fINR));

  // C16 Voids
  const v=d.voids||{};
  H+=sec('🚫','Voids & Wastage',
    `<div class="kpi-grid">
      ${kpi('Voided Bills',num(v.voided_bills),'red')}
      ${kpi('Voided Amount',fINR(v.voided_amount),'red')}
      ${kpi('Voided Items Value',fINR(v.voided_items_value),'red')}
    </div>`);

  // C17 KOT analysis
  const k=d.kot_analysis||{};
  H+=sec('🧾','KOT Analysis',
    `<div class="kpi-grid">
      ${kpi('Sessions',num(k.sessions))}
      ${kpi('Total KOTs',num(k.total_kots))}
      ${kpi('Avg KOTs / Table',k.avg_kots||0,'acc')}
    </div>`);

  // D18 QR funnel
  const q=d.qr_funnel||{};
  H+=sec('📱','QR Order Funnel',
    `<div class="kpi-grid">
      ${kpi('Placed',num(q.placed))}
      ${kpi('Accepted',num(q.accepted),'grn')}
      ${kpi('Modified',num(q.modified),'acc')}
      ${kpi('Rejected',num(q.rejected),'red')}
      ${kpi('Pending',num(q.pending))}
      ${kpi('Expired',num(q.expired))}
    </div>`);

  // D20 QR reject reasons
  H+=sec('❓','QR Rejection Reasons',
    tableEl([
      {h:'Reason',k:'reason'},
      {h:'Count',k:'count',num:true,fmt:r=>num(r.count)}
    ], d.qr_reject_reasons));

  // E21 Day-close
  const dcl=d.day_close||{};
  H+=sec('💼',"Today's Day-Close",
    `<div class="kpi-grid">
      ${kpi('Date',esc(dcl.date||'—'))}
      ${kpi('Bills',num(dcl.bills))}
      ${kpi('Gross',fINR(dcl.gross),'grn')}
      ${kpi('Cash',fINR(dcl.cash))}
      ${kpi('UPI',fINR(dcl.upi))}
      ${kpi('Card',fINR(dcl.card))}
      ${kpi('Credit',fINR(dcl.credit),'red')}
    </div>`);

  // E22 Open tables
  H+=sec('🔓','Open / Unsettled Tables',
    tableEl([
      {h:'Table',k:'table'},
      {h:'Mins Open',k:'mins_open',num:true,fmt:r=>num(r.mins_open)},
      {h:'Covers',k:'covers',num:true,fmt:r=>r.covers==null?'—':num(r.covers)},
      {h:'Server',k:'server',fmt:r=>esc(r.server||'—')}
    ], d.open_tables));

  $('report-root').innerHTML=H;
  bindPeriod();
}

function bindPeriod(){
  document.querySelectorAll('.pchip').forEach(c=>c.classList.toggle('on',c.dataset.p===_preset));
