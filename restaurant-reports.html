:root{
  --bg:#0A0E1A;--surf:#121826;--surf2:#1A2233;--bord:#252F44;

}
html[data-theme='light']{--bg:#F4F5F7;--surf:#FFFFFF;--surf2:#F0F2F5;--bord:#E2E5EA;--text:#0A0E1A;--t2:#6B7280;--t3:#9CA3AF;}

   never got the 220px desktop offset -> topbar/title hidden behind the
   sidebar. Add the offset at >=1024px only (mobile has no #dsb). */

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--bord);background:var(--surf);position:sticky;top:0;z-index:20}

.btn-sec{padding:9px 16px;border-radius:10px;background:var(--surf2);color:var(--text);border:1px solid var(--bord);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-h);transition:var(--tr)}

<script>
'use strict';
const _shopId = localStorage.getItem('sbp_shop_id') || '';
let _from=null,_to=null,_preset='30d';
let _report='';                          // selected report id (picker)
let _fCat='',_fItem='',_fTable='';      // active drill filters
let _filterOpts={categories:[],items:[],tables:[]};
function $(id){return document.getElementById(id);}
function fINR(n){const x=Number(n)||0;return '₹'+x.toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2});}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function num(n){return (Number(n)||0).toLocaleString('en-IN');}

function _isoOffset(days){const d=new Date();d.setDate(d.getDate()-days);return d.toISOString().slice(0,10);}
function _today(){return new Date().toISOString().slice(0,10);}

function setPreset(p){
  _preset=p;
  if(p==='today'){_from=_today();_to=_today();}
  else if(p==='7d'){_from=_isoOffset(6);_to=_today();}
  else if(p==='30d'){_from=_isoOffset(29);_to=_today();}
  else if(p==='90d'){_from=_isoOffset(89);_to=_today();}
  else if(p==='custom'){
    _from=$('dt-from')?.value||_isoOffset(29);
    _to=$('dt-to')?.value||_today();
  }
  document.querySelectorAll('.pchip').forEach(c=>c.classList.toggle('on',c.dataset.p===p));
  const cw=$('custom-wrap'); if(cw) cw.style.display=(p==='custom')?'flex':'none';
  // NOTE: no auto-run — user presses Run (locked decision).
}

// Reports the user can pick, grouped. id → engine report id.
const REPORT_GROUPS=[
  ['Sales', [
    ['sales_summary','Sales Summary'],
    ['daily_trend','Daily Sales Trend'],
    ['day_part','Day-Part (Meal Period) Sales'],
    ['payment_split','Payment Mode Split'],
    ['discount','Discount Report'],
  ]],
  ['Tax', [
    ['tax_summary','Tax / GST Summary'],
  ]],
  ['Items', [
    ['itemised','Itemised Sales Report'],
    ['category_mix','Category Mix'],
  ]],
  ['Tables', [
    ['per_table','Revenue by Table'],
    ['per_section','Revenue by Section'],
    ['turnaround','Table Turnaround & Utilisation'],
  ]],
  ['Staff', [
    ['server','Server / Waiter Performance'],
  ]],
  ['Operational', [
    ['kot','KOT Analysis'],
    ['qr_funnel','QR Order Funnel'],
    ['day_close','Day-Close / Z-Report'],
    ['open_tables','Open / Unsettled Tables'],
  ]],
  ['Audit', [
    ['void','Void & Delete Audit'],
  ]],
  ['', [
    ['all','— Show Everything (Dashboard) —'],
  ]],
];

function pickerBar(){
  const opts=REPORT_GROUPS.map(([grp,items])=>{
    const o=items.map(([id,lbl])=>
      `<option value="${id}"${_report===id?' selected':''}>${esc(lbl)}</option>`).join('');
    return grp?`<optgroup label="${esc(grp)}">${o}</optgroup>`:o;
  }).join('');
  return `<div class="picker-wrap no-print">
    <div class="picker-row">
      <select class="dt-in pick-sel" id="rep-sel">
        <option value="" ${!_report?'selected':''}>— Select a report —</option>
        ${opts}
      </select>
    </div>
    <div class="picker-row">
      <span class="pchip" data-p="today" onclick="setPreset('today')">Today</span>
      <span class="pchip" data-p="7d" onclick="setPreset('7d')">7 days</span>
      <span class="pchip on" data-p="30d" onclick="setPreset('30d')">30 days</span>
      <span class="pchip" data-p="90d" onclick="setPreset('90d')">90 days</span>
      <span class="pchip" data-p="custom" onclick="setPreset('custom')">Custom</span>
      <span id="custom-wrap" style="display:none;gap:6px;align-items:center">
        <input type="date" id="dt-from" class="dt-in" value="${_isoOffset(29)}">
        <span style="color:var(--t2)">→</span>
        <input type="date" id="dt-to" class="dt-in" value="${_today()}">
      </span>
    </div>
    <div class="picker-row">

function fillFilterSelects(){
  const opt=(arr,sel)=>['<option value="">All</option>'].concat(
    (arr||[]).map(v=>`<option value="${esc(v)}"${v===sel?' selected':''}>${esc(v)}</option>`)
  ).join('');
  const c=$('f-cat'),i=$('f-item'),t=$('f-table');
  if(c) c.innerHTML=opt(_filterOpts.categories,_fCat);
  if(i) i.innerHTML=opt(_filterOpts.items,_fItem);
  if(t) t.innerHTML=opt(_filterOpts.tables,_fTable);
}

function runReport(){
  const sel=$('rep-sel');
  _report = sel ? sel.value : '';
  if(!_report){
    $('report-root').innerHTML=`<div class="sec"><div class="empty-s">Pick a report above, choose a date range, then press ▶ Run Report.</div></div>`;
    return;
  }
  _fCat   = $('f-cat')?.value   || '';
  _fItem  = $('f-item')?.value  || '';
  _fTable = $('f-table')?.value || '';
  if(_preset==='custom'){
    _from=$('dt-from')?.value||_from;
    _to=$('dt-to')?.value||_to;
  }
  loadReport();
}

function kpi(label,val,cls){return `<div class="kpi"><div class="kpi-l">${esc(label)}</div><div class="kpi-v ${cls||''}">${val}</div></div>`;}
function sec(icon,title,inner){return `<div class="sec"><div class="sec-h"><span class="ic">${icon}</span><span>${esc(title)}</span></div>${inner}</div>`;}
function secN(icon,title,inner,note){
  const n=note?`<span style="margin-left:auto;font-size:10.5px;color:var(--t3);font-weight:600;white-space:nowrap">${esc(note)}</span>`:'';
  return `<div class="sec"><div class="sec-h" style="display:flex;align-items:center"><span class="ic">${icon}</span><span>${esc(title)}</span>${n}</div>${inner}</div>`;
}
function tableEl(cols,rows,drill){
  if(!rows||!rows.length) return `<div class="empty-s">No data for this period</div>`;
  const th=cols.map(c=>`<th class="${c.num?'num':''}">${esc(c.h)}</th>`).join('');
  const tr=rows.map(r=>{
    const dattr = drill
      ? (drill.dim==='__bill'
          ? ` class="drillable" onclick="drillToBill(${JSON.stringify(String(drill.key(r))).replace(/"/g,'&quot;')})"`
          : ` class="drillable" onclick="openDrill('${drill.dim}', ${JSON.stringify(String(drill.key(r))).replace(/"/g,'&quot;')})"`)
      : '';
    return `<tr${dattr}>`+cols.map(c=>`<td class="${c.num?'num':''}">${c.fmt?c.fmt(r):esc(r[c.k])}</td>`).join('')+'</tr>';
  }).join('');
  return `<table class="rt"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
}
function barList(rows,labelKey,valKey,fmt,drill){
  if(!rows||!rows.length) return `<div class="empty-s">No data for this period</div>`;
  const max=Math.max(...rows.map(r=>Number(r[valKey])||0),1);
  return rows.map(r=>{
    const v=Number(r[valKey])||0,pct=Math.max(2,Math.round(v/max*100));
    const dattr = drill
      ? ` class="bar-row drillable" onclick="openDrill('${drill.dim}', ${JSON.stringify(String(drill.key(r))).replace(/"/g,'&quot;')})"`
      : ' class="bar-row"';
    return `<div${dattr}><div class="bar-lbl">${esc(r[labelKey])}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-val">${fmt?fmt(v):num(v)}</div></div>`;
  }).join('');
}

function showSkeleton(){
  $('report-root').innerHTML='<div class="skel"></div>'.repeat(4);
}

async function loadReport(){
  if(!_shopId){ $('report-root').innerHTML='<div class="empty-s">No shop found — please log in again.</div>'; return; }
  showSkeleton();
  let data,error,vdata;
  try {
    // Always fetch the picked report via the wrapper (computes only
    // what's needed). Void/audit + "Show Everything" also need the
    // void RPC, so fetch it in parallel when relevant.
    const needVoid = (_report==='void' || _report==='all');
    const calls=[
      _sb.rpc('sbp_restaurant_report_one',{
        p_shop_id:_shopId, p_report:_report,
        p_from:_from, p_to:_to,
        p_category:_fCat||null, p_item:_fItem||null, p_table:_fTable||null
      })
    ];
    calls.push(needVoid
      ? _sb.rpc('sbp_restaurant_void_report',{p_shop_id:_shopId,p_from:_from,p_to:_to})
      : Promise.resolve({data:null}));
    const [rep,vr]=await Promise.all(calls);
    data=rep.data; error=rep.error;
    vdata=(vr&&vr.data&&vr.data.ok)?vr.data:null;

    // Wrapper may say "this report lives in the void RPC" → use it.
    if(data && data.ok && data.use_rpc==='sbp_restaurant_void_report'){
      const v=await _sb.rpc('sbp_restaurant_void_report',{
        p_shop_id:_shopId,p_from:_from,p_to:_to});
      vdata=(v&&v.data&&v.data.ok)?v.data:null;
      // synthesise a minimal data envelope so render() can run
      data={ok:true, report:'void', range:{from:_from,to:_to},
             filters:{}, filter_options:_filterOpts};
    }
  } catch(e){ error={message:e.message}; }
  if(error || !data || !data.ok){
    const msg=(data&&data.error)||error?.message||'Could not load report';
    const det=data&&data.detail?(' — '+(data.detail.message||JSON.stringify(data.detail))):'';
    $('report-root').innerHTML=`<div class="sec"><div class="empty-s">⚠️ ${esc(msg)}${esc(det)}</div></div>`;
    return;
  }
  if(data.filter_options){ _filterOpts=data.filter_options; fillFilterSelects(); }
  render(data, vdata);
}

async function openDrill(dim, val){

  $('dov-title').textContent=(_DIM_LABEL[dim]||dim)+': '+val;
  $('dov-body').innerHTML='<div class="skel"></div><div class="skel"></div>';
  $('drill-ov').classList.add('open');
  let r;
  try{
    r=await _sb.rpc('sbp_restaurant_drill',{
      p_shop_id:_shopId, p_mode:'bills', p_dim:dim, p_val:String(val),
      p_from:_from, p_to:_to
    });

  const d=r&&r.data;
  if(!d||!d.ok){
    $('dov-body').innerHTML=`<div class="empty-s">⚠️ ${esc((d&&d.error)||'Could not load')}${d&&d.detail?(' — '+esc(d.detail.message||JSON.stringify(d.detail))):''}</div>`;
    return;
  }
  const bills=d.bills||[];
  let body=`<div class="dov-crumb">${esc(_DIM_LABEL[dim]||dim)} “${esc(val)}” · ${bills.length} bill(s)</div>`;

      {h:'Total',k:'grand_total',num:true,fmt:r=>fINR(r.grand_total)}
    ], bills.map(b=>({...b,_bid:b.bill_id})),
       {dim:'__bill', key:r=>r._bid});
  }
  $('dov-body').innerHTML=body;
}

    </div>`;
  body+=tableEl([
    {h:'Item',k:'name'},
    {h:'Category',k:'category'},
    {h:'Qty',k:'qty',num:true,fmt:r=>num(r.qty)},
    {h:'Rate',k:'rate',num:true,fmt:r=>fINR(r.rate)},
    {h:'GST',k:'gst',num:true,fmt:r=>fINR(r.gst)},
    {h:'Total',k:'total',num:true,fmt:r=>fINR(r.total)}
  ], items);
  $('dov-body').innerHTML=body;
}

function drillBack(){
  if(_drillCtx) openDrill(_drillCtx.dim,_drillCtx.val);
}

(async function init(){
  try { SBPSidebar.render('restaurant_reports'); } catch(e){}
  if(!isBiz()){ showGate(); return; }
  // Mount the persistent picker (stays put; not re-rendered per run).
  $('picker-mount').innerHTML=pickerBar();
  setPreset('30d');
  document.querySelectorAll('.pchip').forEach(c=>c.classList.toggle('on',c.dataset.p===_preset));
  fillFilterSelects();
  $('report-root').innerHTML=`<div class="sec"><div class="empty-s">Pick a report, choose a date range, then press ▶ Run Report.</div></div>`;
})();
</script>
</body>
</html>
