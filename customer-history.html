<script>
// Plan check
function _sbpPlanInfo(){
  const s=JSON.parse(localStorage.getItem('sbp_shop')||'{}');
  let plan=(s.plan||'free').toLowerCase();
  if(plan==='enterprise') plan='business';
  const exp=s.plan_expires_at;
  if(exp && plan!=='free' && new Date(exp) < new Date()) plan='free';
  return {plan, expired:!!(exp && new Date(exp) < new Date())};
}
function isPro(){const p=_sbpPlanInfo().plan;return p==='pro'||p==='business';}
function isBiz(){return _sbpPlanInfo().plan==='business';}
function isFree(){return _sbpPlanInfo().plan==='free';}
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans','Noto Sans Devanagari',sans-serif;-webkit-font-smoothing:antialiased}
:root{
  --acc:#F5A623;--acc2:#FF6B35;--acc3:#10B981;--acc4:#3B82F6;
  --bg:#0A0A12;--surf:#13131C;--surf2:#1C1C28;--surf3:#252535;--bord:#2A2A3A;
  --text:#F0EFF8;--t2:#8A8AA8;--t3:#5A5A75;--font-h:'Outfit',sans-serif;
  --rs:14px;--tr:.2s ease;--amber:#F59E0B;--rose:#F43F5E;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="light"]{
  --bg:#FAFAFC;--surf:#FFFFFF;--surf2:#F2F2F8;--surf3:#E8E8F0;--bord:#E5E5EE;
  --text:#0F0E18;--t2:#5E5A7A;--t3:#9090AA;
}
body{background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}

/* App container */
#app{max-width:560px;margin:0 auto;padding-bottom:80px;min-height:100dvh}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;background:var(--bg);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--bord)}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-r{display:flex;gap:8px}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--surf);border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text);transition:var(--tr)}
.back-btn:hover{background:var(--surf2)}
.tb-title{font-family:var(--font-h);font-size:17px;font-weight:800;letter-spacing:.2px}
.ic-btn{width:36px;height:36px;border-radius:10px;background:var(--surf);border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:var(--tr)}
.ic-btn:hover{background:var(--surf2)}

/* ── Customer header (detail mode) ── */
.cust-hd{display:flex;gap:14px;align-items:center;padding:16px 14px 14px;border-bottom:1px solid var(--bord)}
.cust-av{width:60px;height:60px;border-radius:18px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-h);font-weight:800;font-size:22px;flex-shrink:0;letter-spacing:.5px}
.cust-info{flex:1;min-width:0}
.cust-nm{font-family:var(--font-h);font-size:19px;font-weight:800;color:var(--text);margin-bottom:3px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-sub{font-size:11px;color:var(--t2);font-weight:500}
.cust-badge{display:inline-block;background:var(--surf2);border:1px solid var(--bord);padding:2px 8px;font-size:10px;font-weight:700;border-radius:8px;color:var(--t2);margin-top:4px}

/* ── Stats grid (detail mode) ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 14px}
.st-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rs);padding:11px 12px}
.st-lbl{font-size:10px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.st-val{font-family:var(--font-h);font-size:17px;font-weight:800;color:var(--text)}
.st-sub{font-size:10px;color:var(--t2);margin-top:2px}
.st-card.due .st-val{color:var(--acc2)}
.st-card.clear .st-val{color:var(--acc3)}
.st-card.loyalty .st-val{color:var(--acc)}

/* ── Filter chips ── */
.filter-row{display:flex;gap:6px;padding:8px 14px 12px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;background:var(--surf);border:1px solid var(--bord);border-radius:18px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;transition:var(--tr)}
.chip.on{background:var(--acc);color:#0A0E1A;border-color:var(--acc)}
.chip-count{display:inline-block;background:rgba(0,0,0,.18);font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:700}
.chip:not(.on) .chip-count{background:var(--surf2)}

/* ── Timeline ── */
.tl-list{padding:4px 14px}
.tl-item{position:relative;padding-left:38px;padding-bottom:12px}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:14px;top:32px;bottom:0;width:2px;background:var(--bord)}
.tl-ic{position:absolute;left:0;top:4px;width:30px;height:30px;border-radius:50%;background:var(--surf2);border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;font-size:14px;z-index:2}
.tl-ic.bill{background:rgba(245,166,35,.15);border-color:var(--acc)}
.tl-ic.appointment{background:rgba(59,130,246,.15);border-color:var(--acc4)}
.tl-ic.loyalty{background:rgba(16,185,129,.15);border-color:var(--acc3)}
.tl-ic.registered{background:rgba(244,63,94,.15);border-color:var(--rose)}
.tl-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rs);padding:11px 12px;cursor:pointer;transition:var(--tr)}
.tl-card:hover{border-color:rgba(245,166,35,.3)}
.tl-card.voided{opacity:.6;background:var(--surf2)}
.tl-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:8px}
.tl-title{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--text);flex:1;min-width:0}
.tl-amt{font-family:var(--font-h);font-size:14px;font-weight:800;color:var(--acc);white-space:nowrap;flex-shrink:0}
.tl-amt.neg{color:var(--rose)}
.tl-amt.pos{color:var(--acc3)}
.tl-amt.struck{text-decoration:line-through;color:var(--t2)}
.tl-meta{font-size:11px;color:var(--t2);line-height:1.4}
.tl-tag{display:inline-block;padding:1px 7px;background:var(--surf2);border-radius:6px;font-size:10px;font-weight:600;color:var(--t2);margin-right:4px;border:1px solid var(--bord)}
.tl-tag.s{background:rgba(16,185,129,.15);color:var(--acc3);border-color:var(--acc3)}
.tl-tag.e{background:rgba(244,63,94,.15);color:var(--rose);border-color:var(--rose)}
.tl-tag.w{background:rgba(245,166,35,.15);color:var(--acc);border-color:var(--acc)}
.tl-time{font-size:10px;color:var(--t3);margin-top:4px;font-weight:500}

/* ── Picker mode (no customer_id) ── */
.pkr-search{padding:14px}
.pkr-inp{width:100%;padding:13px 16px;background:var(--surf);border:1px solid var(--bord);border-radius:12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:var(--tr)}
.pkr-inp:focus{border-color:var(--acc)}
.pkr-section-h{font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:14px 14px 6px}
.pkr-list{padding:4px 14px}
.pkr-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rs);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr)}
.pkr-card:hover{border-color:rgba(245,166,35,.3)}
.pkr-av{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-h);font-weight:700;font-size:15px;flex-shrink:0}
.pkr-body{flex:1;min-width:0}
.pkr-nm{font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pkr-sub{font-size:11px;color:var(--t2)}
.pkr-arr{font-size:18px;color:var(--t3)}

/* ── Empty / loading / locked ── */
.locked-banner{margin:14px;background:linear-gradient(135deg,rgba(245,166,35,.12),rgba(255,107,53,.06));border:1.5px solid rgba(245,166,35,.35);border-radius:var(--rs);padding:18px;text-align:center}
.locked-banner-title{font-family:var(--font-h);font-size:15px;font-weight:800;color:var(--acc);margin-bottom:6px}
.locked-banner-msg{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:12px}
.btn-upgrade{display:inline-block;background:linear-gradient(135deg,#F5A623,#FF8A00);color:#0A0E1A;font-weight:800;font-size:13px;padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-h)}

.empty{text-align:center;padding:50px 24px;color:var(--t2)}
.empty-emoji{font-size:48px;margin-bottom:12px}
.empty-title{font-family:var(--font-h);font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-msg{font-size:13px;line-height:1.5;margin-bottom:18px}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px}
.spinner{width:28px;height:28px;border:3px solid var(--bord);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Bottom nav placeholder ── */
.bnav{}
</style>

<style>

.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;gap:3px;cursor:pointer;transition:var(--tr);position:relative;min-height:56px;user-select:none}

.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--surf2);flex-shrink:0}
.drawer-title{display:flex;align-items:center;gap:10px}
.drawer-brand{font-size:17px;font-weight:800;color:var(--acc);letter-spacing:.3px}

.drawer-close:active{transform:scale(.92);background:var(--surf3)}
.drawer-nav{flex:1;overflow-y:auto;padding:8px 0;-webkit-overflow-scrolling:touch}
.drawer-item{display:flex;align-items:center;gap:14px;padding:13px 18px;color:var(--text);text-decoration:none;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background .15s}
.drawer-item:active{background:var(--surf2)}
.drawer-item.active{background:rgba(245,166,35,.12);color:var(--acc);position:relative}
.drawer-item.active::before{content:'';position:absolute;left:0;width:3px;height:60%;background:var(--acc);border-radius:0 3px 3px 0}
.drawer-item.coming-soon{opacity:.55}
.drawer-ic{font-size:20px;width:24px;text-align:center;flex-shrink:0}
.drawer-lb{flex:1}
.drawer-footer{border-top:1px solid var(--surf2);padding:8px 0 12px;flex-shrink:0}
.drawer-footer .drawer-item{color:#EF4444}
.drawer-ver{text-align:center;font-size:11px;color:var(--t2);margin-top:4px;letter-spacing:.4px}

#toast-container{position:fixed;bottom:calc(72px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast{background:var(--surf3);color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.45);border:1px solid var(--bord);white-space:nowrap;max-width:calc(100vw - 40px);overflow:hidden;text-overflow:ellipsis;animation:toastIn .22s cubic-bezier(.4,0,.2,1);pointer-events:all}
.toast.s{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:var(--acc3)}
.toast.e{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:var(--acc2)}
.toast.i{background:rgba(245,166,35,.15);border-color:rgba(245,166,35,.3);color:#FF8A00}
@keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

#dsb{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surf);border-right:1px solid var(--bord);display:flex;flex-direction:column;z-index:200;overflow-y:auto}

.dsb-ic{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.dsb-sep{height:1px;background:var(--bord);margin:6px 12px}

@media(max-width:1023px){#dsb{display:none!important}}

}

}

<body>
<div id="app">

  <div class="topbar">
    <div class="tb-l">
      <div class="back-btn" onclick="goBack()">←</div>
      <div class="tb-title">📋 <span class="lang-en">Customer History</span><span class="lang-hi">ग्राहक इतिहास</span></div>
    </div>
    <div class="tb-r">
      <div class="ic-btn" onclick="toggleTheme()" id="theme-btn">☀️</div>
      <div class="ic-btn" onclick="window.location.reload()" title="Refresh">🔄</div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loader" class="loader"><div class="spinner"></div><div style="font-size:11px;color:var(--t2)">Loading…</div></div>

  <!-- Picker mode (shown when no customer_id in URL) -->
  <div id="picker-mode" style="display:none">
    <div class="pkr-search">
      <input class="pkr-inp" id="pkr-search-inp" placeholder="🔍 Search customer name…" oninput="filterPicker(this.value)">
    </div>
    <div class="pkr-section-h"><span class="lang-en">Recent Customers</span><span class="lang-hi">हाल के ग्राहक</span></div>
    <div class="pkr-list" id="pkr-list"></div>
  </div>

  <!-- Detail mode (shown when ?customer_id=X) -->
  <div id="detail-mode" style="display:none">
    <!-- Customer header -->
    <div class="cust-hd">
      <div class="cust-av" id="cust-av"></div>
      <div class="cust-info">
        <div class="cust-nm" id="cust-nm">—</div>
        <div class="cust-sub" id="cust-sub">—</div>
        <div class="cust-badge" id="cust-badge" style="display:none"></div>
      </div>
    </div>

    <!-- Stats grid -->
    <div class="stats-grid" id="stats-grid"></div>

    <!-- Filter chips -->
    <div class="filter-row">
      <div class="chip on" data-filter="all" onclick="setFilter('all')">All <span class="chip-count" id="cnt-all">0</span></div>
      <div class="chip" data-filter="bill" onclick="setFilter('bill')">🧾 <span class="lang-en">Bills</span><span class="lang-hi">बिल</span> <span class="chip-count" id="cnt-bill">0</span></div>
      <div class="chip" data-filter="appointment" onclick="setFilter('appointment')">📅 <span class="lang-en">Appts</span><span class="lang-hi">अपॉइंटमेंट</span> <span class="chip-count" id="cnt-appointment">0</span></div>
      <div class="chip" data-filter="loyalty" onclick="setFilter('loyalty')">⭐ <span class="lang-en">Loyalty</span><span class="lang-hi">लॉयल्टी</span> <span class="chip-count" id="cnt-loyalty">0</span></div>
    </div>

    <!-- Timeline -->
    <div class="tl-list" id="tl-list"></div>

    <!-- Action buttons -->
    <div style="padding:12px 14px 20px;display:flex;gap:8px">
      <button id="btn-wa" onclick="openWa()" style="flex:1;padding:12px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:12px;font-family:var(--font-h);font-size:13px;font-weight:800;cursor:pointer">📲 WhatsApp</button>
      <button onclick="goNewBill()" style="flex:1;padding:12px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0A0E1A;border:none;border-radius:12px;font-family:var(--font-h);font-size:13px;font-weight:800;cursor:pointer">🧾 New Bill</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bnav"></div>
  <div class="bnav-overlay" onclick="if(window.SBPSidebar)SBPSidebar._closeDrawer()"></div>
  <div class="bnav-drawer"></div>
</div>

<div id="toast-container"></div>

<script>
// ════════════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════════════
let _user=null, _shop=null, _shopId=null;
let _customerId=null;
let _customer=null, _stats=null, _timeline=[];
let _filter='all';
let _pickerCusts=[];

// ════════════════════════════════════════════════════════════════════
// Utilities
// ════════════════════════════════════════════════════════════════════
const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);
const fINR = n => '₹' + Math.round(Number(n)||0).toLocaleString('en-IN');
const escHtml = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = name => {
  const parts = String(name||'').trim().split(/\s+/).slice(0,2);
  return parts.map(p => p[0]).join('').toUpperCase() || '?';
};
const avatarColor = name => {
  const colors = ['#F5A623','#FF6B35','#10B981','#3B82F6','#8B5CF6','#EC4899','#F43F5E','#06B6D4'];
  let hash = 0;
  for (let i=0; i<String(name||'').length; i++) hash = (hash*31 + name.charCodeAt(i)) | 0;
  return colors[Math.abs(hash) % colors.length];
};

function fmtIST(iso, opts){
  if(!iso) return '—';
  try {
    const d = new Date(iso);
    const o = opts || {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'};
    return d.toLocaleString('en-IN', o);
  } catch(e){ return '—'; }
}
function fmtIST_short(iso){
  if(!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',timeZone:'Asia/Kolkata'});
  } catch(e){ return '—'; }
}
function fmtRelative(iso){
  if(!iso) return '—';
  try {
    const d = new Date(iso);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    const diffHr  = Math.floor(diffMs / 3600000);
    const diffDay = Math.floor(diffMs / 86400000);
    if (diffMin < 1) return 'just now';
    if (diffMin < 60) return `${diffMin}m ago`;
    if (diffHr < 24)  return `${diffHr}h ago`;
    if (diffDay < 7)  return `${diffDay}d ago`;
    return fmtIST_short(iso);
  } catch(e){ return '—'; }
}

function toast(msg, type='i'){
  const c = $('#toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; setTimeout(()=>el.remove(),250); }, 2400);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'light' ? 'dark' : 'light';
  if (next === 'light') document.documentElement.setAttribute('data-theme','light');
  else document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('sbp_theme', next);
  $('#theme-btn').textContent = next === 'light' ? '🌙' : '☀️';
}
function goBack(){
  if (_customerId) {
    // From detail → go to customers list
    window.location.href = 'customers.html';
  } else {
    // From picker → go to dashboard
    window.location.href = 'dashboard.html';
  }
}

// ════════════════════════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════════════════════════
async function init(){
  // Render sidebar (per Batch 012 hotfix lessons)
  if (window.SBPSidebar) {
    SBPSidebar.render({ currentPage: 'customer_history', layout: 'desktop' });
    SBPSidebar.render({ currentPage: 'customer_history', layout: 'mobile-bottom', container: '.bnav' });
    SBPSidebar.render({ currentPage: 'customer_history', layout: 'mobile-drawer', container: '.bnav-drawer' });
  }

  // Theme
  if (localStorage.getItem('sbp_theme') === 'light') $('#theme-btn').textContent = '🌙';

  // Auth
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  _user = session.user;
  _shop = JSON.parse(localStorage.getItem('sbp_shop') || '{}');
  _shopId = localStorage.getItem('sbp_shop_id') || _shop.id;

  // Read customer_id from URL
  const urlParams = new URLSearchParams(window.location.search);
  _customerId = urlParams.get('customer_id') || null;

  if (_customerId) {
    await loadDetail();
  } else {
    await loadPicker();
  }
}

// ════════════════════════════════════════════════════════════════════
// Picker mode — search + recent customers
// ════════════════════════════════════════════════════════════════════
async function loadPicker(){
  $('#loader').style.display = 'flex';
  $('#picker-mode').style.display = 'none';
  $('#detail-mode').style.display = 'none';

  // ── HOTFIX (6 May 2026): customers table doesn't have updated_at column.
  // Use joined_at (fallback to name) for ordering. If Supabase fails entirely
  // (offline, RLS issue, network), fall back to localStorage cache that
  // customers.html populates on every load — better than empty page.
  let custs = [];
  let supabaseOk = false;
  try {
    const { data, error } = await _sb
      .from('customers')
      .select('id,name,phone,whatsapp,customer_type,joined_at')
      .eq('shop_id', _shopId)
      .order('joined_at', { ascending: false })
      .limit(40);
    if (error) throw error;
    custs = data || [];
    supabaseOk = true;
  } catch (e) {
    console.warn('[CustomerHistory] Supabase fetch failed, using localStorage:', e?.message || e);
    // Fallback to localStorage cache populated by customers.html
    try {
      const cached = JSON.parse(localStorage.getItem('sbp_customers') || '[]');
      custs = (cached || [])
        .filter(c => c && c.id && c.name)
        .sort((a,b) => {
          const ta = a.joined_at ? new Date(a.joined_at).getTime() : 0;
          const tb = b.joined_at ? new Date(b.joined_at).getTime() : 0;
          if (tb !== ta) return tb - ta;
          return String(a.name||'').localeCompare(String(b.name||''));
        })
        .slice(0, 40);
    } catch (cacheErr) {
      custs = [];
    }
    if (!custs.length) toast('Could not load customers', 'e');
  }

  _pickerCusts = custs;
  renderPicker(_pickerCusts);

  $('#loader').style.display = 'none';
  $('#picker-mode').style.display = 'block';
}

function renderPicker(custs){
  const list = $('#pkr-list');
  if (!custs.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-emoji">👥</div>
      <div class="empty-title"><span class="lang-en">No customers yet</span><span class="lang-hi">अभी तक कोई ग्राहक नहीं</span></div>
      <div class="empty-msg"><span class="lang-en">Add customers from the Customers page or create your first bill.</span><span class="lang-hi">ग्राहक पेज से ग्राहक जोड़ें या अपना पहला बिल बनाएं।</span></div>
      <button class="btn-upgrade" onclick="window.location.href='customers.html'"><span class="lang-en">Go to Customers</span><span class="lang-hi">ग्राहकों पर जाएं</span></button>
    </div>`;
    return;
  }
  list.innerHTML = custs.map(c => `
    <div class="pkr-card" onclick="window.location.href='customer-history.html?customer_id=${c.id}'">
      <div class="pkr-av" style="background:${avatarColor(c.name)}">${initials(c.name)}</div>
      <div class="pkr-body">
        <div class="pkr-nm">${escHtml(c.name)}</div>
        <div class="pkr-sub">${escHtml(c.customer_type || 'Regular')} · ${c.phone || c.whatsapp || '—'}</div>
      </div>
      <div class="pkr-arr">›</div>
    </div>
  `).join('');
}

function filterPicker(q){
  const trimmed = (q || '').trim().toLowerCase();
  if (!trimmed) { renderPicker(_pickerCusts); return; }
  const filtered = _pickerCusts.filter(c =>
    String(c.name||'').toLowerCase().includes(trimmed) ||
    String(c.phone||'').includes(trimmed) ||
    String(c.whatsapp||'').includes(trimmed)
  );
  renderPicker(filtered);
}

// ════════════════════════════════════════════════════════════════════
// Detail mode — full timeline
// ════════════════════════════════════════════════════════════════════
async function loadDetail(){
  $('#loader').style.display = 'flex';
  $('#picker-mode').style.display = 'none';
  $('#detail-mode').style.display = 'none';

  // ── HOTFIX v2 (6 May 2026): Three-tier bulletproof load ──
  // v1 had two bugs: explicit column list (some columns may not exist on
  // older customers tables, errors the whole query); .single() throws on
  // 0 rows. Result: when RPC failed, fallback also failed → user bounced
  // to customers.html with "Could not load customer".
  // v2: select('*') + .maybeSingle() + localStorage as 3rd-tier fallback.
  //
  // Tier 1: sbp_get_customer_timeline RPC (full timeline)
  // Tier 2: direct customers table fetch (basic info, empty timeline)
  // Tier 3: localStorage sbp_customers cache (offline-created customers)
  // Bounce: only if all three tiers fail (e.g., bad customer_id in URL)

  let rpcOk = false;
  let foundInSupabase = false;
  let foundInLocal = false;
  let lastError = '';

  // ── Tier 1: RPC (full timeline) ──
  try {
    const { data, error } = await _sb.rpc('sbp_get_customer_timeline', { p_customer_id: _customerId });
    if (error) throw error;
    if (!data || !data.ok) throw new Error(data?.error || 'unknown_error');

    _customer = data.customer;
    _stats    = data.stats || {};
    _timeline = data.timeline || [];
    rpcOk = true;
  } catch (e) {
    lastError = String(e?.message || e || '');
    console.warn('[CustomerHistory] Tier 1 RPC failed:', lastError);

    // Hard auth/ownership errors → bounce immediately, no fallback
    const lcMsg = lastError.toLowerCase();
    if (lcMsg.includes('customer_not_found') || lcMsg.includes('unauthorized') || lcMsg.includes('not_owner')) {
      toast('Customer not found', 'e');
      setTimeout(() => { window.location.href = 'customers.html'; }, 1200);
      return;
    }

    // ── Tier 2: Direct Supabase fetch ──
    // select('*') instead of explicit columns → tolerates schema variations
    // .maybeSingle() instead of .single() → returns null on 0 rows instead of throwing
    try {
      const { data: cust, error: cErr } = await _sb
        .from('customers')
        .select('*')
        .eq('id', _customerId)
        .maybeSingle();

      if (cErr) {
        console.warn('[CustomerHistory] Tier 2 Supabase error:', cErr.message || cErr);
        throw cErr;
      }
      if (cust) {
        _customer = cust;
        _stats    = {};
        _timeline = [];
        foundInSupabase = true;
        console.info('[CustomerHistory] Tier 2 OK — loaded from customers table');
      } else {
        console.warn('[CustomerHistory] Tier 2 returned null — customer ID not in Supabase');
      }
    } catch (e2) {
      console.warn('[CustomerHistory] Tier 2 failed:', e2?.message || e2);
    }

    // ── Tier 3: localStorage cache ──
    if (!foundInSupabase) {
      try {
        const cached = JSON.parse(localStorage.getItem('sbp_customers') || '[]');
        const local = (cached || []).find(c => c && String(c.id) === String(_customerId));
        if (local) {
          _customer = local;
          _stats    = {};
          _timeline = [];
          foundInLocal = true;
          console.info('[CustomerHistory] Tier 3 OK — loaded from localStorage');
        } else {
          console.warn('[CustomerHistory] Tier 3: customer ID not in localStorage either');
        }
      } catch (e3) {
        console.warn('[CustomerHistory] Tier 3 failed:', e3?.message || e3);
      }
    }

    // ── All three tiers failed → bounce ──
    if (!foundInSupabase && !foundInLocal) {
      console.error('[CustomerHistory] All three lookup tiers failed. Last error:', lastError);
      toast('Could not load customer', 'e');
      setTimeout(() => { window.location.href = 'customers.html'; }, 1500);
      return;
    }
  }

  // ── Render with whatever we have ──
  renderDetail();

  // Show informational toast about why timeline is missing (only when fallback used).
  //
  // Previously this used substring-matching on the error string ("does not exist"
  // / "schema cache" / etc.) to guess that migration 013 was missing. That guess
  // was wrong every time the cause was actually something else — most recently
  // mig 040/041 column-mismatch bugs, where "column X does not exist" matched
  // the regex but had nothing to do with migration 013. Result: confusing
  // banner that sent debugging down the wrong path.
  //
  // New rule (mirrors lib/auth-pin.js fix): surface the real server error
  // verbatim. Console gets the full diagnostic. Toast gets a short readable
  // version. No more guessing-at-cause messages.
  if (!rpcOk) {
    // Full diagnostic to console — F12 surfaces this for any support / dev
    console.warn('[CustomerHistory] Timeline unavailable for customer', _customerId, {
      rpcOk,
      foundInSupabase,
      foundInLocal,
      lastError: lastError || '(none)',
      online: navigator.onLine
    });

    const lc = (lastError || '').toLowerCase();
    let msg;
    if (foundInLocal && !foundInSupabase) {
      msg = '📡 Showing offline data. Sync to see full activity.';
    } else if (!navigator.onLine) {
      msg = '🌐 You are offline. Connect to load full activity.';
    } else if (lc.includes('unauthorized') || lc.includes('not_owner') || lc.includes('no_supabase_client')) {
      // Defensive — earlier bounce branch usually catches these, but log
      // a clear hint if one slips through.
      msg = '🔒 Authorization issue — try refreshing or re-login.';
    } else if (lastError) {
      // Surface the actual server error so it's reportable / debuggable.
      // Toast truncates long strings; the full text is already in console.
      const short = lastError.length > 110 ? lastError.slice(0, 107) + '…' : lastError;
      msg = '⚠️ Timeline unavailable: ' + short;
    } else {
      msg = 'Showing basic info — activity history unavailable.';
    }
    setTimeout(() => toast(msg, 'i', 5000), 300);
  }

  $('#loader').style.display = 'none';
  $('#detail-mode').style.display = 'block';
}

function renderDetail(){
  const c = _customer || {};
  $('#cust-av').style.background = avatarColor(c.name);
  $('#cust-av').textContent = initials(c.name);
  $('#cust-nm').textContent = c.name || '—';
  $('#cust-sub').innerHTML = `${escHtml(c.customer_type||'Regular')} · ${c.joined_at ? 'Since '+fmtIST_short(c.joined_at) : 'Member'}${c.phone ? ' · '+escHtml(c.phone) : ''}`;
  if (c.customer_type) {
    $('#cust-badge').textContent = c.customer_type;
    $('#cust-badge').style.display = 'inline-block';
  }

  // Render stats
  const s = _stats;
  const statsHtml = [];
  statsHtml.push(`<div class="st-card"><div class="st-lbl">Bills</div><div class="st-val">${s.total_bills||0}</div>${s.voided_bills>0?`<div class="st-sub">${s.voided_bills} voided</div>`:`<div class="st-sub">${s.total_bills>0?'active':'no transactions'}</div>`}</div>`);
  statsHtml.push(`<div class="st-card"><div class="st-lbl">Total Spent</div><div class="st-val">${fINR(s.total_spent)}</div><div class="st-sub">avg ${fINR(s.avg_ticket)}/bill</div></div>`);
  if ((s.balance_due||0) > 0) {
    statsHtml.push(`<div class="st-card due"><div class="st-lbl">⚠️ Due</div><div class="st-val">${fINR(s.balance_due)}</div><div class="st-sub">unpaid balance</div></div>`);
  } else {
    statsHtml.push(`<div class="st-card clear"><div class="st-lbl">✅ Clear</div><div class="st-val">${fINR(s.total_paid)}</div><div class="st-sub">all paid</div></div>`);
  }
  if ((s.appointments_total||0) > 0) {
    statsHtml.push(`<div class="st-card"><div class="st-lbl">📅 Appts</div><div class="st-val">${s.appointments_total}</div><div class="st-sub">${s.appointments_completed||0} done · ${s.appointments_cancelled||0} cancelled</div></div>`);
  }
  if ((s.loyalty_balance||0) > 0) {
    statsHtml.push(`<div class="st-card loyalty"><div class="st-lbl">⭐ Loyalty</div><div class="st-val">${s.loyalty_balance} pts</div><div class="st-sub">earnable</div></div>`);
  }
  if (s.last_bill_at) {
    statsHtml.push(`<div class="st-card"><div class="st-lbl">Last Visit</div><div class="st-val" style="font-size:14px">${fmtRelative(s.last_bill_at)}</div><div class="st-sub">${fmtIST_short(s.last_bill_at)}</div></div>`);
  }
  $('#stats-grid').innerHTML = statsHtml.join('');

  // Update filter counts
  const counts = { all: _timeline.length, bill: 0, appointment: 0, loyalty: 0, registered: 0 };
  _timeline.forEach(e => { counts[e.type] = (counts[e.type]||0) + 1; });
  $('#cnt-all').textContent = counts.all;
  $('#cnt-bill').textContent = counts.bill;
  $('#cnt-appointment').textContent = counts.appointment;
  $('#cnt-loyalty').textContent = counts.loyalty;

  renderTimeline();
}

function setFilter(f){
  _filter = f;
  $$('.chip[data-filter]').forEach(el => el.classList.toggle('on', el.dataset.filter === f));
  renderTimeline();
}

function renderTimeline(){
  const list = $('#tl-list');
  const events = _filter === 'all' ? _timeline : _timeline.filter(e => e.type === _filter);
  if (!events.length) {
    list.innerHTML = `<div class="empty"><div class="empty-emoji">📭</div><div class="empty-title"><span class="lang-en">No activity yet</span><span class="lang-hi">अभी तक कोई गतिविधि नहीं</span></div><div class="empty-msg"><span class="lang-en">${_filter==='all'?'Create a bill or appointment to start the timeline.':'No '+_filter+' activity for this customer yet.'}</span></div></div>`;
    return;
  }
  list.innerHTML = events.map(renderEvent).join('');
}

function renderEvent(e){
  const p = e.payload || {};
  if (e.type === 'bill') {
    const voided = !!p.voided;
    const amtClass = voided ? 'struck' : '';
    const statusTag = p.status ? `<span class="tl-tag ${p.status==='paid'?'s':p.status==='pending'?'w':p.status==='voided'?'e':''}">${escHtml(p.status)}</span>` : '';
    const items = p.items_summary ? `${escHtml(p.items_summary)}${p.items_count > 5 ? ` +${p.items_count-5} more` : ''}` : `${p.items_count||0} items`;
    return `
      <div class="tl-item">
        <div class="tl-ic bill">🧾</div>
        <div class="tl-card ${voided?'voided':''}" onclick="window.location.href='bills.html?id=${escHtml(p.id)}'">
          <div class="tl-row1">
            <div class="tl-title">${escHtml(p.invoice_no || 'Bill')}${voided ? ' <span class="tl-tag e">VOIDED</span>' : ''}</div>
            <div class="tl-amt ${amtClass}">${fINR(p.grand_total)}</div>
          </div>
          <div class="tl-meta">${items}</div>
          <div class="tl-meta" style="margin-top:3px">${statusTag} ${p.payment_mode?`<span class="tl-tag">${escHtml(p.payment_mode)}</span>`:''} ${(p.balance_due||0)>0?`<span class="tl-tag w">due ${fINR(p.balance_due)}</span>`:''}</div>
          <div class="tl-time">${fmtIST(e.at)}</div>
        </div>
      </div>`;
  }
  if (e.type === 'appointment') {
    const statusTag = `<span class="tl-tag ${p.status==='completed'?'s':p.status==='cancelled'||p.status==='no_show'?'e':'w'}">${escHtml(p.status||'pending')}</span>`;
    const sourceTag = p.source==='public_form' ? `<span class="tl-tag">🌐 online</span>` : p.source==='walk_in' ? `<span class="tl-tag">🚶 walk-in</span>` : '';
    const svcLine = p.service_name ? escHtml(p.service_name) : 'Appointment';
    const provLine = p.provider_name ? `with ${escHtml(p.provider_name)}` : '';
    return `
      <div class="tl-item">
        <div class="tl-ic appointment">📅</div>
        <div class="tl-card">
          <div class="tl-row1">
            <div class="tl-title">${svcLine}</div>
            ${(p.service_price||0)>0?`<div class="tl-amt">${fINR(p.service_price)}</div>`:''}
          </div>
          <div class="tl-meta">${provLine}${provLine?' · ':''}${fmtIST(p.starts_at, {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'})}${p.duration_minutes?` · ${p.duration_minutes}min`:''}</div>
          <div class="tl-meta" style="margin-top:3px">${statusTag} ${sourceTag}</div>
          ${p.notes?`<div class="tl-meta" style="margin-top:4px;font-style:italic">"${escHtml(p.notes)}"</div>`:''}
          <div class="tl-time">Booked ${fmtRelative(e.at)}</div>
        </div>
      </div>`;
  }
  if (e.type === 'loyalty') {
    const isEarn = p.points > 0;
    const txnLabel = ({earn:'Earned',redeem:'Redeemed',expire:'Expired',manual_adjust:'Adjusted',birthday:'Birthday Bonus',welcome:'Welcome Bonus',void_reverse:'Reversed'}[p.txn_type]) || p.txn_type;
    return `
      <div class="tl-item">
        <div class="tl-ic loyalty">⭐</div>
        <div class="tl-card">
          <div class="tl-row1">
            <div class="tl-title">${txnLabel}</div>
            <div class="tl-amt ${isEarn?'pos':'neg'}">${isEarn?'+':''}${p.points} pts</div>
          </div>
          <div class="tl-meta">${escHtml(p.description||'')}</div>
          <div class="tl-time">${fmtIST(e.at)}</div>
        </div>
      </div>`;
  }
  if (e.type === 'registered') {
    return `
      <div class="tl-item">
        <div class="tl-ic registered">🎉</div>
        <div class="tl-card" style="cursor:default">
          <div class="tl-title">Joined as customer</div>
          <div class="tl-meta">Welcome to your shop · ${escHtml(p.customer_type||'Regular')}</div>
          <div class="tl-time">${fmtIST_short(e.at)}</div>
        </div>
      </div>`;
  }
  return '';
}

function openWa(){
  const c = _customer;
  if (!c) return;
  const num = (c.whatsapp || c.phone || '').replace(/\D/g, '');
  if (!num) { toast('No WhatsApp number on file', 'e'); return; }
  const wa = num.length === 10 ? '91' + num : num;
  window.open(`https://wa.me/${wa}?text=Hi%20${encodeURIComponent(c.name||'')}`, '_blank');
}

function goNewBill(){
  const c = _customer;
  if (!c) return;
  window.location.href = `billing.html?cust=${encodeURIComponent(c.name||'')}&wa=${encodeURIComponent(c.whatsapp||'')}`;
}

init();
</script>
