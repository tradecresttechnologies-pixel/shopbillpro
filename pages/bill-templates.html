// FIX #3 — IST-aware date (UTC toISOString shifts -5:30 in India)
function sbpToday(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function sbpYM(){return sbpToday().slice(0,7);}
function sbpY(){return sbpToday().slice(0,4);}
</script>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans','Noto Sans Devanagari',sans-serif;-webkit-font-smoothing:antialiased;}
:root{--acc:#F5A623;--acc2:#EF4444;--acc3:#10B981;--amber:#F59E0B;--bg:#0A0A12;--surf:#13131C;--surf2:#1C1C28;--surf3:#252534;--bord:#2A2A3A;--text:#F0EFF8;--t2:#8A8AA8;--t3:#4A4A60;--font-h:'Outfit',sans-serif;--rs:12px;--rs2:18px;--tr:.18s ease;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
[data-theme="light"]{--bg:#F0EEFF;--surf:#FFF;--surf2:#F5F2FF;--surf3:#EDE9FF;--bord:#DDD8F5;--text:#0F0E18;--t2:#5E5A7A;--t3:#A09CC0}
body{background:var(--bg);color:var(--text)}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;padding-top:calc(10px + var(--safe-top));background:var(--surf);border-bottom:1px solid var(--bord);flex-shrink:0;min-height:54px}

.tb-title{font-family:var(--font-h);font-size:17px;font-weight:800}
.back-btn{width:34px;height:34px;border-radius:10px;background:var(--surf2);border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:var(--tr)}
.back-btn:active{transform:scale(.93)}
.ic-btn{width:34px;height:34px;border-radius:10px;background:var(--surf2);border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:var(--tr)}
.ic-btn:active{transform:scale(.93)}

/* Template Card */
.tpl-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rs2);margin:0 14px 10px;overflow:hidden;transition:var(--tr)}
.tpl-header{display:flex;align-items:center;gap:12px;padding:13px;cursor:pointer}
.tpl-header:active{background:var(--surf2)}
.tpl-emoji{font-size:26px;width:42px;text-align:center;flex-shrink:0}
.tpl-info{flex:1;min-width:0}
.tpl-nm{font-family:var(--font-h);font-size:14px;font-weight:800}
.tpl-meta{font-size:11px;color:var(--t2);margin-top:2px}
.tpl-amt{font-family:var(--font-h);font-size:16px;font-weight:900;color:var(--acc);flex-shrink:0}
.tpl-items-preview{padding:0 13px 13px;border-top:1px solid var(--bord);padding-top:10px}
.tpi-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bord)}
.tpi-row:last-child{border-bottom:none}
.tpi-name{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tpi-qty{color:var(--t2);margin:0 10px;flex-shrink:0}
.tpi-price{font-weight:700;flex-shrink:0}
.tpl-footer{display:flex;gap:7px;padding:10px 13px;border-top:1px solid var(--bord);background:var(--surf2)}
.tf-btn{flex:1;padding:9px 6px;border-radius:var(--rs);font-family:var(--font-h);font-size:11px;font-weight:700;cursor:pointer;text-align:center;border:1.5px solid;transition:var(--tr)}
.tf-btn:active{transform:scale(.95)}
.tf-btn.use{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.3);color:var(--acc)}
.tf-btn.edit{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--amber)}
.tf-btn.del{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--acc2)}

/* Forms */
.ff{margin-bottom:12px}
.ff label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.ff input,.ff select{width:100%;background:var(--surf2);border:1.5px solid var(--bord);border-radius:var(--rs);padding:11px 13px;color:var(--text);font-size:14px;outline:none;transition:var(--tr);appearance:none;font-family:'Noto Sans',sans-serif}
.ff input:focus,.ff select:focus{border-color:var(--acc);background:var(--surf);box-shadow:0 0 0 3px rgba(245,166,35,.12)}
.ff input::placeholder{color:var(--t3)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Item rows in modal */
.tpl-item-row{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--rs);padding:10px;margin-bottom:8px}
.tpl-item-grid{display:grid;grid-template-columns:2fr .8fr .8fr .8fr auto;gap:6px;align-items:end}
.rm-btn{width:28px;height:28px;border-radius:7px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--acc2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:end;margin-bottom:12px}

/* Buttons */
.btn-pri{width:100%;padding:14px;border-radius:var(--rs);background:linear-gradient(135deg,var(--acc),#FF8A00);border:none;color:#0A0E1A;font-family:var(--font-h);font-size:15px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(245,166,35,.4);display:flex;align-items:center;justify-content:center;gap:8px}

.btn-sec{width:100%;padding:12px;border-radius:var(--rs);background:var(--surf2);border:1.5px solid var(--bord);color:var(--text);font-family:var(--font-h);font-size:14px;font-weight:700;cursor:pointer}

/* Overlays */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.overlay.open{display:flex;animation:fadeIn .18s ease}
.sheet{width:100%;max-height:92dvh;background:var(--surf);border-radius:var(--rs2) var(--rs2) 0 0;padding:16px 16px calc(16px + var(--safe-bottom));overflow-y:auto;animation:slideUp .28s cubic-bezier(.4,0,.2,1)}
.handle{width:36px;height:4px;border-radius:2px;background:var(--surf3);margin:0 auto 16px}
.sheet-title{font-family:var(--font-h);font-size:18px;font-weight:800;margin-bottom:14px}

.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;gap:3px;cursor:pointer;transition:var(--tr);position:relative;min-height:56px;user-select:none}
.ni-ic{font-size:20px;line-height:1}.ni-lb{font-size:10px;color:var(--t2);font-weight:600;white-space:nowrap}
.ni.on .ni-lb{color:var(--acc)}
.ni.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2.5px;border-radius:0 0 4px 4px;background:var(--acc)}

.nav-fab{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--acc),#FF8A00);color:#0A0E1A;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(245,166,35,.5);margin-bottom:4px}

#toast-container{position:fixed;bottom:calc(72px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast{background:var(--surf3);color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.45);border:1px solid var(--bord);white-space:nowrap;max-width:calc(100vw - 40px);animation:toastIn .22s ease}
.toast.s{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:var(--acc3)}
.toast.e{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:var(--acc2)}

.empty-state{text-align:center;padding:48px 20px}.spacer{height:80px}
.chip{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1.5px solid var(--bord);background:var(--surf);color:var(--t2);font-family:var(--font-h);font-size:13px;font-weight:700;cursor:pointer;transition:var(--tr);white-space:nowrap;user-select:none}
.chip.on{background:rgba(245,166,35,.12);border-color:var(--acc);color:var(--acc)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

const SESSION_TIMEOUT=parseInt(localStorage.getItem('sbp_session_timeout')||'30');
let _actTimer;
function _resetTimer(){clearTimeout(_actTimer);localStorage.setItem('sbp_last_activity',Date.now().toString());_actTimer=setTimeout(async()=>{await _sb.auth.signOut();window.location.href='index.html';},SESSION_TIMEOUT*60*1000)}
['click','touchstart','keypress','scroll'].forEach(e=>document.addEventListener(e,_resetTimer,{passive:true}));

function goTo(p){window.location.href=p}
function toast(msg,type='',dur=3000){const c=document.getElementById('toast-container');const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='.2s';setTimeout(()=>t.remove(),220);},dur)}
function toggleTheme(){_theme=_theme==='dark'?'light':'dark';localStorage.setItem('sbp_theme',_theme);document.documentElement.setAttribute('data-theme',_theme==='light'?'light':'');document.getElementById('theme-btn').textContent=_theme==='light'?'🌙':'☀️'}
function openModal(id){const el=document.getElementById(id);el.classList.add('open');el.style.display='flex';el.addEventListener('click',e=>{if(e.target===el)closeModal(id);},{once:true})}
function closeModal(id){const el=document.getElementById(id);el.classList.remove('open');el.style.display='none'}
function fINR(n){return '₹'+(parseFloat(n)||0).toLocaleString('en-IN',{maximumFractionDigits:0})}
function todayISO(){return sbpToday()}
function save(){localStorage.setItem('sbp_bill_templates',JSON.stringify(_templates))}

function calcTplTotal(items){
  return items.reduce((s,it)=>{
    const q=parseFloat(it.q||1),r=parseFloat(it.r||0),g=parseFloat(it.g||0);
    return s+(q*r)*(1+g/100);
  },0);
}

function switchTab(tab){
  _activeTab=tab;
  document.getElementById('tab-my').classList.toggle('on',tab==='my');
  document.getElementById('tab-ready').classList.toggle('on',tab==='ready');
  document.getElementById('section-my').style.display=tab==='my'?'block':'none';
  document.getElementById('section-ready').style.display=tab==='ready'?'block':'none';
  if(tab==='ready')renderReadyTemplates();
}

function renderReadyTemplates(){
  const el=document.getElementById('ready-list');
  let html='';
  READY_TEMPLATES.forEach(cat=>{
    html+=`<div style="font-family:var(--font-h);font-size:13px;font-weight:800;padding:14px 14px 8px;color:var(--t2)">${cat.cat}</div>`;
    cat.templates.forEach(t=>{
      const total=calcTplTotal(t.items||[]);
      const itemsPreview=(t.items||[]).slice(0,3).map(i=>i.nm).join(', ')+(t.items.length>3?' +${t.items.length-3} more':'');
      html+=`<div class="tpl-card" style="margin:0 14px 8px">
        <div class="tpl-header" style="cursor:default">
          <div class="tpl-emoji">${t.emoji||'📋'}</div>
          <div class="tpl-info">
            <div class="tpl-nm">${t.name}</div>
            <div class="tpl-meta">${t.items?.length||0} items · ${t.paymode}</div>
          </div>
          <div class="tpl-amt">${fINR(total)}</div>
        </div>
        <div style="padding:0 13px 4px;font-size:11px;color:var(--t2);line-height:1.5">${(t.items||[]).map(i=>'<span style="display:inline-block;background:var(--surf2);padding:2px 8px;border-radius:6px;margin:2px 2px;border:1px solid var(--bord)">'+i.nm+'</span>').join('')}</div>
        <div class="tpl-footer">
          <div class="tf-btn use" onclick="useReadyTpl(${JSON.stringify(t).replace(/"/g,'&quot;')})">🧾 Use Now</div>
          <div class="tf-btn edit" onclick="saveReadyTpl(${JSON.stringify(t).replace(/"/g,'&quot;')})">💾 Save to My</div>
        </div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

function useReadyTpl(t){
  const params=new URLSearchParams({
    tpl:'1',nm:'',wa:'',paymode:t.paymode||'Cash',date:todayISO(),note:t.note||'',items:JSON.stringify(t.items||[])
  });
  goTo('billing.html?'+params.toString());
}

function saveReadyTpl(t){
  const exists=_templates.find(x=>x.name===t.name);
  if(exists){toast('Already saved: '+t.name,'i');return}
  _templates.unshift({...t,custId:'',custName:'',custWA:'',createdAt:new Date().toISOString()});
  save();
  toast('✅ Saved "'+t.name+'" to My Templates!','s');
}

function renderTemplates(){
  const el=document.getElementById('section-my');
  if(!_templates.length){
    el.innerHTML=`<div class="empty-state">
      <div style="font-size:48px;margin-bottom:12px">📋</div>
      <div style="font-family:var(--font-h);font-size:15px;font-weight:700;margin-bottom:6px">No templates yet</div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:16px">Create your own or pick from <span onclick="switchTab('ready')" style="color:var(--acc);cursor:pointer;font-weight:700">Ready-Made Templates ⚡</span></div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button onclick="openAddTpl()" style="padding:11px 24px;border-radius:var(--rs);background:linear-gradient(135deg,var(--acc),#FF8A00);border:none;color:#0A0E1A;font-family:var(--font-h);font-size:14px;font-weight:700;cursor:pointer">＋ Create Template</button>
        <button onclick="switchTab('ready')" style="padding:11px 24px;border-radius:var(--rs);background:var(--surf2);border:1.5px solid var(--bord);color:var(--acc);font-family:var(--font-h);font-size:14px;font-weight:700;cursor:pointer">⚡ Browse Ready-Made</button>
      </div>
    </div>`;
    return;
  }
  el.innerHTML=_templates.map((t,i)=>{
    const total=calcTplTotal(t.items||[]);
    return `<div class="tpl-card">
      <div class="tpl-header" onclick="toggleTplExpand('tpl-expand-${i}')">
        <div class="tpl-emoji">${t.emoji||'📋'}</div>
        <div class="tpl-info">
          <div class="tpl-nm">${t.name}</div>
          <div class="tpl-meta">${t.items?.length||0} items · ${t.paymode||'Cash'}${t.custName?' · '+t.custName:''}</div>
        </div>
        <div class="tpl-amt">${fINR(total)}</div>
      </div>
      <div class="tpl-footer">
        <div class="tf-btn use" onclick="event.stopPropagation();quickUseTpl(${i})" style="flex:2">🧾 Use Now</div>
        <div class="tf-btn edit" onclick="event.stopPropagation();openEditTpl(${i})">✏️</div>
        <div class="tf-btn del" onclick="event.stopPropagation();deleteTpl(${i})">🗑️</div>
      </div>
      <div id="tpl-expand-${i}" style="display:none">
        <div class="tpl-items-preview">
          ${(t.items||[]).map(it=>`<div class="tpi-row">
            <span class="tpi-name">${it.nm||'Item'}</span>
            <span class="tpi-qty">${it.q||1} × ${fINR(it.r)}</span>
            <span class="tpi-price">${fINR(parseFloat(it.q||1)*parseFloat(it.r||0))}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('')+'<div class="spacer"></div>';
}

function quickUseTpl(idx){
  const t=_templates[idx];if(!t)return;
  const params=new URLSearchParams({
    tpl:'1',
    nm:t.custName||'',
    wa:t.custWA||'',
    paymode:t.paymode||'Cash',
    date:todayISO(),
    note:t.note||'',
    items:JSON.stringify(t.items||[])
  });
  goTo('billing.html?'+params.toString());
}

function toggleTplExpand(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none'}

// ── Add / Edit Template ──
function openAddTpl(){
  _editIdx=-1;
  document.getElementById('tpl-modal-title').textContent='📋 New Bill Template';
  ['tpl-nm','tpl-note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  document.getElementById('tpl-emoji').value='📋';
  document.getElementById('tpl-paymode').value='Cash';
  document.getElementById('tpl-edit-idx').value=-1;
  document.getElementById('tpl-items-wrap').innerHTML='';
  fillCustSel();addTplItem();
  openModal('add-tpl-modal');
}

function openEditTpl(idx){
  const t=_templates[idx];if(!t)return;
  _editIdx=idx;
  document.getElementById('tpl-modal-title').textContent='✏️ Edit Template';
  document.getElementById('tpl-nm').value=t.name||'';
  document.getElementById('tpl-emoji').value=t.emoji||'📋';
  document.getElementById('tpl-note').value=t.note||'';
  document.getElementById('tpl-paymode').value=t.paymode||'Cash';
  document.getElementById('tpl-edit-idx').value=idx;
  document.getElementById('tpl-items-wrap').innerHTML='';
  fillCustSel(t.custId);
  (t.items||[]).forEach(it=>{addTplItem(it)});
  if(!(t.items?.length))addTplItem();
  openModal('add-tpl-modal');
}

function fillCustSel(selected=''){
  const sel=document.getElementById('tpl-cust');
  sel.innerHTML='<option value="">— None / Ask every time —</option>'+_custs.map(c=>`<option value="${c.id}"${c.id===selected?' selected':''}>${c.name}</option>`).join('');
  const sel2=document.getElementById('use-tpl-cust');
  if(sel2)sel2.innerHTML='<option value="">Walk-in Customer</option>'+_custs.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

function addTplItem(it={}){
  const wrap=document.getElementById('tpl-items-wrap');
  const d=document.createElement('div');d.className='tpl-item-row';
  d.innerHTML=`<div class="tpl-item-grid">
    <div class="ff" style="margin:0"><label>Item Name</label><input type="text" class="ti-nm" placeholder="Item / Service" value="${it.nm||''}"></div>
    <div class="ff" style="margin:0"><label>Qty</label><input type="number" class="ti-q" placeholder="1" min="0.1" step="any" value="${it.q||1}"></div>
    <div class="ff" style="margin:0"><label>Rate ₹</label><input type="number" class="ti-r" placeholder="0" min="0" step="any" value="${it.r||''}"></div>
    <div class="ff" style="margin:0"><label>GST%</label>
      <select class="ti-g" style="width:100%;background:var(--surf2);border:1.5px solid var(--bord);border-radius:var(--rs);padding:10px 4px;color:var(--text);font-size:12px;outline:none;appearance:none">
        <option value="0"${it.g==0?' selected':''}>0%</option><option value="5"${it.g==5||(!it.g)?' selected':''}>5%</option>
        <option value="12"${it.g==12?' selected':''}>12%</option><option value="18"${it.g==18?' selected':''}>18%</option>
        <option value="28"${it.g==28?' selected':''}>28%</option>
      </select>
    </div>
    <button class="rm-btn" onclick="this.closest('.tpl-item-row').remove()" title="Remove">×</button>
  </div>`;
  wrap.appendChild(d);
}

function saveTpl(){
  const name=document.getElementById('tpl-nm').value.trim();
  if(!name){toast('Template name is required','e');return}
  const items=[];
  document.querySelectorAll('#tpl-items-wrap .tpl-item-row').forEach(row=>{
    const nm=row.querySelector('.ti-nm').value.trim();
    const q=parseFloat(row.querySelector('.ti-q').value)||1;
    const r=parseFloat(row.querySelector('.ti-r').value)||0;
    const g=parseFloat(row.querySelector('.ti-g').value)||0;
    if(nm||r)items.push({nm,q,r,g});
  });
  if(!items.length){toast('Add at least one item','e');return}
  const custId=document.getElementById('tpl-cust').value;
  const cust=_custs.find(c=>c.id===custId||String(c.id)===custId);
  const tpl={name,emoji:document.getElementById('tpl-emoji').value||'📋',paymode:document.getElementById('tpl-paymode').value,custId,custName:cust?.name||'',custWA:cust?.whatsapp||'',note:document.getElementById('tpl-note').value,items,createdAt:new Date().toISOString()};
  const idx=parseInt(document.getElementById('tpl-edit-idx').value);
  if(idx>=0&&idx<_templates.length){_templates[idx]=tpl;toast('✅ Template updated','s');}
  else{_templates.unshift(tpl);toast('✅ Template saved','s');}
  save();renderTemplates();closeModal('add-tpl-modal');
}

function deleteTpl(idx){
  if(!confirm('Delete "'+_templates[idx].name+'"?'))return;
  _templates.splice(idx,1);save();renderTemplates();toast('🗑️ Deleted','i');
}

// ── Use Template ──
function openUseTpl(idx){
  _useIdx=idx;
  const t=_templates[idx];
  const total=calcTplTotal(t.items||[]);
  document.getElementById('use-tpl-title').textContent=t.emoji+' '+t.name;
  document.getElementById('use-tpl-summary').innerHTML=`
    <div style="font-family:var(--font-h);font-size:14px;font-weight:800;margin-bottom:6px">${t.name}</div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:4px">${t.items?.length||0} items · ${t.paymode}</div>
    <div style="font-family:var(--font-h);font-size:20px;font-weight:900;color:var(--acc)">${fINR(total)}</div>`;
  document.getElementById('use-tpl-date').value=todayISO();
  fillCustSel(t.custId);
  if(t.custId)document.getElementById('use-tpl-cust').value=t.custId;
  openModal('use-tpl-modal');
}

function useTplNow(){
  const t=_templates[_useIdx];if(!t)return;
  const custId=document.getElementById('use-tpl-cust').value;
  const cust=_custs.find(c=>c.id===custId||String(c.id)===custId);
  const date=document.getElementById('use-tpl-date').value||todayISO();
  // FIX #39 — Pass via sessionStorage to avoid URL length truncation
  // (Chrome ~32KB, IE/Edge ~2KB). Large templates with many items hit the limit.
  try {
    sessionStorage.setItem('sbp_tpl_payload', JSON.stringify({
      tpl:'1',
      nm:cust?.name||t.custName||'',
      wa:cust?.whatsapp||t.custWA||'',
      paymode:t.paymode||'Cash',
      date,
      note:t.note||'',
      items:t.items||[]
    }));
  } catch(e){ console.warn('Template payload too large for sessionStorage'); }
  closeModal('use-tpl-modal');
  goTo('billing.html?tpl_payload=session');
}

async function init(){
  if(_theme==='light'){document.documentElement.setAttribute('data-theme','light');document.getElementById('theme-btn').textContent='🌙'}
  const{data:{session}}=await _sb.auth.getSession();
  if(!session){window.location.href='index.html';return}
  _resetTimer();
  _templates=JSON.parse(localStorage.getItem('sbp_bill_templates')||'[]');
  renderTemplates();
  fillCustSel();
}
