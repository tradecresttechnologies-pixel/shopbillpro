<!DOCTYPE html>
<!-- bill.html — ShopBill Pro v9 public bill page. Renders IDENTICAL invoice via lib/bill-template.js -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Bill — ShopBill Pro</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:#f4f5f7; padding:14px; font-family:'Poppins',system-ui,'Segoe UI',Roboto,sans-serif; }
  .wrap{ max-width:600px; margin:0 auto; }
  #billHost{ background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 6px 24px rgba(0,0,0,.08); }
  .actions{ display:grid; gap:10px; margin-top:14px; }
  .btn{ display:flex; align-items:center; justify-content:center; gap:8px; padding:14px; border-radius:12px; border:0; font-size:15px; font-weight:700; cursor:pointer; text-decoration:none; }
  .btn-pay{ background:#FF6600; color:#fff; } .btn-pdf{ background:#111827; color:#fff; }
  .state{ text-align:center; padding:48px 16px; color:#6b7280; }
  .err{ color:#b91c1c; }
</style>
</head>
<body>
<div class="wrap">
  <div id="state" class="state">Loading bill…</div>
  <div id="billHost" style="display:none;"></div>
  <div id="actions" class="actions" style="display:none;">
    <a id="payBtn" class="btn btn-pay" style="display:none;">Pay via UPI</a>
    <button id="pdfBtn" class="btn btn-pdf">Download PDF</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/lib/bill-template.js"></script>
<script>
  const SUPABASE_URL = "https://jfqeirfrkjdkqqixivru.supabase.co";
  const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcWVpcmZya2pka3FxaXhpdnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzQ4MzgsImV4cCI6MjA4OTk1MDgzOH0.akd4E0nil8ypLR4WOykkeYIL8g4uuNU6XdSVh_Y1utk";

  const qs = new URLSearchParams(location.search);
  const billId = qs.get("b"), token = qs.get("t");
  let _grand = 0, _shopUpi = "", _shopName = "", _invNo = "", _paid = false;

  async function load(){
    const st = document.getElementById("state");
    if(!billId || !token){ st.innerHTML = '<span class="err">Invalid link.</span>'; return; }
    try{
      const r = await fetch(SUPABASE_URL + "/rest/v1/rpc/sbp_get_bill_public", {
        method:"POST",
        headers:{ "apikey":ANON_KEY, "Authorization":"Bearer "+ANON_KEY, "Content-Type":"application/json" },
        body: JSON.stringify({ p_bill_id: billId, p_token: token })
      });
      const d = await r.json();
      if(!d || d.ok === false){ st.innerHTML = '<span class="err">Bill not found or link expired.</span>'; return; }
      render(d);
    }catch(e){ st.innerHTML = '<span class="err">Could not load bill. Check your connection.</span>'; }
  }

  function render(d){
    _grand = Number(d.bill && d.bill.grand_total || 0);
    _shopUpi = (d.shop && d.shop.upi) || "";
    _shopName = (d.shop && d.shop.name) || "Shop";
    _invNo = (d.bill && d.bill.invoice_no) || "";
    _paid = !!(d.bill && d.bill.paid);

    const html = window.renderShopBill({
      shop: d.shop || {},
      bill: d.bill || {},
      items: d.items || [],
      opts: { showQR: true, watermark: !!d.watermark }
    });

    const inner = html.replace(/^[\s\S]*?<body[^>]*>/i,'').replace(/<\/body>[\s\S]*$/i,'');
    const styleM = html.match(/<style>([\s\S]*?)<\/style>/i);
    const host = document.getElementById("billHost");
    host.innerHTML = (styleM ? "<style>"+styleM[1]+"</style>" : "") + inner;

    document.getElementById("state").style.display = "none";
    host.style.display = "block";
    document.getElementById("actions").style.display = "grid";

    const payBtn = document.getElementById("payBtn");
    if(_shopUpi && !_paid){
      const amt = _grand.toFixed(2);
      const tn = encodeURIComponent("Bill "+_invNo);
      const pn = encodeURIComponent(_shopName);
      payBtn.href = "upi://pay?pa="+encodeURIComponent(_shopUpi)+"&pn="+pn+"&am="+amt+"&tn="+tn+"&cu=INR";
      payBtn.style.display = "flex";
    }
  }

  document.getElementById("pdfBtn").addEventListener("click", async function(){
    const el = document.getElementById("billHost");
    const canvas = await html2canvas(el, { scale:2, backgroundColor:"#ffffff", useCORS:true });
    const img = canvas.toDataURL("image/png");
    const jsPDF = window.jspdf.jsPDF;
    const pdf = new jsPDF({ unit:"mm", format:"a4" });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 10, maxW = pageW - margin*2, maxH = pageH - margin*2;
    let imgW = maxW, imgH = (canvas.height / canvas.width) * imgW;
    if(imgH > maxH){ imgH = maxH; imgW = (canvas.width / canvas.height) * imgH; }
    const x = (pageW - imgW)/2;
    pdf.addImage(img, "PNG", x, margin, imgW, imgH);
    pdf.save("bill" + (billId ? ("-"+billId.slice(0,8)) : "") + ".pdf");
  });

  load();
</script>
</body>
</html>
