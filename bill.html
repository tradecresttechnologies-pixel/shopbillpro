<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════════════════════════════
  public/bill.html  —  ShopBill Pro v9, Payments Phase 1
  Public, no-auth bill copy opened from a WhatsApp link:
     https://app.shopbillpro.in/bill?b=<bill_id>&t=<token>      (cleanUrls)
  Renders bill + items, Download PDF, "Pay via UPI" (upi:// intent),
  and the "Powered by ShopBill Pro" watermark for FREE shops.
  Reads via the public, token-gated RPC sbp_get_bill_public (migration 106).
  Fields audited against live repo: grand_total, invoice_no, invoice_date,
  customer_name, item_name/qty/rate/line_total/gst_amount, shops.upi.
═══════════════════════════════════════════════════════════════════════ -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Bill — ShopBill Pro</title>
<style>
  :root{ --brand:#FF6600; --ink:#111; --muted:#6b7280; --line:#e5e7eb; --bg:#f4f5f7; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Poppins',system-ui,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--ink); padding:16px; }
  .wrap{ max-width:480px; margin:0 auto; }
  .card{ background:#fff; border-radius:16px; box-shadow:0 6px 24px rgba(0,0,0,.08); overflow:hidden; }
  .head{ background:var(--brand); color:#fff; padding:20px 22px; }
  .head h1{ font-size:20px; font-weight:700; letter-spacing:.3px; }
  .head .inv{ opacity:.92; font-size:13px; margin-top:4px; }
  .head .cust{ opacity:.92; font-size:13px; margin-top:2px; }
  .body{ padding:22px; }
  .row{ display:flex; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px dashed var(--line); font-size:14px; }
  .row .nm{ color:var(--ink); } .row .amt{ font-variant-numeric:tabular-nums; white-space:nowrap; }
  .q{ color:var(--muted); font-size:12px; }
  .total{ display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:14px; border-top:2px solid var(--ink); font-size:20px; font-weight:700; }
  .badge{ display:inline-block; margin-top:10px; padding:5px 12px; border-radius:999px; font-size:12px; font-weight:600; }
  .badge.paid{ background:#dcfce7; color:#166534; } .badge.due{ background:#fef3c7; color:#92400e; }
  .actions{ display:grid; gap:10px; margin-top:20px; }
  .btn{ display:flex; align-items:center; justify-content:center; gap:8px; padding:14px; border-radius:12px; border:0; font-size:15px; font-weight:600; cursor:pointer; text-decoration:none; }
  .btn-pay{ background:var(--brand); color:#fff; } .btn-pdf{ background:#111; color:#fff; }
  .wm{ text-align:center; color:var(--muted); font-size:12px; padding:14px 0 4px; }
  .wm b{ color:var(--brand); }
  .state{ text-align:center; padding:48px 16px; color:var(--muted); }
  .err{ color:#b91c1c; }
</style>
</head>
<body>
<div class="wrap">
  <div id="state" class="state">Loading bill…</div>
  <div id="card" class="card" style="display:none;">
    <div class="head">
      <h1 id="shopName">—</h1>
      <div class="inv" id="invLine"></div>
      <div class="cust" id="custLine"></div>
    </div>
    <div class="body">
      <div id="items"></div>
      <div class="total"><span>Total</span><span id="total">₹0</span></div>
      <div id="status"></div>
      <div class="actions">
        <a id="payBtn" class="btn btn-pay" style="display:none;">Pay via UPI</a>
        <button id="pdfBtn" class="btn btn-pdf">Download PDF</button>
      </div>
      <div class="wm" id="wm" style="display:none;">Billed with <b>ShopBill Pro</b> · shopbillpro.in</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const SUPABASE_URL = "https://jfqeirfrkjdkqqixivru.supabase.co";
  const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcWVpcmZya2pka3FxaXhpdnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzQ4MzgsImV4cCI6MjA4OTk1MDgzOH0.akd4E0nil8ypLR4WOykkeYIL8g4uuNU6XdSVh_Y1utk";
  const fmt = (n) => "₹" + Number(n||0).toLocaleString("en-IN", {maximumFractionDigits:2});

  const qs = new URLSearchParams(location.search);
  const billId = qs.get("b"), token = qs.get("t");

  // bill_items field accessors (Supabase snake_case)
  const itName = (it) => it.item_name ?? it.nm ?? "Item";
  const itQty  = (it) => Number(it.qty ?? it.q ?? 1);
  const itTot  = (it) => Number(it.line_total ?? it.tot ?? (Number(it.rate ?? 0) * (it.qty ?? 1)));

  async function load(){
    const st = document.getElementById("state");
    if(!billId || !token){ st.innerHTML = '<span class="err">Invalid link.</span>'; return; }
    try{
      const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/sbp_get_bill_public`, {
        method:"POST",
        headers:{ "apikey":ANON_KEY, "Authorization":"Bearer "+ANON_KEY, "Content-Type":"application/json" },
        body: JSON.stringify({ p_bill_id: billId, p_token: token })
      });
      const d = await r.json();
      if(!d || d.ok === false){ st.innerHTML = '<span class="err">Bill not found or link expired.</span>'; return; }
      render(d);
    }catch(e){ st.innerHTML = '<span class="err">Could not load bill. Check your connection.</span>'; }
  }

  function render(d){
    document.getElementById("state").style.display = "none";
    document.getElementById("card").style.display = "block";
    document.getElementById("shopName").textContent = d.shop?.name ?? "Shop";

    const inv = d.bill?.invoice_no ? "Bill #"+d.bill.invoice_no : "";
    const dt = d.bill?.invoice_date ? new Date(d.bill.invoice_date).toLocaleDateString("en-IN") : "";
    document.getElementById("invLine").textContent = [inv, dt].filter(Boolean).join(" · ");
    document.getElementById("custLine").textContent = d.bill?.customer_name || "";

    const itemsEl = document.getElementById("items");
    (d.items||[]).forEach(it=>{
      const row = document.createElement("div"); row.className="row";
      row.innerHTML = `<span class="nm">${itName(it)} <span class="q">× ${itQty(it)}</span></span>
                       <span class="amt">${fmt(itTot(it))}</span>`;
      itemsEl.appendChild(row);
    });

    document.getElementById("total").textContent = fmt(d.bill?.grand_total);

    document.getElementById("status").innerHTML = d.bill?.paid
      ? '<span class="badge paid">✓ Paid</span>'
      : '<span class="badge due">Payment due</span>';

    // UPI intent button (uses shops.upi); hide if paid or no UPI set
    const vpa = d.shop?.upi;
    const payBtn = document.getElementById("payBtn");
    if(vpa && !d.bill?.paid){
      const amt = Number(d.bill?.grand_total||0).toFixed(2);
      const tn = encodeURIComponent("Bill "+(d.bill?.invoice_no||""));
      const pn = encodeURIComponent(d.shop?.name||"Shop");
      payBtn.href = `upi://pay?pa=${encodeURIComponent(vpa)}&pn=${pn}&am=${amt}&tn=${tn}&cu=INR`;
      payBtn.style.display = "flex";
    }

    if(d.watermark){ document.getElementById("wm").style.display="block"; }
  }

  document.getElementById("pdfBtn").addEventListener("click", async ()=>{
    const el = document.getElementById("card");
    const canvas = await html2canvas(el, {scale:2, backgroundColor:"#ffffff"});
    const img = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({unit:"px", format:[canvas.width, canvas.height]});
    pdf.addImage(img, "PNG", 0, 0, canvas.width, canvas.height);
    pdf.save("bill.pdf");
  });

  load();
</script>
</body>
</html>
