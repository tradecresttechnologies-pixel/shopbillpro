<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Housekeeping</title>
<script>
// FOUC fix + role gate — runs synchronously before first paint
(function(){
  try{
    var t=localStorage.getItem('sbp_theme');
    if(t==='light')document.documentElement.setAttribute('data-theme','light');
  }catch(e){}
  // Role gate: only housekeeper role allowed on this page
  // (checked again after Supabase auth confirms session)
})();
</script>
<script>(function(){try{document.documentElement.lang=localStorage.getItem('sbp_lang')||'en';}catch(e){}})();</script>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
.lang-hi{display:none!important}
.lang-en{display:inline!important}
html[lang="hi"] .lang-hi{display:inline!important}
html[lang="hi"] .lang-en{display:none!important}

/* ── Design tokens ── */
:root{
  --acc:#F5A623;--acc2:#EF4444;--acc3:#10B981;--acc4:#6366F1;
  --bg:#0A0E1A;--surf:#131826;--surf2:#1A2035;--bord:#252D3D;
  --text:#F0EFF8;--t2:#8A8AA8;--t3:#4A4A60;
  --font-h:'Outfit',system-ui,sans-serif;
  --r:12px;--tr:.15s ease;
}
html[data-theme='light']{
  --bg:#F4F5F7;--surf:#FFFFFF;--surf2:#F0F2F5;--bord:#E2E5EA;
  --text:#0A0E1A;--t2:#6B7280;--t3:#9CA3AF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-h),-apple-system,sans-serif;-webkit-font-smoothing:antialiased}

/* ── Header ── */
.hdr{
  position:sticky;top:0;z-index:50;
  background:var(--surf);border-bottom:1px solid var(--bord);
  padding:0 16px;height:56px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.hdr-title{font-size:16px;font-weight:800;color:var(--text)}
.hdr-sub{font-size:11px;color:var(--t2);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.btn-logout{
  padding:7px 14px;border-radius:10px;border:1px solid var(--bord);
  background:var(--surf2);color:var(--t2);font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:var(--tr);
}
.btn-logout:hover{border-color:var(--acc2);color:var(--acc2)}
.theme-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--bord);background:var(--surf2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* ── Summary strip ── */
.summary{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:8px;padding:12px 14px;
}
.sum-box{background:var(--surf2);border:1px solid var(--bord);border-radius:12px;padding:12px;text-align:center}
.sum-v{font-size:24px;font-weight:900;line-height:1}
.sum-l{font-size:10px;color:var(--t2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}

/* ── Filter chips ── */
.filters{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid var(--bord);background:var(--surf2);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;transition:var(--tr);font-family:inherit}
.chip.on{background:rgba(245,166,35,.15);border-color:var(--acc);color:var(--acc)}

/* ── Board grid ── */
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;padding:0 14px 80px}
.floor-hd{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;padding:8px 0 4px;border-bottom:1px solid var(--bord)}

/* ── Room card ── */
.room-card{
  border-radius:14px;border:1.5px solid var(--bord);
  background:var(--surf2);padding:13px 11px;
  display:flex;flex-direction:column;gap:8px;
  transition:var(--tr);position:relative;
}
.room-card.cleaning{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.05)}
.room-card.maintenance{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.05)}
.room-num{font-size:20px;font-weight:900;color:var(--text);line-height:1}
.room-type{font-size:11px;color:var(--t2);margin-top:2px}
.st-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 9px;border-radius:20px;font-size:11px;font-weight:700;width:fit-content;
}
.st-badge.available   {background:rgba(16,185,129,.12);color:#10B981}
.st-badge.occupied    {background:rgba(239,68,68,.12);color:#EF4444}
.st-badge.cleaning    {background:rgba(245,166,35,.12);color:#F5A623}
.st-badge.maintenance {background:rgba(99,102,241,.12);color:#6366F1}
.st-badge.blocked     {background:rgba(144,144,168,.12);color:#9090A8}
.guest-lbl{font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.action-row{display:flex;gap:6px}
.act-btn{
  flex:1;padding:8px 4px;border-radius:9px;border:1.5px solid var(--bord);
  background:var(--surf);color:var(--text);font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:var(--tr);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.act-btn:hover{border-color:var(--acc);color:var(--acc)}
.act-btn:active{transform:scale(.96)}
.act-btn:disabled{opacity:.4;cursor:not-allowed}
.act-btn.clean{background:rgba(16,185,129,.12);border-color:#10B981;color:#10B981}
.act-btn.clean:hover{background:rgba(16,185,129,.25)}

/* ── Loading / empty ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--t2);gap:10px;font-size:14px}
.spin{width:20px;height:20px;border:2px solid var(--bord);border-top-color:var(--acc);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Refresh badge ── */
.refresh-badge{
  position:fixed;bottom:20px;right:16px;
  padding:10px 16px;border-radius:14px;background:var(--surf);
  border:1px solid var(--bord);font-size:12px;color:var(--t2);
  display:flex;align-items:center;gap:6px;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.refresh-badge:hover{border-color:var(--acc);color:var(--acc)}
.refresh-dot{width:7px;height:7px;border-radius:50%;background:#10B981;animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Toast ── */
.toast-host{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{padding:10px 18px;border-radius:12px;background:#1A2035;color:#fff;font-size:13px;font-weight:600;border:1px solid var(--bord);opacity:1;transition:opacity .2s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.s{border-color:#10B981;color:#10B981}
.toast.e{border-color:#EF4444;color:#EF4444}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div>
    <div class="hdr-title" id="hdr-shop">🧹 Housekeeping</div>
    <div class="hdr-sub" id="hdr-sub">Loading...</div>
  </div>
  <div class="hdr-right">
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- Summary -->
<div class="summary" id="summary">
  <div class="sum-box"><div class="sum-v" style="color:#10B981" id="cnt-available">—</div><div class="sum-l">Available</div></div>
  <div class="sum-box"><div class="sum-v" style="color:#EF4444" id="cnt-occupied">—</div><div class="sum-l">Occupied</div></div>
  <div class="sum-box"><div class="sum-v" style="color:#F5A623" id="cnt-cleaning">—</div><div class="sum-l">Cleaning</div></div>
  <div class="sum-box"><div class="sum-v" style="color:#6366F1" id="cnt-maintenance">—</div><div class="sum-l">Maint.</div></div>
</div>

<!-- Filter chips -->
<div class="filters">
  <button class="chip on" onclick="setFilter('all',this)">All</button>
  <button class="chip" onclick="setFilter('cleaning',this)">🧹 Cleaning</button>
  <button class="chip" onclick="setFilter('available',this)">✅ Available</button>
  <button class="chip" onclick="setFilter('occupied',this)">🔴 Occupied</button>
  <button class="chip" onclick="setFilter('maintenance',this)">🔧 Maintenance</button>
</div>

<!-- Board -->
<div class="board" id="board">
  <div class="loading"><div class="spin"></div> Loading rooms...</div>
</div>

<!-- Auto-refresh badge -->
<div class="refresh-badge" onclick="loadAll()">
  <div class="refresh-dot"></div>
  <span id="refresh-label">Auto-refresh every 60s</span>
</div>

<!-- Toast -->
<div class="toast-host" id="toast-host"></div>

<script>
'use strict';
const SB_URL = 'https://jfqeirfrkjdkqqixivru.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcWVpcmZya2pka3FxaXhpdnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzQ4MzgsImV4cCI6MjA4OTk1MDgzOH0.akd4E0nil8ypLR4WOykkeYIL8g4uuNU6XdSVh_Y1utk';
const _sb = supabase.createClient(SB_URL, SB_KEY, {
  auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: false }
});

let _shopId   = null;
let _rooms    = [];
let _guestMap = {};   // room_id → guest_name
let _filter   = 'all';
let _refreshTimer = null;

// ── Theme ──────────────────────────────────────────────────────────
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'light' ? 'dark' : 'light';
  if (next === 'light') document.documentElement.setAttribute('data-theme','light');
  else document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('sbp_theme', next);
  document.getElementById('theme-btn').textContent = next === 'light' ? '🌙' : '☀️';
}

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg, type='i') {
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }, 2500);
}

// ── Auth + role gate ───────────────────────────────────────────────
async function checkAuth() {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) {
    window.location.href = 'index.html';
    return false;
  }

  // Confirm role is housekeeper (from shop_users)
  const role = (localStorage.getItem('sbp_role') || '').toLowerCase();
  if (role !== 'housekeeper') {
    // Not a housekeeper — redirect to dashboard
    window.location.href = 'dashboard.html';
    return false;
  }

  // Get shop_id
  _shopId = localStorage.getItem('sbp_shop_id');
  if (!_shopId) {
    toast('No shop linked to this account', 'e');
    return false;
  }

  // Set header
  const shop = JSON.parse(localStorage.getItem('sbp_shop') || '{}');
  document.getElementById('hdr-shop').textContent =
    '🧹 ' + (shop.name || 'Housekeeping');
  document.title = 'Housekeeping — ' + (shop.name || 'ShopBill Pro');

  return true;
}

async function doLogout() {
  await _sb.auth.signOut();
  localStorage.removeItem('sbp_role');
  localStorage.removeItem('sbp_shop_id');
  localStorage.removeItem('sbp_shop');
  localStorage.removeItem('sbp_is_staff');
  window.location.href = 'index.html';
}

// ── Load data ──────────────────────────────────────────────────────
async function loadAll() {
  document.getElementById('refresh-label').textContent = 'Refreshing...';

  // Load rooms
  const { data: rData } = await _sb.rpc('sbp_rooms_list', { p_shop_id: _shopId });
  _rooms = (rData?.ok && rData.rooms) ? rData.rooms : [];

  // Load active checked-in bookings for guest names
  try {
    const { data: bData } = await _sb.rpc('sbp_bookings_list', {
      p_shop_id: _shopId, p_filter: 'all', p_status_filter: 'checked_in'
    });
    _guestMap = {};
    if (bData?.ok && bData.bookings) {
      bData.bookings.forEach(b => {
        if (b.room_id) _guestMap[b.room_id] = b.customer_name || '';
      });
    }
  } catch(e) { _guestMap = {}; }

  render();

  // Update refresh label with time
  const t = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata' });
  document.getElementById('refresh-label').textContent = 'Last updated ' + t;
  document.getElementById('hdr-sub').textContent =
    _rooms.length + ' rooms · Updated ' + t;
}

// ── Filter ─────────────────────────────────────────────────────────
function setFilter(f, el) {
  _filter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  if (el) el.classList.add('on');
  render();
}

// ── Render ─────────────────────────────────────────────────────────
const ST = {
  available:   { label: '✅ Available',   cls: 'available' },
  occupied:    { label: '🔴 Occupied',    cls: 'occupied' },
  cleaning:    { label: '🧹 Cleaning',    cls: 'cleaning' },
  maintenance: { label: '🔧 Maintenance', cls: 'maintenance' },
  blocked:     { label: '⛔ Blocked',     cls: 'blocked' },
};

function render() {
  // Update summary counts
  const counts = { available: 0, occupied: 0, cleaning: 0, maintenance: 0, blocked: 0 };
  _rooms.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });
  document.getElementById('cnt-available').textContent   = counts.available;
  document.getElementById('cnt-occupied').textContent    = counts.occupied;
  document.getElementById('cnt-cleaning').textContent    = counts.cleaning;
  document.getElementById('cnt-maintenance').textContent = counts.maintenance;

  // Filter rooms
  const visible = _filter === 'all' ? _rooms : _rooms.filter(r => r.status === _filter);

  const board = document.getElementById('board');
  if (!visible.length) {
    board.innerHTML = '<div class="loading">No rooms match this filter</div>';
    return;
  }

  // Group by floor
  const floors = {};
  visible.forEach(r => {
    const fl = r.floor || 'Ground Floor';
    if (!floors[fl]) floors[fl] = [];
    floors[fl].push(r);
  });

  let html = '';
  Object.entries(floors).forEach(([floor, rooms]) => {
    html += `<div class="floor-hd">📍 ${esc(floor)} (${rooms.length})</div>`;
    rooms.forEach(r => {
      const st    = r.status || 'available';
      const badge = ST[st] || ST.available;
      const guest = _guestMap[r.id];

      // Action buttons — housekeeper can only change status
      // They CANNOT set to "occupied" or "blocked" — those are system-managed
      let btns = '';
      if (st === 'cleaning') {
        btns  = `<button class="act-btn clean" onclick="setStatus('${r.id}','available',this)">✅ Mark Clean</button>`;
        btns += `<button class="act-btn" onclick="setStatus('${r.id}','maintenance',this)">🔧</button>`;
      } else if (st === 'available') {
        btns = `<button class="act-btn" onclick="setStatus('${r.id}','cleaning',this)">🧹 Start Clean</button>`;
      } else if (st === 'maintenance') {
        btns = `<button class="act-btn clean" onclick="setStatus('${r.id}','available',this)">✅ Mark Ready</button>`;
      } else if (st === 'occupied') {
        // Occupied rooms — housekeeper can only flag for maintenance
        btns = `<button class="act-btn" onclick="setStatus('${r.id}','maintenance',this)">🔧 Flag Issue</button>`;
      } else if (st === 'blocked') {
        btns = '<span style="font-size:11px;color:var(--t2)">Blocked by owner</span>';
      }

      html += `
      <div class="room-card ${st}" id="rc-${r.id}">
        <div>
          <div class="room-num">Room ${esc(r.room_number)}</div>
          ${r.room_type_name ? `<div class="room-type">${esc(r.room_type_name)}</div>` : ''}
        </div>
        <div class="st-badge ${badge.cls}">${badge.label}</div>
        ${guest ? `<div class="guest-lbl">👤 ${esc(guest)}</div>` : ''}
        <div class="action-row">${btns}</div>
      </div>`;
    });
  });

  board.innerHTML = html;
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Set room status ────────────────────────────────────────────────
async function setStatus(roomId, newStatus, btnEl) {
  const room = _rooms.find(r => r.id === roomId);
  if (!room) return;

  if (btnEl) { btnEl.disabled = true; btnEl.textContent = '...'; }

  const { data, error } = await _sb.rpc('sbp_rooms_upsert', {
    p_shop_id: _shopId,
    p_data: {
      id:            roomId,
      room_number:   room.room_number,
      room_type_id:  room.room_type_id || null,
      floor:         room.floor || null,
      status:        newStatus,
      notes:         room.notes || null,
      active:        room.active !== false,
      display_order: room.display_order || 0,
    }
  });

  if (error || !data?.ok) {
    toast('Update failed: ' + (data?.error || error?.message || 'unknown'), 'e');
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = '?'; }
    return;
  }

  // Update local state
  const idx = _rooms.findIndex(r => r.id === roomId);
  if (idx >= 0) _rooms[idx].status = newStatus;

  const msgs = {
    available:   '✅ Room marked clean & available',
    cleaning:    '🧹 Cleaning started',
    maintenance: '🔧 Flagged for maintenance',
  };
  toast(msgs[newStatus] || 'Updated', 's');
  render();
}

// ── Auto-refresh every 60 seconds ─────────────────────────────────
function startAutoRefresh() {
  if (_refreshTimer) clearInterval(_refreshTimer);
  _refreshTimer = setInterval(loadAll, 60_000);
}

// ── Init ───────────────────────────────────────────────────────────
(async function init() {
  // Theme button init
  const theme = localStorage.getItem('sbp_theme') || 'dark';
  document.getElementById('theme-btn').textContent = theme === 'light' ? '🌙' : '☀️';

  const ok = await checkAuth();
  if (!ok) return;

  await loadAll();
  startAutoRefresh();
})();
</script>
</body>
</html>
